async function hashString(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hash = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

function isHashed(str) {
  return str && str.length === 64 && /^[a-f0-9]{64}$/.test(str);
}

function generateTempPassword() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789";
  let pw = "WC26_";
  for (let i = 0; i < 6; i++) pw += chars[Math.floor(Math.random() * chars.length)];
  return pw;
}

async function checkAdminPass(pass) {
  const hex = await hashString(pass);
  return hex === ADMIN_HASH;
}

   CALCULATION HELPERS
   ═══════════════════════════════════════════ */

function calcGroupTable(matches, teamCodes) {
  const table = {};
  teamCodes.forEach((c) => {
    table[c] = { code: c, pts: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, played: 0 };
  });
  matches.forEach((m) => {
    if (m.homeScore == null || m.awayScore == null) return;
    const hs = m.homeScore, as_ = m.awayScore;
    table[m.home].played++;
    table[m.away].played++;
    table[m.home].gf += hs;
    table[m.home].ga += as_;
    table[m.away].gf += as_;
    table[m.away].ga += hs;
    if (hs > as_) {
      table[m.home].w++;
      table[m.home].pts += 3;
      table[m.away].l++;
    } else if (hs < as_) {
      table[m.away].w++;
      table[m.away].pts += 3;
      table[m.home].l++;
    } else {
      table[m.home].d++;
      table[m.away].d++;
      table[m.home].pts += 1;
      table[m.away].pts += 1;
    }
  });
  Object.values(table).forEach((t) => (t.gd = t.gf - t.ga));
  const sorted = Object.values(table).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return sorted;
}

function calcUserPoints(userPreds, realResults) {
  if (!userPreds || !realResults) return { total: 0, breakdown: {} };
  const P = getPoints(realResults);
  let total = 0;
  const breakdown = { exactScores: 0, correctResults: 0, groupAdvance: 0, groupPosition: 0, globals: 0, knockout: 0, koScores: 0 };

  // Group stage match points
  const hasAnyGroupPreds = userPreds?.groups && Object.keys(userPreds.groups).length > 0;
  Object.keys(GROUPS).forEach((g) => {
    const teamCodes = GROUPS[g];
    const matches = getGroupMatches(g);
    matches.forEach((m) => {
      const key = `${g}-${m.home}-${m.away}`;
      const pred = userPreds?.groups?.[key];
      const real = realResults?.groups?.[key];
      if (!real || real.home == null || real.away == null) return;
      // If user has any group predictions, treat missing/null values as 0 (default display was 0)
      if (!pred && !hasAnyGroupPreds) return;
      const pH = pred?.home ?? 0;
      const pA = pred?.away ?? 0;
      if (pH === real.home && pA === real.away) {
        total += P.exactScore;
        breakdown.exactScores++;
      } else {
        const predResult = pH > pA ? "W" : pH < pA ? "L" : "D";
        const realResult = real.home > real.away ? "W" : real.home < real.away ? "L" : "D";
        if (predResult === realResult) {
          total += P.correctResult;
          breakdown.correctResults++;
        }
      }
    });

    // Group position points — use confirmed standings if available, else auto-calculate
    const confirmedStandings = realResults?.groupStandings?.confirmed ? realResults.groupStandings.groups?.[g] : null;
    const bestThirdsList = realResults?.groupStandings?.bestThirds || [];
    
    let realOrder = null;
    if (confirmedStandings) {
      // Use admin-confirmed order
      realOrder = confirmedStandings;
    } else if (realResults?.groupTables?.[g]) {
      realOrder = realResults.groupTables[g].map((t) => t.code);
    } else {
      // Auto-calculate from match results
      const allGroupResultsIn = matches.every((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        const r = realResults?.groups?.[key];
        return r && r.home != null && r.away != null;
      });
      if (allGroupResultsIn) {
        const realMatches = matches.map((m) => {
          const key = `${g}-${m.home}-${m.away}`;
          const r = realResults.groups[key];
          return { ...m, homeScore: r.home, awayScore: r.away };
        });
        realOrder = calcGroupTable(realMatches, teamCodes).map((t) => t.code);
      }
    }

    if (realOrder) {
      const predMatches = matches.map((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        const p = userPreds?.groups?.[key];
        return { ...m, homeScore: p?.home ?? 0, awayScore: p?.away ?? 0 };
      });
      const predTable = calcGroupTable(predMatches, teamCodes);
      
      realOrder.forEach((realCode, realPos) => {
        const predPos = predTable.findIndex((t) => t.code === realCode);
        const teamQualifies = (realPos < 2) || (realPos === 2 && bestThirdsList.includes(realCode));
        const userPredictedQualifying = predPos < 3; // predicted 1st, 2nd, or 3rd (not 4th)

        if (teamQualifies) {
          if (predPos === realPos) {
            // Exact position match
            total += (realPos === 2) ? (P.bestThirdExactPos || P.teamExactPosition) : P.teamExactPosition;
            breakdown.groupPosition++;
          } else if (userPredictedQualifying) {
            // User predicted team in top 3 (qualifying zone), team qualifies, but wrong position
            total += P.teamAdvancesGroup;
            breakdown.groupAdvance++;
          }
          // If predicted 4th (predPos === 3): 0 pts — user thought team was eliminated
        }
      });
    }
  });

  // Global predictions
  const effectiveChampion = realResults?.champion || realResults?.knockout?.["final-1"]?.advances;
  if (effectiveChampion && userPreds?.globals?.champion === effectiveChampion) {
    total += P.champion;
    breakdown.globals++;
  }
  if (realResults?.topScorerWinners?.length > 0 && userPreds?.globals?.topScorer) {
    if (realResults.topScorerWinners.includes(userPreds.globals.topScorer.trim())) {
      total += P.topScorer;
      breakdown.globals++;
    }
  }
  if (realResults?.mvpWinners?.length > 0 && userPreds?.globals?.mvp) {
    if (realResults.mvpWinners.includes(userPreds.globals.mvp.trim())) {
      total += P.mvp;
      breakdown.globals++;
    }
  }

  // Knockout predictions — new system
  // Rule: if the user has no prediction for a played KO match, treat it as 0-0 default
  // (same as group stage). This applies whether or not they have any KO preds at all.
  if (realResults?.knockout) {
    Object.entries(realResults.knockout).forEach(([matchId, real]) => {
      if (!real || real.home == null || real.away == null) return;
      const pred = userPreds?.knockout?.[matchId];
      // Treat null/undefined prediction scores as 0 (default 0-0)
      const pKH = pred?.home ?? 0;
      const pKA = pred?.away ?? 0;
      if (real.home != null && real.away != null) {
        const predDraw = pKH === pKA;
        const realDraw = real.home === real.away;
        if (pKH === real.home && pKA === real.away) {
          // Exact score (including exact draw)
          total += predDraw ? P.exactDraw : (P.koExactScore || P.exactScore);
          breakdown.koScores++;
        } else if (!predDraw && !realDraw) {
          // Both non-draws: check if same winner
          const predW = pKH > pKA ? "H" : "A";
          const realW = real.home > real.away ? "H" : "A";
          if (predW === realW) { total += (P.koCorrectResult || P.correctResult); breakdown.koScores++; }
        } else if (predDraw && realDraw) {
          // Both draws but not exact
          total += P.drawNotExact; breakdown.koScores++;
        }
        // Non-draw pred vs draw real (or vice versa): 0 pts for score
      }
      // Advancer bonus (only relevant for draws — for non-draws winner = advancer automatically)
      if (real.advances && pred?.advances === real.advances) {
        // Only give advancer bonus if user predicted a draw (extra decision)
        const predDraw2 = (pKH === pKA);
        if (predDraw2) {
          total += P.advancer;
        }
        breakdown.knockout++;
      }
    });
  }

  return { total, breakdown };
}

/* ═══════════════════════════════════════════
   GROUP STAGE AUDIT HELPER
   ───────────────────────────────────────────
   Re-runs the same group-stage logic as calcUserPoints
   but collects per-match and per-group detail for the
   admin audit panel. Read-only — does not mutate anything.
   ═══════════════════════════════════════════ */

function auditUserGroupStage(userPreds, realResults) {
  const P = getPoints(realResults);
  const exactScoreMatches = [];
  const correctResultMatches = [];
  const groupAudit = {};
  let exactScoreCount = 0, exactScorePts = 0;
  let correctResultCount = 0, correctResultPts = 0;
  let groupPositionCount = 0, groupPositionPts = 0;
  let groupAdvanceCount = 0, groupAdvancePts = 0;

  const hasAnyGroupPreds = userPreds?.groups && Object.keys(userPreds.groups).length > 0;
  const bestThirdsList = realResults?.groupStandings?.bestThirds || [];

  Object.keys(GROUPS).forEach((g) => {
    const teamCodes = GROUPS[g];
    const matches = getGroupMatches(g);
    const groupExacts = [];
    const groupCorrects = [];

    matches.forEach((m) => {
      const key = `${g}-${m.home}-${m.away}`;
      const pred = userPreds?.groups?.[key];
      const real = realResults?.groups?.[key];
      if (!real || real.home == null || real.away == null) return;
      if (!pred && !hasAnyGroupPreds) return;
      const pH = pred?.home ?? 0;
      const pA = pred?.away ?? 0;
      const matchInfo = {
        group: g, home: m.home, away: m.away,
        predH: pH, predA: pA, realH: real.home, realA: real.away,
      };
      if (pH === real.home && pA === real.away) {
        const pts = P.exactScore;
        const entry = { ...matchInfo, pts };
        exactScoreMatches.push(entry);
        groupExacts.push(entry);
        exactScoreCount++;
        exactScorePts += pts;
      } else {
        const predResult = pH > pA ? "W" : pH < pA ? "L" : "D";
        const realResult = real.home > real.away ? "W" : real.home < real.away ? "L" : "D";
        if (predResult === realResult) {
          const pts = P.correctResult;
          const entry = { ...matchInfo, pts };
          correctResultMatches.push(entry);
          groupCorrects.push(entry);
          correctResultCount++;
          correctResultPts += pts;
        }
      }
    });

    // Determine real group order (same logic as calcUserPoints)
    const confirmedStandings = realResults?.groupStandings?.confirmed ? realResults.groupStandings.groups?.[g] : null;
    let realOrder = null;
    if (confirmedStandings) {
      realOrder = confirmedStandings;
    } else if (realResults?.groupTables?.[g]) {
      realOrder = realResults.groupTables[g].map((t) => t.code);
    } else {
      const allGroupResultsIn = matches.every((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        const r = realResults?.groups?.[key];
        return r && r.home != null && r.away != null;
      });
      if (allGroupResultsIn) {
        const realMatches = matches.map((m) => {
          const key = `${g}-${m.home}-${m.away}`;
          const r = realResults.groups[key];
          return { ...m, homeScore: r.home, awayScore: r.away };
        });
        realOrder = calcGroupTable(realMatches, teamCodes).map((t) => t.code);
      }
    }

    let teamResults = null;
    let predOrder = null;
    if (realOrder) {
      const predMatches = matches.map((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        const p = userPreds?.groups?.[key];
        return { ...m, homeScore: p?.home ?? 0, awayScore: p?.away ?? 0 };
      });
      const predTable = calcGroupTable(predMatches, teamCodes);
      predOrder = predTable.map((t) => t.code);

      teamResults = realOrder.map((realCode, realPos) => {
        const predPos = predTable.findIndex((t) => t.code === realCode);
        const isBestThird = (realPos === 2 && bestThirdsList.includes(realCode));
        const teamQualifies = (realPos < 2) || isBestThird;
        const userPredictedQualifying = predPos < 3;

        let pts = 0;
        let status = "noPts";
        if (teamQualifies) {
          if (predPos === realPos) {
            pts = (realPos === 2) ? (P.bestThirdExactPos || P.teamExactPosition) : P.teamExactPosition;
            status = "exact";
            groupPositionCount++;
            groupPositionPts += pts;
          } else if (userPredictedQualifying) {
            pts = P.teamAdvancesGroup;
            status = "advance";
            groupAdvanceCount++;
            groupAdvancePts += pts;
          } else {
            status = "miss";
          }
        } else {
          status = "noQualify";
        }
        return { code: realCode, realPos, predPos, qualifies: teamQualifies, isBestThird, pts, status };
      });
    }
    groupAudit[g] = { realOrder, predOrder, teamResults, exacts: groupExacts, corrects: groupCorrects };
  });

  return {
    exactScoreMatches, correctResultMatches, groupAudit, bestThirdsList,
    totals: {
      exactScoreCount, exactScorePts,
      correctResultCount, correctResultPts,
      groupPositionCount, groupPositionPts,
      groupAdvanceCount, groupAdvancePts,
      groupStageTotal: exactScorePts + correctResultPts + groupPositionPts + groupAdvancePts,
    },
    points: P,
  };
}

   ─────────────────────────────────────────── */

const KO_ROUND_ORDER = ["r32", "r16", "qf", "sf", "third", "final"];
const KO_ROUND_LABELS = {
  r32: "Round of 32", r16: "Round of 16", qf: "Quarter-finals",
  sf: "Semi-finals", third: "Third place", final: "Final",
};
const KO_ROUND_SIZES = { r32: 16, r16: 8, qf: 4, sf: 2, third: 1, final: 1 };

function auditUserKnockout(userPreds, realResults, knockoutSetup) {
  const P = getPoints(realResults);
  const rounds = {};
  KO_ROUND_ORDER.forEach((r) => { rounds[r] = []; });
  const totals = {
    exactCount: 0, exactPts: 0,
    correctCount: 0, correctPts: 0,
    exactDrawCount: 0, exactDrawPts: 0,
    drawCorrectCount: 0, drawCorrectPts: 0,
    advancerCount: 0, advancerPts: 0,
    total: 0,
  };

  const realKo = realResults?.knockout || {};

  KO_ROUND_ORDER.forEach((round) => {
    const numMatches = KO_ROUND_SIZES[round];
    for (let i = 1; i <= numMatches; i++) {
      const matchId = round + "-" + i;
      const real = realKo[matchId];
      const pred = userPreds?.knockout?.[matchId];
      let teams = { home: null, away: null };
      try { teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo) || teams; } catch (e) {}

      const entry = {
        matchId, round,
        home: teams?.home || null, away: teams?.away || null,
        realH: real?.home ?? null, realA: real?.away ?? null,
        realAdvances: real?.advances || null,
        predH: pred?.home ?? null, predA: pred?.away ?? null,
        predAdvances: pred?.advances || null,
        ptsScore: 0, ptsAdvancer: 0,
        scoreStatus: "pending",       // pending | exact | correct | exactDraw | drawCorrect | wrong
        advancerStatus: "pending",    // pending | correct | wrong | n/a
        hasResult: !!(real && real.home != null && real.away != null),
        hasPred: !!pred,
      };

      if (entry.hasResult) {
        {
          // Treat missing prediction as 0-0 default (same rule as scoring engine)
          const pKH = pred?.home ?? 0;
          const pKA = pred?.away ?? 0;
          const predDraw = pKH === pKA;
          const realDraw = real.home === real.away;
          if (pKH === real.home && pKA === real.away) {
            if (predDraw) {
              entry.ptsScore = P.exactDraw;
              entry.scoreStatus = "exactDraw";
              totals.exactDrawCount++;
              totals.exactDrawPts += entry.ptsScore;
            } else {
              entry.ptsScore = (P.koExactScore || P.exactScore);
              entry.scoreStatus = "exact";
              totals.exactCount++;
              totals.exactPts += entry.ptsScore;
            }
          } else if (!predDraw && !realDraw) {
            const predW = pKH > pKA ? "H" : "A";
            const realW = real.home > real.away ? "H" : "A";
            if (predW === realW) {
              entry.ptsScore = (P.koCorrectResult || P.correctResult);
              entry.scoreStatus = "correct";
              totals.correctCount++;
              totals.correctPts += entry.ptsScore;
            } else {
              entry.scoreStatus = "wrong";
            }
          } else if (predDraw && realDraw) {
            entry.ptsScore = P.drawNotExact;
            entry.scoreStatus = "drawCorrect";
            totals.drawCorrectCount++;
            totals.drawCorrectPts += entry.ptsScore;
          } else {
            entry.scoreStatus = "wrong";
          }
          // Advancer bonus (only if pred was a draw)
          if (real.advances && pred?.advances === real.advances) {
            const predDraw2 = (pKH === pKA);
            if (predDraw2) {
              entry.ptsAdvancer = P.advancer;
              totals.advancerPts += entry.ptsAdvancer;
            }
            entry.advancerStatus = "correct";
            totals.advancerCount++;
          } else if (real.advances) {
            entry.advancerStatus = pred?.advances ? "wrong" : "missing";
          }
        }
      }

      rounds[round].push(entry);
    }
  });

  totals.total = totals.exactPts + totals.correctPts + totals.exactDrawPts + totals.drawCorrectPts + totals.advancerPts;
  return { rounds, totals, points: P };
}

function auditUserGlobals(userPreds, realResults) {
  const P = getPoints(realResults);
  const items = [];

  const effectiveChampion = realResults?.champion || realResults?.knockout?.["final-1"]?.advances;
  const predChampion = userPreds?.globals?.champion || null;
  items.push({
    key: "champion", label: "World Cup Champion",
    pred: predChampion, real: effectiveChampion || null,
    pts: (effectiveChampion && predChampion === effectiveChampion) ? P.champion : 0,
    status: !effectiveChampion ? "pending" : (predChampion === effectiveChampion ? "correct" : "wrong"),
    maxPts: P.champion,
  });

  const tsWinners = realResults?.topScorerWinners || [];
  const predTs = userPreds?.globals?.topScorer?.trim() || null;
  items.push({
    key: "topScorer", label: "Top Scorer",
    pred: predTs, real: tsWinners.length ? tsWinners.join(" / ") : null,
    pts: (tsWinners.length && predTs && tsWinners.includes(predTs)) ? P.topScorer : 0,
    status: !tsWinners.length ? "pending" : (predTs && tsWinners.includes(predTs) ? "correct" : "wrong"),
    maxPts: P.topScorer,
  });

  const mvpWinners = realResults?.mvpWinners || [];
  const predMvp = userPreds?.globals?.mvp?.trim() || null;
  items.push({
    key: "mvp", label: "Tournament MVP",
    pred: predMvp, real: mvpWinners.length ? mvpWinners.join(" / ") : null,
    pts: (mvpWinners.length && predMvp && mvpWinners.includes(predMvp)) ? P.mvp : 0,
    status: !mvpWinners.length ? "pending" : (predMvp && mvpWinners.includes(predMvp) ? "correct" : "wrong"),
    maxPts: P.mvp,
  });

  const total = items.reduce((a, x) => a + x.pts, 0);
  const maxPending = items.reduce((a, x) => a + (x.status === "pending" ? x.maxPts : 0), 0);
  return { items, total, maxPending };
}

function LoginView({ onBack, onSuccess, users, onMigrate }) {
  const savedEmail = typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_email") || "" : "";
  const savedPass = typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_pass") || "" : "";
  const [email, setEmail] = useState(savedEmail);
  const [pass, setPass] = useState(savedPass);
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);

  const handleLogin = async () => {
    const e = email.trim().toLowerCase();
    if (!e.endsWith("@expediagroup.com")) {
      setError("Use your Expedia email (@expediagroup.com)");
      return;
    }
    const user = users.find((u) => u.email === e);
    if (!user) {
      setError("Not found. Have you signed up?");
      return;
    }
    if (!user.approved) {
      setError("Your account is pending approval. You'll receive an email.");
      return;
    }
    // Proper password comparison: handle hashed and legacy plaintext
    if (user.password) {
      let passOk = false;
      if (isHashed(user.password)) {
        const h = await hashString(pass.trim());
        passOk = h === user.password;
      } else {
        passOk = user.password === pass.trim();
      }
      if (!passOk) {
        setError("Incorrect password");
        return;
      }
    }
    // Remember credentials
    if (typeof localStorage !== "undefined") {
      localStorage.setItem("kyporra_email", e);
      localStorage.setItem("kyporra_pass", pass.trim());
    }
    onSuccess(user);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 20 }}>
      <Card style={{ width: "100%", maxWidth: 400 }}>

        <input

          placeholder="name@expediagroup.com"

            width: "100%", padding: "10px 14px", background: "#0D0D0D", color: C.white,

function getMatchAccuracy(pred, real) {
  if (!real || real.home == null || real.away == null) return "pending";
  const pH = pred?.home ?? 0, pA = pred?.away ?? 0;
  if (pH === real.home && pA === real.away) return "exact";
  const pR = pH > pA ? "W" : pH < pA ? "L" : "D";
  const rR = real.home > real.away ? "W" : real.home < real.away ? "L" : "D";
  return pR === rR ? "correct" : "wrong";
}
const ACC_C = { pending: "#525252", exact: "#34D399", correct: "#C5A059", wrong: "#EF4444" };
const ACC_BG = { pending: "transparent", exact: "rgba(52,211,153,0.04)", correct: "rgba(197,160,89,0.03)", wrong: "rgba(239,68,68,0.03)" };

function Leaderboard({ users, allPredictions, realResults }) {
  const [expanded, setExpanded] = useState(null);
  const [viewMode, setViewMode] = useState("individual");

  const rankings = useMemo(() => {
    const raw = users
      .filter((u) => u.approved)
      .map((u) => {
        const preds = allPredictions[u.id];
        const { total, breakdown } = calcUserPoints(preds, realResults);
        const bonus = realResults?.bonusPoints?.[u.id] || 0;
        return { ...u, total: total + bonus, bonus, breakdown, hasPreds: !!preds?.groups && Object.keys(preds.groups).length > 0 };
      });
    // Compute team averages for tiebreaker
    const teamTotals = {};
    raw.forEach((r) => {
      const t = r.team || "No Team";
      if (!teamTotals[t]) teamTotals[t] = { sum: 0, count: 0 };
      teamTotals[t].sum += r.total;
      teamTotals[t].count++;
    });
    const teamAvg = (r) => {
      const t = teamTotals[r.team || "No Team"];
      return t ? t.sum / t.count : 0;
    };
    return raw.sort((a, b) =>
      b.total - a.total ||
      b.breakdown.exactScores - a.breakdown.exactScores ||
      teamAvg(b) - teamAvg(a) ||
      a.name.localeCompare(b.name)
    );
  }, [users, allPredictions, realResults]);

  // Group by team — sorted by average
  const teamRankings = useMemo(() => {
    const teams = {};
    rankings.forEach((r) => {
      const t = r.team || "No Team";
      if (!teams[t]) teams[t] = { team: t, total: 0, members: 0, players: [] };
      teams[t].total += r.total;
      teams[t].members++;
      teams[t].players.push(r);
    });
    return Object.values(teams)
      .map((t) => ({ ...t, avg: t.members > 0 ? Math.round((t.total / t.members) * 10) / 10 : 0 }))
      .sort((a, b) => b.avg - a.avg);
  }, [rankings]);

  const medalColors = ["#FFD700", "#C0C0C0", "#CD7F32"];
  const medalEmojis = ["👑", "🥈", "🥉"];
  const glowAnims = ["lbGold 2s ease-in-out infinite", "lbSilver 2.5s ease-in-out infinite", "lbBronze 3s ease-in-out infinite"];

  const getTier = (i) => {
    if (i < 3) return { bg: `linear-gradient(135deg, ${medalColors[i]}08, ${medalColors[i]}18, ${medalColors[i]}05)`, border: `${medalColors[i]}30`, color: medalColors[i], anim: glowAnims[i], shimmer: true, shimmerColor: `${medalColors[i]}12`, emoji: medalEmojis[i], leftAccent: null };
    if (i < 10) return { bg: "linear-gradient(135deg, rgba(59,130,246,0.04), rgba(59,130,246,0.10))", border: "rgba(59,130,246,0.15)", color: "#3B82F6", anim: "lbBlue 2.5s ease-in-out infinite", shimmer: false, shimmerColor: "", emoji: null, leftAccent: "#3B82F6" };
    if (i < 20) return { bg: "linear-gradient(135deg, rgba(45,212,191,0.02), rgba(45,212,191,0.05))", border: "rgba(45,212,191,0.08)", color: "#2DD4BF", anim: "lbTeal 3s ease-in-out infinite", shimmer: false, shimmerColor: "", emoji: null, leftAccent: "#2DD4BF" };
    return { bg: "linear-gradient(135deg, rgba(120,120,120,0.02), rgba(120,120,120,0.04))", border: "rgba(120,120,120,0.08)", color: "#666", anim: "lbGray 3.5s ease-in-out infinite", shimmer: false, shimmerColor: "", emoji: null, leftAccent: "#aaaaaa" };
  };

  return (
    <div>
      <style>{`
        @keyframes lbGold { 0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.12); } 50% { box-shadow: 0 0 22px rgba(255,215,0,0.3); } }
        @keyframes newGoldPulse {
          0%, 100% {
            box-shadow: 0 0 0 0 rgba(212,165,57,0.7), 0 0 6px rgba(212,165,57,0.3);
            transform: scale(1);
          }
          50% {
            box-shadow: 0 0 0 5px rgba(212,165,57,0), 0 0 14px rgba(255,215,0,0.55);
            transform: scale(1.07);
          }
        }
        @keyframes newGoldShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        @keyframes lbSilver { 0%, 100% { box-shadow: 0 0 6px rgba(192,192,192,0.08); } 50% { box-shadow: 0 0 16px rgba(192,192,192,0.22); } }
        @keyframes lbBronze { 0%, 100% { box-shadow: 0 0 6px rgba(205,127,50,0.08); } 50% { box-shadow: 0 0 16px rgba(205,127,50,0.22); } }
        @keyframes lbBlue { 0%, 100% { box-shadow: 0 0 5px rgba(59,130,246,0.06); } 50% { box-shadow: 0 0 14px rgba(59,130,246,0.18); } }
        @keyframes lbTeal { 0%, 100% { box-shadow: 0 0 4px rgba(45,212,191,0.05); } 50% { box-shadow: 0 0 12px rgba(45,212,191,0.14); } }
        @keyframes lbGray { 0%, 100% { box-shadow: 0 0 3px rgba(120,120,120,0.04); } 50% { box-shadow: 0 0 8px rgba(120,120,120,0.1); } }
        @keyframes lbShimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes lbPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      `}</style>

      <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 12px" }}>🏆 Leaderboard</h2>

      {/* Individual / Teams toggle */}
      <div style={{ display: "flex", gap: 4, background: "#0a0e1a", borderRadius: 8, padding: 3, marginBottom: 16 }}>
        {[{ id: "individual", label: "Individual" }, { id: "teams", label: "Teams" }].map((m) => (
          <button key={m.id} onClick={() => { setViewMode(m.id); setExpanded(null); }} className="trans" style={{
            flex: 1, padding: "8px 12px",
            background: viewMode === m.id ? C.card : "transparent",
            color: viewMode === m.id ? C.gold : C.muted,
            border: viewMode === m.id ? "1px solid " + C.border : "1px solid transparent",
            borderRadius: 6, fontFamily: "'Oswald', sans-serif", fontSize: 12, fontWeight: 500,
            textTransform: "uppercase", letterSpacing: "0.06em", cursor: "pointer",
          }}>{m.label}</button>
        ))}
      </div>

      {viewMode === "individual" && (
        <>
          {/* Animated podium */}
          {rankings.length >= 3 && (
            <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: 8, marginBottom: 24, padding: "0 12px" }}>
              {[1, 0, 2].map((idx) => {
                const r = rankings[idx];
                if (!r) return null;
                const heights = [150, 110, 85];
                return (
                  <div key={idx} style={{ textAlign: "center", flex: 1, position: "relative" }}>
                    <div style={{ fontSize: idx === 0 ? 32 : 24, marginBottom: 4, animation: idx === 0 ? "lbPulse 2s ease-in-out infinite" : "none" }}>
                      {medalEmojis[idx]}
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 2, color: C.white }}>{r.name}</div>
                    <div style={{ fontSize: 10, color: C.muted, marginBottom: 6 }}>{r.team}</div>
                    <div style={{
                      height: heights[idx],
                      background: `linear-gradient(180deg, ${medalColors[idx]}20, ${medalColors[idx]}08, ${medalColors[idx]}15)`,
                      border: `1px solid ${medalColors[idx]}30`,
                      borderTop: `3px solid ${medalColors[idx]}70`,
                      borderRadius: "8px 8px 0 0",
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                      animation: glowAnims[idx],
                      position: "relative", overflow: "hidden",
                    }}>
                      <div style={{
                        position: "absolute", top: 0, left: 0, right: 0, bottom: 0, pointerEvents: "none",
                        background: `linear-gradient(90deg, transparent, ${medalColors[idx]}15, transparent)`,
                        backgroundSize: "200% 100%", animation: "lbShimmer 3s linear infinite",
                      }} />
                      <span className="font-display" style={{ fontSize: 30, fontWeight: 700, color: medalColors[idx], letterSpacing: "0.05em", position: "relative", zIndex: 1 }}>{r.total}</span>
                      <span style={{ fontSize: 10, color: C.muted, position: "relative", zIndex: 1 }}>pts</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Tier labels + full ranking */}
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {[
              { label: "🏆 Podium", from: 0, to: 3, show: rankings.length > 0, color: C.gold, lineColor: "rgba(197,160,89,0.3)" },
              { label: "⚡ Contenders", from: 3, to: 10, show: rankings.length > 3, color: "#3B82F6", lineColor: "rgba(59,130,246,0.25)" },
              { label: "📊 Mid Table", from: 10, to: 20, show: rankings.length > 10, color: "#2DD4BF", lineColor: "rgba(45,212,191,0.2)" },
              { label: "🪨 Underdogs", from: 20, to: 999, show: rankings.length > 20, color: "#666", lineColor: "rgba(120,120,120,0.15)" },
            ].filter((tier) => tier.show).map((tier) => {
              const tierPlayers = rankings.slice(tier.from, tier.to);
              if (tierPlayers.length === 0) return null;
              return (
                <div key={tier.label}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "8px 0 4px" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: tier.color, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.08em" }}>{tier.label}</span>
                    <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${tier.lineColor}, transparent)` }} />
                  </div>
                  <Card style={{ overflow: "hidden", border: "1px solid " + tier.lineColor }}>
                    {tierPlayers.map((r, ti) => {
                      const i = tier.from + ti;
                      const t = getTier(i);
                      return (
                        <div key={r.id}>
                          <div
                            onClick={() => setExpanded(expanded === r.id ? null : r.id)}
                            style={{
                              display: "flex", alignItems: "center", padding: i < 3 ? "12px 8px" : "10px 4px",
                              borderBottom: ti < tierPlayers.length - 1 ? `1px solid ${t.border}` : "none",
                              background: t.bg, borderRadius: i < 3 ? 6 : 0,
                              borderLeft: t.leftAccent ? `3px solid ${t.leftAccent}80` : "none",
                              margin: i < 3 ? "2px 0" : 0,
                              animation: t.anim, cursor: "pointer", position: "relative", overflow: "hidden",
                            }}
                          >
                            {t.shimmer && <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: `linear-gradient(90deg, transparent, ${t.shimmerColor}, transparent)`, backgroundSize: "200% 100%", animation: "lbShimmer 3s linear infinite" }} />}
                            <span style={{ width: 32, fontSize: i < 3 ? 18 : 13, fontWeight: 700, color: t.color, textAlign: "center", position: "relative", zIndex: 1 }}>
                              {t.emoji || (i + 1)}
                            </span>
                            <div style={{ flex: 1, position: "relative", zIndex: 1 }}>
                              <div style={{ fontSize: i < 3 ? 14 : 13, fontWeight: i < 3 ? 700 : 600, color: i < 20 ? C.white : "#888" }}>{r.name} {r.surname}</div>
                              <div style={{ fontSize: 10, color: C.muted }}>{r.team}</div>
                            </div>
                            <div style={{ textAlign: "right", marginRight: 8, position: "relative", zIndex: 1 }}>
                              <div className="font-display" style={{ fontSize: i < 3 ? 22 : i < 10 ? 18 : 16, fontWeight: 700, color: i < 3 ? t.color : C.gold }}>{r.total}</div>
                              <div style={{ fontSize: 9, color: C.muted }}>pts</div>
                            </div>
                            <div style={{ position: "relative", zIndex: 1 }}>
                              {r.hasPreds ? <Check size={14} style={{ color: C.green }} /> : <Clock size={14} style={{ color: C.muted }} />}
                            </div>
                          </div>
                          {expanded === r.id && (
                            <div style={{ padding: "8px 12px 8px 40px", fontSize: 12, color: C.muted, background: "rgba(0,0,0,0.3)", borderBottom: `1px solid ${C.border}` }}>
                              <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                                <span>Exact: <span style={{ color: C.green, fontWeight: 600 }}>{r.breakdown.exactScores}</span></span>
                                <span>Results: <span style={{ color: C.blue, fontWeight: 600 }}>{r.breakdown.correctResults}</span></span>
                                <span>Qualified: <span style={{ color: C.gold, fontWeight: 600 }}>{r.breakdown.groupAdvance + r.breakdown.groupPosition}</span></span>
                                <span>KO: <span style={{ color: "#a78bfa", fontWeight: 600 }}>{r.breakdown.koScores || 0}</span></span>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </Card>
                </div>
              );
            })}
            {rankings.length === 0 && <Card><p style={{ color: C.muted, textAlign: "center", fontSize: 13 }}>No approved participants yet</p></Card>}
          </div>
        </>
      )}

      {viewMode === "teams" && (
        <>
          {/* Team podium */}
          {teamRankings.length >= 3 && (
            <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: 8, marginBottom: 24, padding: "0 12px" }}>
              {[1, 0, 2].map((idx) => {
                const t = teamRankings[idx];
                if (!t) return null;
                const heights = [150, 110, 85];
                return (
                  <div key={idx} style={{ textAlign: "center", flex: 1 }}>
                    <div style={{ fontSize: idx === 0 ? 32 : 24, marginBottom: 4, animation: idx === 0 ? "lbPulse 2s ease-in-out infinite" : "none" }}>
                      {medalEmojis[idx]}
                    </div>
                    <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 2, color: C.white }}>{t.team}</div>
                    <div style={{ fontSize: 9, color: C.muted, marginBottom: 6 }}>{t.members} players</div>
                    <div style={{
                      height: heights[idx],
                      background: `linear-gradient(180deg, ${medalColors[idx]}20, ${medalColors[idx]}08, ${medalColors[idx]}15)`,
                      border: `1px solid ${medalColors[idx]}30`,
                      borderTop: `3px solid ${medalColors[idx]}70`,
                      borderRadius: "8px 8px 0 0",
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                      animation: glowAnims[idx], position: "relative", overflow: "hidden",
                    }}>
                      <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: `linear-gradient(90deg, transparent, ${medalColors[idx]}15, transparent)`, backgroundSize: "200% 100%", animation: "lbShimmer 3s linear infinite" }} />
                      <span className="font-display" style={{ fontSize: 26, fontWeight: 700, color: medalColors[idx], position: "relative", zIndex: 1 }}>{t.avg}</span>
                      <span style={{ fontSize: 9, color: C.muted, position: "relative", zIndex: 1 }}>avg/player</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Team cards with tiers */}
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {(() => {
              const total = teamRankings.length;
              const teamTiers = [
                { label: "🏆 Podium", from: 0, to: Math.min(3, total), color: C.gold, lineColor: "rgba(197,160,89,0.3)" },
                { label: "⚡ Contenders", from: 3, to: Math.max(3, total - 2), color: "#3B82F6", lineColor: "rgba(59,130,246,0.25)" },
                { label: "📉 Know Your Numbers", from: Math.max(3, total - 2), to: total, color: "#888", lineColor: "rgba(120,120,120,0.15)" },
              ].filter((tt) => tt.from < tt.to && tt.from < total);

              return teamTiers.map((tt) => {
                const tierTeams = teamRankings.slice(tt.from, tt.to);
                if (tierTeams.length === 0) return null;
                return (
                  <div key={tt.label}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "8px 0 4px" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: tt.color, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.08em" }}>{tt.label}</span>
                      <div style={{ flex: 1, height: 1, background: `linear-gradient(90deg, ${tt.lineColor}, transparent)` }} />
                    </div>
                    {tierTeams.map((t, ti) => {
                      const i = tt.from + ti;
                      const isTop3 = i < 3;
                      const isKYN = tt.label.includes("Know");
                      const tierColor = isTop3 ? medalColors[i] : isKYN ? "#888" : "#3B82F6";
                      const tierAnim = isTop3 ? glowAnims[i] : isKYN ? "lbGray 3.5s ease-in-out infinite" : "lbBlue 2.5s ease-in-out infinite";
                      const hasShimmer = isTop3;
                      const tierShimmerColor = isTop3 ? `${medalColors[i]}12` : "";
                      const tierBg = isTop3 ? `linear-gradient(135deg, ${medalColors[i]}08, ${medalColors[i]}18, ${medalColors[i]}05)` : isKYN ? "linear-gradient(135deg, rgba(120,120,120,0.02), rgba(120,120,120,0.04))" : "linear-gradient(135deg, rgba(59,130,246,0.04), rgba(59,130,246,0.10))";
                      const tierBorder = isTop3 ? `${medalColors[i]}30` : isKYN ? "rgba(120,120,120,0.08)" : "rgba(59,130,246,0.15)";
                      const isOpen = expanded === t.team;
                      return (
                        <div key={t.team} style={{
                          background: tierBg, borderRadius: 10, overflow: "hidden",
                          border: `1px solid ${tierBorder}`, marginBottom: 4,
                          animation: tierAnim, position: "relative",
                        }}>
                          <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: hasShimmer ? `linear-gradient(90deg, transparent, ${tierShimmerColor}, transparent)` : "none", backgroundSize: "200% 100%", animation: hasShimmer ? "lbShimmer 3s linear infinite" : "none" }} />
                          <div onClick={() => setExpanded(isOpen ? null : t.team)} style={{ display: "flex", alignItems: "center", padding: "14px 14px", cursor: "pointer", position: "relative", zIndex: 1 }}>
                            <span style={{ width: 32, fontSize: isTop3 ? 20 : 14, fontWeight: 700, color: tierColor, textAlign: "center" }}>
                              {isTop3 ? medalEmojis[i] : (i + 1)}
                            </span>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 14, fontWeight: 700, color: C.white }}>{t.team}</div>
                              <div style={{ fontSize: 11, color: C.muted }}>{t.members} players · {t.total} total pts</div>
                            </div>
                            <div style={{ textAlign: "right" }}>
                              <div className="font-display" style={{ fontSize: isTop3 ? 24 : 20, fontWeight: 700, color: isTop3 ? tierColor : C.gold }}>{t.avg}</div>
                              <div style={{ fontSize: 9, color: C.muted }}>avg/player</div>
                            </div>
                          </div>
                          {isOpen && (
                            <div style={{ padding: "0 14px 12px 46px", position: "relative", zIndex: 1 }}>
                              <div style={{ height: 1, background: `linear-gradient(90deg, ${C.border}, transparent)`, marginBottom: 8 }} />
                              {t.players.sort((a, b) => b.total - a.total).map((p, pi) => (
                                <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: pi < t.players.length - 1 ? `1px solid #1a1a1a` : "none" }}>
                                  <div>
                                    <span style={{ fontSize: 12, color: pi === 0 ? C.gold : C.muted, fontWeight: pi === 0 ? 700 : 400 }}>{p.name} {p.surname}</span>
                                    {pi === 0 && <span style={{ fontSize: 9, marginLeft: 6, color: C.gold }}>⭐ MVP</span>}
                                  </div>
                                  <span style={{ fontSize: 13, color: C.gold, fontWeight: 700, fontFamily: "'Oswald', sans-serif" }}>{p.total} <span style={{ fontSize: 9, color: C.muted, fontWeight: 400 }}>pts</span></span>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}
          </div>
        </>
      )}
    </div>
  );
}
