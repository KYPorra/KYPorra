async function checkAdminPass(pass) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pass);
  const hash = await crypto.subtle.digest("SHA-256", data);
  const hex = Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, "0")).join("");
  return hex === ADMIN_HASH;
}

function generateGroupMatches(teamCodes) {
  const matches = [];
  for (let i = 0; i < teamCodes.length; i++) {
    for (let j = i + 1; j < teamCodes.length; j++) {
      matches.push({ home: teamCodes[i], away: teamCodes[j] });
    }
  }
  return matches;
}

async function sGet(key) {
  try {
    const r = await fetch(DB_URL + "/" + encodeURIComponent(key) + ".json");

    return await r.json();
  } catch { return null; }
}

async function sSet(key, val) {

      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(val),
    });
  } catch (e) { console.error("DB error:", e); }
}

/* ═══════════════════════════════════════════
   CALCULATION HELPERS
   ═══════════════════════════════════════════ */

function calcGroupTable(matches, teamCodes) {
  const table = {};
  teamCodes.forEach((c) => {
    table[c] = { code: c, pts: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, played: 0 };
  });
  matches.forEach((m) => {
    if (m.homeScore == null || m.awayScore == null) return;
    const hs = m.homeScore, as_ = m.awayScore;
    table[m.home].played++;
    table[m.away].played++;
    table[m.home].gf += hs;
    table[m.home].ga += as_;
    table[m.away].gf += as_;
    table[m.away].ga += hs;
    if (hs > as_) {
      table[m.home].w++;
      table[m.home].pts += 3;
      table[m.away].l++;
    } else if (hs < as_) {
      table[m.away].w++;
      table[m.away].pts += 3;
      table[m.home].l++;
    } else {
      table[m.home].d++;
      table[m.away].d++;
      table[m.home].pts += 1;
      table[m.away].pts += 1;
    }
  });
  Object.values(table).forEach((t) => (t.gd = t.gf - t.ga));
  const sorted = Object.values(table).sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return sorted;
}

function calcUserPoints(userPreds, realResults) {
  if (!userPreds || !realResults) return { total: 0, breakdown: {} };
  let total = 0;
  const breakdown = { exactScores: 0, correctResults: 0, groupAdvance: 0, groupPosition: 0, globals: 0 };

  // Group stage match points
  Object.keys(GROUPS).forEach((g) => {
    const teamCodes = GROUPS[g];
    const matches = generateGroupMatches(teamCodes);
    matches.forEach((m, i) => {
      const key = `${g}-${m.home}-${m.away}`;
      const pred = userPreds?.groups?.[key];
      const real = realResults?.groups?.[key];
      if (!pred || !real || pred.home == null || pred.away == null || real.home == null || real.away == null) return;
      if (pred.home === real.home && pred.away === real.away) {
        total += POINTS.exactScore;
        breakdown.exactScores++;
      } else {
        const predResult = pred.home > pred.away ? "W" : pred.home < pred.away ? "L" : "D";
        const realResult = real.home > real.away ? "W" : real.home < real.away ? "L" : "D";
        if (predResult === realResult) {
          total += POINTS.correctResult;
          breakdown.correctResults++;
        }
      }
    });

    // Group position points
    if (realResults?.groupTables?.[g]) {
      const realTable = realResults.groupTables[g];
      const predMatches = matches.map((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        const p = userPreds?.groups?.[key];
        return { ...m, homeScore: p?.home ?? null, awayScore: p?.away ?? null };
      });
      const predTable = calcGroupTable(predMatches, teamCodes);
      
      realTable.forEach((realTeam, realPos) => {
        const predPos = predTable.findIndex((t) => t.code === realTeam.code);
        if (realPos < 2) {
          // Team advanced (top 2)
          if (predPos < 2) {
            if (predPos === realPos) {
              total += POINTS.teamExactPosition;
              breakdown.groupPosition++;
            } else {
              total += POINTS.teamAdvancesGroup;
              breakdown.groupAdvance++;
            }
          }
        }
      });
    }
  });

  // Global predictions
  if (realResults?.champion && userPreds?.globals?.champion === realResults.champion) {
    total += POINTS.champion;
    breakdown.globals++;
  }
  if (realResults?.topScorer && userPreds?.globals?.topScorer?.toLowerCase() === realResults.topScorer?.toLowerCase()) {
    total += POINTS.topScorer;
    breakdown.globals++;
  }
  if (realResults?.mvp && userPreds?.globals?.mvp?.toLowerCase() === realResults.mvp?.toLowerCase()) {
    total += POINTS.mvp;
    breakdown.globals++;
  }

  return { total, breakdown };
}

function LoginView({ onBack, onSuccess, users }) {
  const [email, setEmail] = useState("");
  const [error, setError] = useState("");

  const handleLogin = () => {
    const e = email.trim().toLowerCase();
    if (!e.endsWith("@expediagroup.com")) {
      setError("Usa tu email de Expedia (@expediagroup.com)");
      return;
    }
    const user = users.find((u) => u.email === e);
    if (!user) {
      setError("No encontrado. ¿Te has registrado?");
      return;
    }
    if (!user.approved) {
      setError("Tu cuenta está pendiente de aprobación. Te avisaremos por email.");
      return;

    onSuccess(user);

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 20 }}>

          value={email}
          onChange={(e) => { setEmail(e.target.value); setError(""); }}
          onKeyDown={(e) => e.key === "Enter" && handleLogin()}
          style={{

            padding: "10px 14px",
            background: "#0a0e27",

function GroupPredictions({ user, predictions, onSave, realResults, deadline }) {
  const [preds, setPreds] = useState(predictions?.groups || {});
  const [activeGroup, setActiveGroup] = useState("A");
  const [saving, setSaving] = useState(false);
  const locked = deadline && new Date() > new Date(deadline);

  const updateScore = (key, side, val) => {
    if (locked) return;
    const newPreds = { ...preds };
    if (!newPreds[key]) newPreds[key] = { home: null, away: null };
    newPreds[key] = { ...newPreds[key], [side]: val };
    setPreds(newPreds);
  };

  const handleSave = async () => {
    setSaving(true);
    await onSave({ ...predictions, groups: preds });
    setSaving(false);
  };

  const groupKeys = Object.keys(GROUPS);
  const teamCodes = GROUPS[activeGroup];
  const matches = generateGroupMatches(teamCodes);

  // Calculate predicted table
  const predMatches = matches.map((m) => {
    const key = `${activeGroup}-${m.home}-${m.away}`;
    return { ...m, homeScore: preds[key]?.home ?? 0, awayScore: preds[key]?.away ?? 0 };
  });
  const predTable = calcGroupTable(predMatches, teamCodes);
  const hasEdits = matches.some((m) => {
    const key = `${activeGroup}-${m.home}-${m.away}`;
    return preds[key] != null;
  });

  // Real results table
  const realTable = realResults?.groupTables?.[activeGroup];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>
          ⚽ Fase de grupos
        </h2>
        {locked ? (
          <Badge color={C.red}><Lock size={10} /> CERRADO</Badge>
        ) : (
          <GoldButton onClick={handleSave} small disabled={saving}>
            {saving ? "Guardando..." : "💾 Guardar"}
          </GoldButton>
        )}
      </div>

      {/* Group selector */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
        {groupKeys.map((g) => {
          const gMatches = generateGroupMatches(GROUPS[g]);
          const filled = gMatches.every((m) => {
            const key = `${g}-${m.home}-${m.away}`;
            return preds[key]?.home != null && preds[key]?.away != null;
          });
          return (
            <button
              key={g}
              onClick={() => setActiveGroup(g)}
              style={{
                padding: "6px 12px",
                background: activeGroup === g ? C.gold : "transparent",
                color: activeGroup === g ? "#0a0e1a" : filled ? C.green : C.muted,
                border: `1px solid ${activeGroup === g ? C.gold : filled ? C.green + "44" : C.border}`,
                borderRadius: 6,
                fontSize: 13,
                fontWeight: 700,
                cursor: "pointer",
              }}
            >
              {filled && activeGroup !== g ? "✓ " : ""}Grupo {g}
            </button>
          );
        })}
      </div>

      {/* Match predictions */}
      <Card style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, margin: 0, color: C.gold }}>Grupo {activeGroup}</h3>
          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
            {teamCodes.map((c) => (
              <FlagImg key={c} iso={TEAMS[c].flag} size={18} />
            ))}
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {matches.map((m) => {
            const key = `${activeGroup}-${m.home}-${m.away}`;
            const pred = preds[key] || { home: 0, away: 0 };
            const real = realResults?.groups?.[key];
            return (
              <div
                key={key}
                style={{
                  display: "grid",
                  gridTemplateColumns: "1fr auto 1fr",
                  alignItems: "center",
                  padding: "10px 14px",
                  background: real ? "rgba(34,197,94,0.06)" : "#0a0e27",
                  borderRadius: 8,
                  border: real ? `1px solid ${C.green}33` : `1px solid ${C.border}`,
                  gap: 8,
                }}
              >
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <TeamBadge code={m.home} size="sm" />
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <ScoreInput value={pred.home ?? 0} onChange={(v) => updateScore(key, "home", v)} disabled={locked} />
                  <span style={{ color: C.muted, fontWeight: 700, fontSize: 12 }}>-</span>
                  <ScoreInput value={pred.away ?? 0} onChange={(v) => updateScore(key, "away", v)} disabled={locked} />
                </div>
                <div style={{ display: "flex", justifyContent: "flex-start" }}>
                  <TeamBadge code={m.away} size="sm" />
                </div>
              </div>
            );
          })}
        </div>

        {/* Real results if available */}
        {realTable && (
          <div style={{ marginTop: 12, padding: 10, background: "rgba(34,197,94,0.08)", borderRadius: 8 }}>
            <p style={{ fontSize: 11, color: C.green, fontWeight: 700, margin: "0 0 4px" }}>RESULTADO REAL</p>
            {matches.map((m) => {
              const key = `${activeGroup}-${m.home}-${m.away}`;
              const real = realResults?.groups?.[key];
              if (!real || real.home == null) return null;
              return (
                <div key={key} style={{ fontSize: 12, color: C.muted, display: "flex", gap: 6, alignItems: "center", marginBottom: 2 }}>
                  <FlagImg iso={TEAMS[m.home].flag} size={12} /> <span>{real.home} - {real.away}</span> <FlagImg iso={TEAMS[m.away].flag} size={12} />
                </div>
              );
            })}
          </div>
        )}
      </Card>

      {/* Predicted table */}
      {/* Predicted table - always visible with 0-0 defaults */}
      <Card>
          <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px", color: C.gold }}>
            📊 Tu tabla predicha · Grupo {activeGroup}
          </h3>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{ color: C.muted, fontSize: 11 }}>
                <th style={{ textAlign: "left", padding: "4px 8px" }}>#</th>
                <th style={{ textAlign: "left", padding: "4px 8px" }}>Equipo</th>
                <th style={{ padding: "4px 6px" }}>J</th>
                <th style={{ padding: "4px 6px" }}>G</th>
                <th style={{ padding: "4px 6px" }}>E</th>
                <th style={{ padding: "4px 6px" }}>P</th>
                <th style={{ padding: "4px 6px" }}>GF</th>
                <th style={{ padding: "4px 6px" }}>GC</th>
                <th style={{ padding: "4px 6px" }}>DG</th>
                <th style={{ padding: "4px 6px", color: C.gold }}>Pts</th>
              </tr>
            </thead>
            <tbody>
              {predTable.map((t, i) => {
                const advances = i < 2;
                const thirdChance = i === 2;
                return (
                  <tr key={t.code} style={{ background: advances ? "rgba(34,197,94,0.08)" : thirdChance ? "rgba(245,208,107,0.08)" : "transparent" }}>
                    <td style={{ padding: "6px 8px", fontWeight: 700, color: advances ? C.green : thirdChance ? C.gold : C.muted }}>
                      {i + 1}
                    </td>
                    <td style={{ padding: "6px 8px" }}><TeamBadge code={t.code} size="sm" /></td>
                    <td style={{ padding: "6px", textAlign: "center" }}>{t.played}</td>
                    <td style={{ padding: "6px", textAlign: "center", color: C.green }}>{t.w}</td>
                    <td style={{ padding: "6px", textAlign: "center" }}>{t.d}</td>
                    <td style={{ padding: "6px", textAlign: "center", color: C.red }}>{t.l}</td>
                    <td style={{ padding: "6px", textAlign: "center" }}>{t.gf}</td>
                    <td style={{ padding: "6px", textAlign: "center" }}>{t.ga}</td>
                    <td style={{ padding: "6px", textAlign: "center", color: t.gd > 0 ? C.green : t.gd < 0 ? C.red : C.muted }}>
                      {t.gd > 0 ? "+" : ""}{t.gd}
                    </td>
                    <td style={{ padding: "6px", textAlign: "center", fontWeight: 700, color: C.gold }}>{t.pts}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{ display: "flex", gap: 12, marginTop: 8, fontSize: 11, color: C.muted }}>
            <span><span style={{ color: C.green }}>●</span> Clasificado directo</span>
            <span><span style={{ color: C.gold }}>●</span> Posible mejor tercero</span>
          </div>
        </Card>
    </div>
  );
}

/* ═══════════════════════════════════════════
   LEADERBOARD
   ═══════════════════════════════════════════ */

function Leaderboard({ users, allPredictions, realResults }) {
  const [expanded, setExpanded] = useState(null);

  const rankings = useMemo(() => {
    return users
      .filter((u) => u.approved)
      .map((u) => {
        const preds = allPredictions[u.id];
        const { total, breakdown } = calcUserPoints(preds, realResults);
        return { ...u, total, breakdown, hasPreds: !!preds?.groups && Object.keys(preds.groups).length > 0 };
      })
      .sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));
  }, [users, allPredictions, realResults]);

  // Group by team
  const teamRankings = useMemo(() => {
    const teams = {};
    rankings.forEach((r) => {
      if (!teams[r.team]) teams[r.team] = { team: r.team, total: 0, members: 0 };
      teams[r.team].total += r.total;
      teams[r.team].members++;
    });
    return Object.values(teams).sort((a, b) => b.total - a.total);
  }, [rankings]);

  const medalColors = ["#FFD700", "#C0C0C0", "#CD7F32"];

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 16px" }}>🏆 Clasificación</h2>

      {/* Top 3 podium */}
      {rankings.length >= 3 && (
        <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: 8, marginBottom: 20, padding: "0 20px" }}>
          {[1, 0, 2].map((idx) => {
            const r = rankings[idx];
            if (!r) return null;
            const heights = [140, 100, 80];
            return (
              <div key={idx} style={{ textAlign: "center", flex: 1 }}>
                <div style={{ fontSize: 28, marginBottom: 4 }}>{idx === 0 ? "👑" : ""}</div>
                <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 2 }}>{r.name}</div>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 4 }}>{r.team}</div>
                <div
                  style={{
                    height: heights[idx],
                    background: `linear-gradient(180deg, ${medalColors[idx]}33, ${medalColors[idx]}11)`,
                    border: `1px solid ${medalColors[idx]}44`,
                    borderRadius: "8px 8px 0 0",
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    justifyContent: "center",
                  }}
                >
                  <span style={{ fontSize: 24, fontWeight: 800, color: medalColors[idx] }}>{r.total}</span>
                  <span style={{ fontSize: 10, color: C.muted }}>pts</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Full ranking list */}
      <Card>
        {rankings.map((r, i) => (
          <div key={r.id}>
            <div
              onClick={() => setExpanded(expanded === r.id ? null : r.id)}
              style={{
                display: "flex",
                alignItems: "center",
                padding: "10px 0",
                borderBottom: i < rankings.length - 1 ? `1px solid ${C.border}` : "none",
                cursor: "pointer",
              }}
            >
              <span style={{ width: 30, fontSize: 14, fontWeight: 700, color: i < 3 ? medalColors[i] : C.muted }}>
                {i + 1}
              </span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{r.name} {r.surname}</div>
                <div style={{ fontSize: 11, color: C.muted }}>{r.team}</div>
              </div>
              <div style={{ textAlign: "right", marginRight: 8 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: C.gold }}>{r.total}</div>
                <div style={{ fontSize: 10, color: C.muted }}>pts</div>
              </div>
              {r.hasPreds ? (
                <Check size={14} style={{ color: C.green }} />
              ) : (
                <Clock size={14} style={{ color: C.muted }} />
              )}
            </div>
            {expanded === r.id && (
              <div style={{ padding: "8px 0 8px 30px", fontSize: 12, color: C.muted }}>
                <div>Resultados exactos: <span style={{ color: C.green }}>{r.breakdown.exactScores}</span></div>
                <div>Resultados correctos: <span style={{ color: C.blue }}>{r.breakdown.correctResults}</span></div>
                <div>Equipos clasificados: <span style={{ color: C.gold }}>{r.breakdown.groupAdvance + r.breakdown.groupPosition}</span></div>
              </div>
            )}
          </div>
        ))}
        {rankings.length === 0 && (
          <p style={{ color: C.muted, textAlign: "center", fontSize: 13 }}>Aún no hay participantes aprobados</p>
        )}
      </Card>

      {/* Team ranking */}
      {teamRankings.length > 1 && (
        <>
          <h3 style={{ fontSize: 15, fontWeight: 700, margin: "24px 0 12px", color: C.gold }}>👥 Clasificación por equipos</h3>
          <Card>
            {teamRankings.map((t, i) => (
              <div
                key={t.team}
                style={{
                  display: "flex",
                  alignItems: "center",
                  padding: "8px 0",
                  borderBottom: i < teamRankings.length - 1 ? `1px solid ${C.border}` : "none",
                }}
              >
                <span style={{ width: 30, fontSize: 13, fontWeight: 700, color: i === 0 ? C.gold : C.muted }}>
                  {i + 1}
                </span>
                <div style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{t.team}</div>
                <div style={{ fontSize: 11, color: C.muted, marginRight: 12 }}>{t.members} miembros</div>
                <span style={{ fontSize: 16, fontWeight: 800, color: C.gold }}>{t.total}</span>
              </div>
            ))}
          </Card>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════

function AdminPanel({ users, setUsers, realResults, setRealResults, config, setConfig }) {
  const [adminTab, setAdminTab] = useState("users");
  const [resultGroup, setResultGroup] = useState("A");

  const pendingUsers = users.filter((u) => !u.approved);
  const approvedUsers = users.filter((u) => u.approved);

  const approveUser = async (id) => {
    const newUsers = users.map((u) => (u.id === id ? { ...u, approved: true } : u));
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    // Open mailto for notification
    const user = newUsers.find((u) => u.id === id);
    if (user) {
      const subject = encodeURIComponent("✅ KYPorra 2026 — ¡Estás dentro!");
      const body = encodeURIComponent(`¡Hola ${user.name}!\n\nTu cuenta en la KYPorra del Mundial 2026 ha sido aprobada. Ya puedes entrar y hacer tus predicciones.\n\n¡Suerte! ⚽🏆`);
      window.open(`mailto:${user.email}?subject=${subject}&body=${body}`, "_blank");
    }
  };

  const rejectUser = async (id) => {
    const newUsers = users.filter((u) => u.id !== id);
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
  };

  const updateResult = (key, side, val) => {
    const newResults = { ...realResults };
    if (!newResults.groups) newResults.groups = {};
    if (!newResults.groups[key]) newResults.groups[key] = { home: null, away: null };
    newResults.groups[key] = { ...newResults.groups[key], [side]: val };
    setRealResults(newResults);
  };

  const saveResults = async () => {
    // Calculate group tables from results
    const newResults = { ...realResults };
    if (!newResults.groupTables) newResults.groupTables = {};
    Object.keys(GROUPS).forEach((g) => {
      const teamCodes = GROUPS[g];
      const matches = generateGroupMatches(teamCodes);
      const withScores = matches.map((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        return { ...m, homeScore: newResults.groups?.[key]?.home ?? null, awayScore: newResults.groups?.[key]?.away ?? null };
      });
      const allDone = withScores.every((m) => m.homeScore != null && m.awayScore != null);
      if (allDone) {
        newResults.groupTables[g] = calcGroupTable(withScores, teamCodes);
      }
    });
    setRealResults(newResults);
    await sSet("wc-results", newResults);
    alert("✅ Resultados guardados");
  };

  const allEmails = approvedUsers.map((u) => u.email).join(",");

  const openMailAll = (subject, body) => {
    const s = encodeURIComponent(subject);
    const b = encodeURIComponent(body);
    window.open(`mailto:${allEmails}?subject=${s}&body=${b}`, "_blank");
  };

  const updateDeadline = async (val) => {
    const newConfig = { ...config, groupDeadline: val };
    setConfig(newConfig);
    await sSet("wc-config", newConfig);
  };

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 16px" }}>
        <Shield size={18} style={{ color: C.gold, marginRight: 8 }} />
        Panel de administración
      </h2>

      <TabBar
        tabs={[
          { id: "users", label: `Usuarios (${pendingUsers.length})`, icon: <Users size={14} /> },
          { id: "results", label: "Resultados", icon: <Zap size={14} /> },
          { id: "comms", label: "Comunicación", icon: <Mail size={14} /> },
          { id: "settings", label: "Config", icon: <Shield size={14} /> },
        ]}
        active={adminTab}
        onChange={setAdminTab}
      />

      {adminTab === "users" && (
        <div>
          {pendingUsers.length > 0 && (
            <Card style={{ marginBottom: 16 }} glow>
              <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px", color: C.gold }}>
                ⏳ Pendientes de aprobación ({pendingUsers.length})
              </h3>
              {pendingUsers.map((u) => (
                <div
                  key={u.id}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    padding: "10px 0",
                    borderBottom: `1px solid ${C.border}`,
                  }}
                >
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{u.name} {u.surname}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{u.team} · {u.email}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button
                      onClick={() => approveUser(u.id)}
                      style={{ background: C.green, color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
                    >
                      <Check size={12} /> Aprobar
                    </button>
                    <button
                      onClick={() => rejectUser(u.id)}
                      style={{ background: C.red, color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
                    >
                      <X size={12} /> Rechazar
                    </button>
                  </div>
                </div>
              ))}
            </Card>
          )}

          <Card>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px" }}>
              ✅ Aprobados ({approvedUsers.length})
            </h3>
            {approvedUsers.map((u) => (
              <div
                key={u.id}
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  padding: "8px 0",
                  borderBottom: `1px solid ${C.border}`,
                  fontSize: 13,
                }}
              >
                <div>
                  <span style={{ fontWeight: 600 }}>{u.name} {u.surname}</span>
                  <span style={{ color: C.muted, marginLeft: 8, fontSize: 11 }}>{u.team}</span>
                </div>
                <span style={{ fontSize: 11, color: C.muted }}>{u.email}</span>
              </div>
            ))}
          </Card>
        </div>
      )}

      {adminTab === "results" && (
        <div>
          {/* API Import Button */}
          <Card style={{ marginBottom: 16, background: "#0d1230" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, margin: "0 0 2px" }}>📡 Importar resultados del día</p>
                <p style={{ fontSize: 11, color: C.muted, margin: 0 }}>Trae partidos finalizados de la API</p>
              </div>
              <button
                onClick={async () => {
                  const apiKey = typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_api_key") : null;
                  if (!apiKey) {
                    alert("⚠️ Introduce tu API key en la pestaña Config primero.");
                    return;
                  }
                  try {
                    const resp = await fetch("https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED", {
                      headers: { "X-Auth-Token": apiKey }
                    });
                    if (!resp.ok) throw new Error("API " + resp.status);
                    const data = await resp.json();
                    const matches = data.matches || [];
                    if (matches.length === 0) {
                      alert("No hay partidos finalizados aún.");
                      return;
                    }
                    // Map API results to our format
                    const newResults = { ...realResults };
                    if (!newResults.groups) newResults.groups = {};
                    let imported = 0;
                    // Build reverse lookup: FIFA TLA → our code
                    const tlaMap = {};
                    Object.values(TEAMS).forEach((t) => { tlaMap[t.code] = t.code; });
                    matches.forEach((m) => {
                      if (!m.score?.fullTime || m.score.fullTime.home == null) return;
                      const homeCode = tlaMap[m.homeTeam?.tla];
                      const awayCode = tlaMap[m.awayTeam?.tla];
                      if (!homeCode || !awayCode) return;
                      // Find which group this match belongs to
                      const groupEntry = Object.entries(GROUPS).find(([g, teams]) =>
                        teams.includes(homeCode) && teams.includes(awayCode)
                      );
                      if (!groupEntry) return;
                      const key = groupEntry[0] + "-" + homeCode + "-" + awayCode;
                      const keyAlt = groupEntry[0] + "-" + awayCode + "-" + homeCode;
                      if (newResults.groups[key] && newResults.groups[key].home != null) return; // don't overwrite
                      if (GROUPS[groupEntry[0]].indexOf(homeCode) < GROUPS[groupEntry[0]].indexOf(awayCode)) {
                        newResults.groups[key] = { home: m.score.fullTime.home, away: m.score.fullTime.away };
                      } else {
                        newResults.groups[keyAlt] = { home: m.score.fullTime.away, away: m.score.fullTime.home };
                      }
                      imported++;
                    });
                    setRealResults(newResults);
                    alert("✅ " + imported + " partidos importados. Revisa y dale a Guardar.");
                  } catch (e) {
                    alert("⚠️ Error: " + e.message + ". Puedes meter los resultados a mano.");
                  }
                }}
                style={{
                  padding: "8px 16px", background: "rgba(59,130,246,0.15)", color: C.blue,
                  border: `1px solid ${C.blue}33`, borderRadius: 8, fontSize: 12,
                  fontWeight: 700, cursor: "pointer",
                }}
              >
                🔄 Importar
              </button>
            </div>
          </Card>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {Object.keys(GROUPS).map((g) => (
              <button
                key={g}
                onClick={() => setResultGroup(g)}
                style={{
                  padding: "6px 12px",
                  background: resultGroup === g ? C.gold : "transparent",
                  color: resultGroup === g ? "#0a0e1a" : C.muted,
                  border: `1px solid ${resultGroup === g ? C.gold : C.border}`,
                  borderRadius: 6,
                  fontSize: 13,
                  fontWeight: 700,
                  cursor: "pointer",
                }}
              >
                Grupo {g}
              </button>
            ))}
          </div>

          <Card>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px", color: C.gold }}>
              Resultados reales · Grupo {resultGroup}
            </h3>
            {generateGroupMatches(GROUPS[resultGroup]).map((m) => {
              const key = `${resultGroup}-${m.home}-${m.away}`;
              const res = realResults?.groups?.[key] || { home: null, away: null };
              return (
                <div
                  key={key}
                  style={{
                    display: "grid",
                    gridTemplateColumns: "1fr auto 1fr",
                    alignItems: "center",
                    padding: "8px 0",
                    borderBottom: `1px solid ${C.border}`,
                    gap: 8,
                  }}
                >
                  <div style={{ display: "flex", justifyContent: "flex-end" }}>
                    <TeamBadge code={m.home} size="sm" />
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    <ScoreInput value={res.home} onChange={(v) => updateResult(key, "home", v)} />
                    <span style={{ color: C.muted, fontWeight: 700, fontSize: 12 }}>-</span>
                    <ScoreInput value={res.away} onChange={(v) => updateResult(key, "away", v)} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "flex-start" }}>
                    <TeamBadge code={m.away} size="sm" />
                  </div>
                </div>
              );
            })}
            <GoldButton onClick={saveResults} style={{ width: "100%", marginTop: 16 }}>
              💾 Guardar resultados
            </GoldButton>
          </Card>
        </div>
      )}

      {adminTab === "comms" && (
        <div>
          <Card style={{ marginBottom: 12 }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 8px" }}>📧 Enviar email a todos</h3>
            <p style={{ fontSize: 12, color: C.muted, margin: "0 0 12px" }}>
              Se abrirá Outlook con {approvedUsers.length} destinatarios en To:
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <GoldButton
                onClick={() => openMailAll(
                  "⚽ KYPorra 2026 — ¡Nuevos resultados!",
                  "¡Hola equipo!\n\nSe han actualizado los resultados de la porra del Mundial. Entra para ver cómo va la clasificación.\n\n🏆 ¡Suerte!"
                )}
                style={{ width: "100%" }}
              >
                📊 Notificar nuevos resultados
              </GoldButton>
              <GoldButton
                onClick={() => openMailAll(
                  "⏰ KYPorra 2026 — ¡Mete tus predicciones!",
                  "¡Hola equipo!\n\nRecordatorio: el plazo para meter tus predicciones de la fase de grupos se acerca. ¡No te quedes fuera!\n\n⚽ Entra ya a la KYPorra 2026"
                )}
                style={{ width: "100%" }}
              >
                ⏰ Recordatorio de predicciones
              </GoldButton>
              <GoldButton
                onClick={() => openMailAll(
                  "🏆 KYPorra 2026 — ¡Fase de eliminatorias abierta!",
                  "¡Hola equipo!\n\nLa fase de grupos ha terminado. Ya puedes entrar para hacer tus predicciones de la fase eliminatoria.\n\n¡Que gane el mejor! 🎯"
                )}
                style={{ width: "100%" }}
              >
                🎯 Anunciar nueva fase
              </GoldButton>
            </div>
          </Card>

          <Card>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 8px" }}>📋 Lista de emails</h3>
            <div style={{ background: "#0a0e27", padding: 10, borderRadius: 6, fontSize: 11, color: C.muted, wordBreak: "break-all" }}>
              {allEmails || "No hay usuarios aprobados"}
            </div>
          </Card>
        </div>
      )}

      {adminTab === "settings" && (
        <div>
          <Card style={{ marginBottom: 16 }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px" }}>⚙️ Configuración</h3>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, color: C.muted, display: "block", marginBottom: 4 }}>
                Deadline fase de grupos
              </label>
              <input
                type="datetime-local"
                value={config?.groupDeadline || "2026-06-11T00:00"}
                onChange={(e) => updateDeadline(e.target.value)}
                style={{
                  width: "100%",
                  padding: "8px 12px",
                  background: "#0a0e27",
                  color: C.white,
                  border: `1px solid ${C.border}`,
                  borderRadius: 8,
                  fontSize: 13,
                  boxSizing: "border-box",
                }}
              />
            </div>
            <div style={{ fontSize: 12, color: C.muted }}>
              <p>Participantes aprobados: <strong style={{ color: C.white }}>{approvedUsers.length}</strong></p>
              <p>Participantes pendientes: <strong style={{ color: C.gold }}>{pendingUsers.length}</strong></p>
            </div>
          </Card>
          <Card>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 12px" }}>📡 API de resultados</h3>
            <p style={{ fontSize: 11, color: C.muted, margin: "0 0 8px" }}>
              Tu API key de football-data.org. Se guarda solo en tu navegador.
            </p>
            <input
              type="password"
              placeholder="Pega aquí tu API key"
              defaultValue={typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_api_key") || "" : ""}
              onChange={(e) => { if (typeof localStorage !== "undefined") localStorage.setItem("kyporra_api_key", e.target.value.trim()); }}
              style={{
                width: "100%", padding: "8px 12px",
                background: "#0a0e27", color: C.white,
                border: `1px solid ${C.border}`, borderRadius: 8,
                fontSize: 13, boxSizing: "border-box",
              }}
            />
            <p style={{ fontSize: 10, color: C.muted, margin: "6px 0 0" }}>
              Gratis en football-data.org/client/register
            </p>
          </Card>
        </div>
      )}
    </div>
  );
}

function UserDashboard({ user, onLogout, users, allPredictions, realResults, config }) {
  const [tab, setTab] = useState("groups");
  const [predictions, setPredictions] = useState(allPredictions[user.id] || {});

  const savePredictions = async (newPreds) => {
    setPredictions(newPreds);
    await sSet(`wc-pred-${user.id}`, newPreds);
  };

  const { total } = calcUserPoints(predictions, realResults);
  const locked = config?.groupDeadline && new Date() > new Date(config.groupDeadline);

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: 16 }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0, color: C.gold }}>KYPorra 2026 ⚽</h1>
          <p style={{ color: C.muted, fontSize: 12, margin: "2px 0 0" }}>
            {user.name} {user.surname} · {user.team}
          </p>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.gold }}>{total}</div>
          <div style={{ fontSize: 10, color: C.muted }}>puntos</div>
          <button onClick={onLogout} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 11, marginTop: 4 }}>
            <LogOut size={10} /> Salir
          </button>
        </div>
      </div>

      <TabBar
        tabs={[
          { id: "groups", label: "Grupos", icon: <Zap size={14} /> },
          { id: "globals", label: "Globales", icon: <Trophy size={14} /> },
          { id: "leaderboard", label: "Ranking", icon: <Crown size={14} /> },
        ]}
        active={tab}
        onChange={setTab}
      />

      {tab === "groups" && (
        <GroupPredictions
          user={user}
          predictions={predictions}
          onSave={savePredictions}
          realResults={realResults}
          deadline={config?.groupDeadline}
        />
      )}
      {tab === "globals" && (
        <GlobalPredictions
          predictions={predictions}
          onSave={savePredictions}
          locked={locked}
        />
      )}
      {tab === "leaderboard" && (
        <Leaderboard
          users={users}
          allPredictions={{ ...allPredictions, [user.id]: predictions }}
          realResults={realResults}
        />
      )}
    </div>
  );
}

   ═══════════════════════════════════════════ */

          <h1 style={{ fontSize: 22, fontWeight: 800, margin: 0, color: C.gold }}>KYPorra 2026 ⚽</h1>

      <TabBar
        tabs={[

}

/* ═══════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════ */

function App() {
  const [view, setView] = useState("landing");
  const [currentUser, setCurrentUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [users, setUsers] = useState([]);
  const [allPredictions, setAllPredictions] = useState({});
  const [realResults, setRealResults] = useState({});
  const [config, setConfig] = useState({ groupDeadline: "2026-06-11T00:00" });
  const [loading, setLoading] = useState(true);

  // Load data function (reusable for refresh)
  const loadData = useCallback(async (initial = false) => {
    try {
      const [u, r, c] = await Promise.all([
        sGet("wc-users"),
        sGet("wc-results"),
        sGet("wc-config"),
      ]);
      if (u) setUsers(u);
      if (r) setRealResults(r);
      if (c) setConfig(c);

      // Load all predictions
      if (u && u.length > 0) {
        const preds = {};
        for (const user of u) {
          const p = await sGet(`wc-pred-${user.id}`);
          if (p) preds[user.id] = p;
        }
        setAllPredictions(preds);
      }
    } catch (e) {
      console.error("Load error:", e);
    }
    if (initial) {
      setLoading(false);
      // Auto-restore admin session
      if (typeof localStorage !== "undefined" && localStorage.getItem("kyporra_admin") === "1") {
        setIsAdmin(true);
        setView("admin");
      }
    }
  }, []);

  // Initial load
  useEffect(() => { loadData(true); }, []);

  // Auto-refresh when user returns to tab
  useEffect(() => {
    const onFocus = () => { if (!loading) loadData(false); };
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") onFocus();
    });
    return () => document.removeEventListener("visibilitychange", onFocus);
  }, [loading, loadData]);

  const handleRegister = async (newUser) => {
    const existing = users.find((u) => u.email === newUser.email);
    if (existing) {
      setCurrentUser(existing);
      if (existing.approved) setView("dashboard");
      else setView("pending");
      return;
    }
    const newUsers = [...users, newUser];
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    setCurrentUser(newUser);
    setView("pending");
  };

  const handleLogin = (user) => {
    setCurrentUser(user);
    setView("dashboard");
  };

  const handleAdminLogin = () => {
    setIsAdmin(true);
    setView("admin");
    if (typeof localStorage !== "undefined") localStorage.setItem("kyporra_admin", "1");
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setIsAdmin(false);
    setView("landing");
    if (typeof localStorage !== "undefined") localStorage.removeItem("kyporra_admin");
  };

  if (loading) {
    return (
      <div style={{ ...baseStyle, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <style>{`@keyframes spinLoad { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`}</style>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 12, animation: "spinLoad 2s linear infinite", display: "inline-block" }}>⚽</div>
          <p style={{ color: C.gold, fontWeight: 600, letterSpacing: 1 }}>Cargando KYPorra 2026...</p>
        </div>
      </div>
    );
  }

  return (
    <div style={baseStyle}>
      {view === "landing" && (
        <LandingView
          onLogin={() => setView("login")}
          onRegister={() => setView("register")}
          onAdmin={() => setView("adminLogin")}
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
        />
      )}
      {view === "login" && (
        <LoginView
          onBack={() => setView("landing")}
          onSuccess={handleLogin}
          users={users}
        />
      )}
      {view === "register" && (
        <RegisterView
          onBack={() => setView("landing")}
          onSuccess={handleRegister}
        />
      )}
      {view === "adminLogin" && (
        <AdminLoginView
          onBack={() => setView("landing")}
          onSuccess={handleAdminLogin}
        />
      )}
      {view === "pending" && (
        <PendingView onBack={() => setView("landing")} user={currentUser} />
      )}
      {view === "dashboard" && currentUser && (
        <UserDashboard
          user={currentUser}
          onLogout={handleLogout}
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
          config={config}
        />
      )}
      {view === "admin" && (
        <AdminDashboardWrapper
          onLogout={handleLogout}
          users={users}
          setUsers={setUsers}
          realResults={realResults}
          setRealResults={setRealResults}
          config={config}
          setConfig={setConfig}
          allPredictions={allPredictions}
        />
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
