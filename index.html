function AdminBackup({ users, setUsers, realResults, setRealResults, allPredictions, knockoutSetup, setKnockoutSetup, config, setConfig, onRefresh }) {
  const [subTab, setSubTab] = useState("backup");
  const [restoring, setRestoring] = useState(false);
  const [exportStatus, setExportStatus] = useState("");

  const handleExport = async () => {
    setExportStatus("Reading from Firebase...");
    try {
      const [u, r, c, ko] = await Promise.all([
        sGet("wc-users"),
        sGet("wc-results"),
        sGet("wc-config"),
        sGet("wc-knockout"),
      ]);
      const predictions = {};
      if (u && u.length > 0) {
        for (const user of u) {
          const p = await sGet("wc-pred-" + user.id);
          if (p) predictions[user.id] = p;
        }
      }
      const backup = {
        _meta: {
          version: "v13EG",
          exportedAt: new Date().toISOString(),
          totalUsers: (u || []).length,
          totalPredictions: Object.keys(predictions).length,
        },
        users: u || [],
        results: r || {},
        config: c || {},
        knockout: ko || {},
        predictions,
      };
      const date = new Date().toISOString().slice(0, 10);

      // 1) JSON backup
      const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "kyporra_backup_" + date + ".json";
      a.click();
      URL.revokeObjectURL(url);

      // 2) Excel backup
      setExportStatus("Generating Excel...");
      try {
        const wb = XLSX.utils.book_new();
        const approvedUsers = (u || []).filter((x) => x.approved);

        // Sheet 1: Users
        const usersData = (u || []).map((x) => ({
          Name: x.name, Surname: x.surname, Email: x.email, Team: x.team,
          Approved: x.approved ? "Yes" : "No", Created: x.createdAt || "",
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(usersData), "Users");

        // Sheet 2: Ranking
        const P = getPoints(r);
        const rankData = approvedUsers.map((x) => {
          const preds = predictions[x.id] || {};
          const { total, breakdown } = calcUserPoints(preds, r || {});
          return {
            Name: x.name + " " + x.surname, Team: x.team, "Total Points": total,
            "Group Scores": breakdown.groupScores || 0, "Group Position": breakdown.groupPosition || 0,
            "Group Advance": breakdown.groupAdvance || 0, "Globals": breakdown.globals || 0,
            "Knockout": breakdown.knockout || 0, "Manual Adj.": breakdown.manual || 0,
          };
        }).sort((a, b) => b["Total Points"] - a["Total Points"]);
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rankData), "Ranking");

        // Sheet 3: Global Predictions
        const globalsData = approvedUsers.map((x) => {
          const g = predictions[x.id]?.globals || {};
          return {
            Name: x.name + " " + x.surname,
            Champion: TEAMS[g.champion]?.name || g.champion || "",
            "Top Scorer": g.topScorer || "",
            MVP: g.mvp || "",
          };
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(globalsData), "Globals");

        // Sheet 4: Group Predictions (one row per user per match)
        const groupRows = [];
        approvedUsers.forEach((x) => {
          const gp = predictions[x.id]?.groups || {};
          Object.keys(gp).forEach((matchKey) => {
            const s = gp[matchKey];
            const parts = matchKey.split("-");
            groupRows.push({
              Name: x.name + " " + x.surname,
              Group: parts[0],
              Home: TEAMS[parts[1]]?.name || parts[1],
              Away: TEAMS[parts[2]]?.name || parts[2],
              "Pred Home": s?.home ?? "", "Pred Away": s?.away ?? "",
            });
          });
        });
        if (groupRows.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(groupRows), "Group Predictions");

        // Sheet 5: Knockout Predictions
        const koRows = [];
        approvedUsers.forEach((x) => {
          const kp = predictions[x.id]?.knockout || {};
          Object.keys(kp).forEach((matchKey) => {
            const s = kp[matchKey];
            koRows.push({
              Name: x.name + " " + x.surname,
              Match: matchKey,
              "Pred Home": s?.home ?? "", "Pred Away": s?.away ?? "",
              "Pred Advances": TEAMS[s?.advances]?.name || s?.advances || "",
            });
          });
        });
        if (koRows.length > 0) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(koRows), "Knockout Predictions");

        XLSX.writeFile(wb, "kyporra_backup_" + date + ".xlsx");
      } catch(xlsErr) {
        console.error("Excel export failed:", xlsErr);
      }

      setExportStatus("✅ Backup downloaded (JSON + Excel) — " + (u || []).length + " users, " + Object.keys(predictions).length + " predictions");
    } catch (e) {
      setExportStatus("❌ Error: " + e.message);
    }
  };

  const handleRestore = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.users || !backup._meta) {
        alert("❌ Invalid backup file — missing required fields.");
        return;
      }
      const msg = "⚠️ RESTORE BACKUP\n\n" +
        "File: " + file.name + "\n" +
        "Exported: " + (backup._meta.exportedAt || "unknown") + "\n" +
        "Users: " + backup.users.length + "\n" +
        "Predictions: " + Object.keys(backup.predictions || {}).length + "\n\n" +
        "This will OVERWRITE all current data in Firebase.\n\n" +
        "Type 'RESTORE' to confirm:";
      const confirm = prompt(msg);
      if (confirm !== "RESTORE") {
        alert("Restore cancelled.");
        return;
      }
      setRestoring(true);
      await sSet("wc-users", backup.users);
      await sSet("wc-results", backup.results || {});
      await sSet("wc-config", backup.config || {});
      await sSet("wc-knockout", backup.knockout || {});
      if (backup.predictions) {
        for (const [userId, preds] of Object.entries(backup.predictions)) {
          await sSet("wc-pred-" + userId, preds);
        }
      }
      setUsers(backup.users);
      setRealResults(backup.results || {});
      if (backup.config) setConfig(backup.config);
      if (backup.knockout) setKnockoutSetup(backup.knockout);
      setRestoring(false);
      alert("✅ Restore complete — " + backup.users.length + " users, " + Object.keys(backup.predictions || {}).length + " predictions restored.\n\nRefreshing data...");
      if (onRefresh) onRefresh();
    } catch (err) {
      setRestoring(false);
      alert("❌ Error restoring: " + err.message);
    }
    e.target.value = "";
  };

  return (
    <div>
      {/* Internal sub-tab toggle */}
      <div style={{ display: "flex", gap: 4, marginBottom: 16, padding: 3, background: "#0f0f0f", border: "1px solid #2a2a2a", borderRadius: 8 }}>
        <button
          onClick={() => setSubTab("backup")}
          style={{
            flex: 1, padding: "8px 12px",
            background: subTab === "backup" ? "rgba(197,160,89,0.15)" : "transparent",
            color: subTab === "backup" ? C.gold : C.muted,
            border: "1px solid " + (subTab === "backup" ? "rgba(197,160,89,0.3)" : "transparent"),
            borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
            fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.08em",
          }}
        >
          📦 Backup & Restore
        </button>
        <button
          onClick={() => setSubTab("audit")}
          style={{
            flex: 1, padding: "8px 12px",
            background: subTab === "audit" ? "rgba(197,160,89,0.15)" : "transparent",
            color: subTab === "audit" ? C.gold : C.muted,
            border: "1px solid " + (subTab === "audit" ? "rgba(197,160,89,0.3)" : "transparent"),
            borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
            fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.08em",
          }}
        >
          🔍 Player Audit
        </button>
      </div>

      {subTab === "audit" && (
        <AdminPlayerAudit
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
          knockoutSetup={knockoutSetup}
        />
      )}

      {subTab === "backup" && (
        <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 16px" }}>📦 Backup & Restore</h2>

      <Card style={{ marginBottom: 16 }} glow>
        <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: "0.05em" }}>📤 Export Backup</h3>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 12px" }}>
          Downloads a JSON file with all data: users, predictions, results, knockout brackets, config. Save it somewhere safe.
        </p>
        <button
          onClick={handleExport}
          style={{
            width: "100%", padding: "12px", background: "rgba(52,211,153,0.15)", color: C.green,
            border: "1px solid rgba(52,211,153,0.3)", borderRadius: 8, fontSize: 13,
            fontWeight: 700, cursor: "pointer", fontFamily: "'Oswald', sans-serif",
            textTransform: "uppercase", letterSpacing: "0.08em",
          }}
        >
          📦 Download Full Backup
        </button>
        {exportStatus && <p style={{ fontSize: 11, color: C.muted, marginTop: 8 }}>{exportStatus}</p>}
      </Card>

      <Card style={{ marginBottom: 16 }}>
        <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: "0.05em" }}>📥 Restore from Backup</h3>
        <p style={{ fontSize: 12, color: C.muted, margin: "0 0 4px" }}>
          Upload a previously exported JSON backup. This will <strong style={{ color: C.red }}>overwrite ALL current data</strong>.
        </p>
        <p style={{ fontSize: 11, color: C.red, margin: "0 0 12px" }}>
          You will need to type "RESTORE" to confirm. Use only as emergency recovery.
        </p>
        <label
          style={{
            display: "block", width: "100%", padding: "12px", textAlign: "center",
            background: restoring ? "#1a1a1a" : "rgba(248,113,113,0.1)", color: restoring ? C.muted : C.red,
            border: "1px solid " + (restoring ? "#333" : "rgba(248,113,113,0.3)"), borderRadius: 8, fontSize: 13,
            fontWeight: 700, cursor: restoring ? "not-allowed" : "pointer", fontFamily: "'Oswald', sans-serif",
            textTransform: "uppercase", letterSpacing: "0.08em", boxSizing: "border-box",
          }}
        >
          {restoring ? "Restoring..." : "📥 Upload Backup File"}
          <input type="file" accept=".json" onChange={handleRestore} disabled={restoring} style={{ display: "none" }} />
        </label>
      </Card>

      <Card style={{ background: "#111111" }}>
        <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: "0.05em" }}>💡 Tips</h3>
        <div style={{ fontSize: 12, color: C.muted, display: "flex", flexDirection: "column", gap: 6 }}>
          <p style={{ margin: 0 }}>• Export a backup <strong style={{ color: C.white }}>right now</strong> before the tournament starts</p>
          <p style={{ margin: 0 }}>• Export again after each knockout round</p>
          <p style={{ margin: 0 }}>• The JSON file contains everything — if Firebase gets wiped, you can restore it fully</p>
          <p style={{ margin: 0 }}>• Keep backups in Google Drive or your local machine</p>
        </div>
      </Card>
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   STORY HELPERS — phase detection for the Stadium+Ritual cover
   ───────────────────────────────────────────── */
const KO_ROUND_LABELS_BIG = { r32: "ROUND OF 32", r16: "ROUND OF 16", qf: "QUARTER FINALS", sf: "SEMI FINALS", third: "THIRD PLACE", final: "FINAL" };
const KO_ROUND_TAGLINES = {
  r32: "32 DREAMS LEFT",
  r16: "16 DREAMS LEFT",
  qf: "8 STANDING",
  sf: "4 LEFT · GLORY IS NEAR",
  third: "BRONZE MEDAL · ONE LAST FIGHT",
  final: "IT ENDS HERE",
};
const KO_ROUND_BREATH = { r32: "4s", r16: "4s", qf: "3.2s", sf: "2.6s", third: "2.4s", final: "2s" };

function getLiveKoRound(realKo) {
  realKo = realKo || {};
  for (const rk of KO_ROUND_ORDER) {
    const count = KO_ROUND_SIZES[rk];
    let allDone = true;
    for (let i = 1; i <= count; i++) {
      if (!realKo[rk + "-" + i]?.advances) { allDone = false; break; }
    }
    if (!allDone) return rk;
  }
  return "final";
}

function getAliveTeams(realKo, knockoutSetup) {
  // The "alive" teams = teams that still have a match to play in the live round.
  // R32 live: all participants of R32.
  // R16 live: advancers of R32 (16 teams).
  // QF live: advancers of R16 (8 teams).
  // SF live: advancers of QF (4 teams).
  // Third live: the two SF losers (they fight for bronze).
  // Final live: the two SF winners (they fight for the trophy).
  realKo = realKo || {};
  const live = getLiveKoRound(realKo);
  if (live === "r32") {
    const teams = [];
    (knockoutSetup?.r32 || []).forEach((m) => {
      if (m?.home) teams.push(m.home);
      if (m?.away) teams.push(m.away);
    });
    return teams;
  }
  if (live === "final") {
    // Finalists = SF winners
    const a = realKo["sf-1"]?.advances;
    const b = realKo["sf-2"]?.advances;
    return [a, b].filter(Boolean);
  }
  if (live === "third") {
    // Third place contestants = SF losers
    const losers = [];
    ["sf-1", "sf-2"].forEach((sfId) => {
      const adv = realKo[sfId]?.advances;
      const teams = getKnockoutTeam(sfId, knockoutSetup, realKo, realKo);
      if (adv && teams.home && teams.away) {
        losers.push(adv === teams.home ? teams.away : teams.home);
      }
    });
    return losers;
  }
  // r16, qf, sf: advancers of previous round
  const idx = KO_ROUND_ORDER.indexOf(live);
  const prev = KO_ROUND_ORDER[idx - 1];
  const count = KO_ROUND_SIZES[prev];
  const teams = [];
  for (let i = 1; i <= count; i++) {
    const adv = realKo[prev + "-" + i]?.advances;
    if (adv) teams.push(adv);
  }
  return teams;
}

function getNextKoMatch(realKo, knockoutSetup) {
  // First match (by date) of the live round that doesn't have advances yet.
  realKo = realKo || {};
  const live = getLiveKoRound(realKo);
  const count = KO_ROUND_SIZES[live];
  const candidates = [];
  for (let i = 1; i <= count; i++) {
    const matchId = live + "-" + i;
    if (realKo[matchId]?.advances) continue;
    const teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo);
    const date = KO_SCHEDULE[matchId];
    candidates.push({ matchId, round: live, idx: i, home: teams.home, away: teams.away, date });
  }
  if (!candidates.length) return null;
  candidates.sort((a, b) => {
    if (!a.date) return 1;
    if (!b.date) return -1;
    return new Date(a.date).getTime() - new Date(b.date).getTime();
  });
  return candidates[0];
}

/* ─────────────────────────────────────────────
   STORY COMPONENTS
   ───────────────────────────────────────────── */
function AliveFlagsConstellation({ teams, sizeOverride, opacityOverride }) {
  // Constellation of flags floating around the title, like satellites.
  // Avoids the central title band and the lower leaderboard area.
  if (!teams || !teams.length) return null;
  const size = sizeOverride || 14;
  const opacity = opacityOverride != null ? opacityOverride : 0.15;
  // Distribute teams in an elliptical orbit around the title (centered ~22% from top)
  // Concentrate in top 65% of viewport so leaderboard below stays clean.
  // Use golden angle for even angular distribution.
  const positions = teams.map((code, i) => {
    const angle = (i * 137.508) % 360;
    const rad = angle * Math.PI / 180;
    // Two orbits: inner (close to title) and outer (near edges), alternating
    const ring = i % 2 === 0 ? "outer" : "inner";
    const rx = ring === "outer" ? 46 : 30;   // horizontal radius (% of viewport width)
    const ry = ring === "outer" ? 22 : 14;   // vertical radius (% of viewport height) - shorter to keep in top half
    const cyCenter = 24;                      // title vertical anchor (% from top)
    let cx = 50 + Math.cos(rad) * rx;
    let cy = cyCenter + Math.sin(rad) * ry;
    // Avoid the title text band: if too close to center horizontally AND vertically, push outward
    const dxFromCenter = Math.abs(cx - 50);
    const dyFromTitle = Math.abs(cy - cyCenter);
    if (dxFromCenter < 22 && dyFromTitle < 8) {
      // Push outward in the same direction
      cy = cy < cyCenter ? cyCenter - 14 : cyCenter + 16;
    }
    // Clamp inside viewport
    cx = Math.max(3, Math.min(95, cx));
    cy = Math.max(4, Math.min(60, cy));
    return { code, left: cx, top: cy, dur: 11 + (i % 5) * 2, delay: (i * 0.7) % 8 };
  });
  return (
    <div aria-hidden style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 0 }}>
      {positions.map((p, i) => {
        const iso = TEAMS[p.code]?.flag;
        if (!iso) return null;
        const w = Math.round(size * 4 / 3);
        return (
          <span
            key={p.code + "-" + i}
            className={"fi fi-" + iso}
            style={{
              position: "absolute",
              left: p.left + "%", top: p.top + "%",
              width: w, height: size,
              backgroundSize: "cover",
              borderRadius: 2,
              opacity,
              filter: "saturate(0.7) blur(0.3px)",
              animation: "constellationFloat " + p.dur + "s ease-in-out infinite",
              animationDelay: p.delay + "s",
            }}
          />
        );
      })}
    </div>
  );
}

function GoldParticles({ count = 18 }) {
  // Slow falling gold dust particles. Used for Final intensity.
  const particles = Array.from({ length: count }, (_, i) => {
    const left = (i * 53) % 100;
    const size = 2 + (i % 3);
    const dur = 14 + (i % 7) * 2;
    const delay = (i * 1.3) % dur;
    return { left, size, dur, delay };
  });
  return (
    <div aria-hidden style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden", zIndex: 0 }}>
      {particles.map((p, i) => (
        <span key={i} style={{
          position: "absolute",
          left: p.left + "%", top: 0,

          background: "radial-gradient(circle, rgba(255,224,138,0.9), rgba(212,175,55,0.3) 50%, transparent 80%)",
          animation: "goldParticle " + p.dur + "s linear infinite",

function KoCountdown({ targetDate }) {
  // Live HH:MM:SS countdown until kickoff. If past kickoff, shows "LIVE NOW".
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  if (!targetDate) return null;
  const diff = new Date(targetDate).getTime() - now;
  if (diff <= 0) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
        <span style={{ width: 8, height: 8, borderRadius: "50%", background: C.red, animation: "ritualHaloExpand 1.4s ease-out infinite" }} />
        <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 22, color: C.red, fontWeight: 700, letterSpacing: "0.18em" }}>LIVE NOW</span>
      </div>
    );
  }
  const totalSec = Math.floor(diff / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  const pad = (n) => String(n).padStart(2, "0");
  const cellStyle = { fontFamily: "'Oswald', sans-serif", fontSize: 36, fontWeight: 700, color: C.goldLight, letterSpacing: "0.06em", textShadow: "0 0 14px rgba(212,175,55,0.35)" };
  const sepStyle = { fontFamily: "'Oswald', sans-serif", fontSize: 32, color: C.muted, opacity: 0.5 };
  const labStyle = { fontFamily: "'Oswald', sans-serif", fontSize: 8, color: C.muted, letterSpacing: "0.2em", marginTop: 4 };
  return (
    <div>
      <div style={{ fontSize: 9, color: C.muted, letterSpacing: "0.32em", fontWeight: 600, marginBottom: 10, textAlign: "center" }}>KICKOFF IN</div>
      <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 6 }}>
        {days > 0 && (
          <>
            <div style={{ textAlign: "center" }}>
              <div style={cellStyle}>{pad(days)}</div>
              <div style={labStyle}>DAYS</div>
            </div>
            <span style={sepStyle}>:</span>
          </>
        )}
        <div style={{ textAlign: "center" }}>
          <div style={cellStyle}>{pad(hours)}</div>
          <div style={labStyle}>HRS</div>
        </div>
        <span style={sepStyle}>:</span>
        <div style={{ textAlign: "center" }}>
          <div style={cellStyle}>{pad(mins)}</div>
          <div style={labStyle}>MIN</div>
        </div>
        <span style={sepStyle}>:</span>
        <div style={{ textAlign: "center" }}>
          <div style={cellStyle}>{pad(secs)}</div>
          <div style={labStyle}>SEC</div>
        </div>
      </div>
    </div>
  );
}

                <div style={{ textAlign: "center" }}>
                  <TeamBadge code={nextMatch.away} size="lg" hideLabel />
                  <div style={{ marginTop: 8, fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 700, color: C.white, letterSpacing: "0.18em", textTransform: "uppercase" }}>{TEAMS[nextMatch.away]?.name || nextMatch.away}</div>
                </div>
              </div>
              {nextMatch.date && (
                <>
                  <div style={{ height: 1, background: "linear-gradient(90deg, transparent, rgba(197,160,89,0.25), transparent)", margin: "12px 8px 16px" }} />
                  <KoCountdown targetDate={nextMatch.date} />
                </>
              )}
            </div>
          )}

          {/* Bracket progress */}
          <div style={{ marginTop: 22 }}>
            <div style={{ textAlign: "center", fontSize: 9, color: C.muted, letterSpacing: "0.32em", fontWeight: 600, marginBottom: 12 }}>— BRACKET PROGRESS —</div>
            <BracketProgressDots liveRound={liveRound} />
          </div>
        </div>
      </StadiumBackground>
    </div>
  );
}

function App() {
  const [view, setView] = useState("landing");
  const [currentUser, setCurrentUser] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const [users, setUsers] = useState([]);
  const [allPredictions, setAllPredictions] = useState({});
  const [realResults, setRealResults] = useState({});
  const [config, setConfig] = useState({});
  const [knockoutSetup, setKnockoutSetup] = useState(null);
  const [loading, setLoading] = useState(true);

  // Load data function (reusable for refresh)
  const loadData = useCallback(async (initial = false) => {
    try {
      const [u, r, c, ko] = await Promise.all([
        sGet("wc-users"),
        sGet("wc-results"),
        sGet("wc-config"),
        sGet("wc-knockout"),
      ]);
      if (u) setUsers(u);
      if (r) setRealResults(r);
      if (c) setConfig(c);
      if (ko) setKnockoutSetup(ko);

      // Load all predictions
      if (u && u.length > 0) {
        const preds = {};
        for (const user of u) {
          const p = await sGet(`wc-pred-${user.id}`);
          if (p) preds[user.id] = p;
        }
        setAllPredictions(preds);
      }
    } catch (e) {
      console.error("Load error:", e);
    }
    if (initial) {
      setLoading(false);
      // Auto-restore admin session
      if (typeof localStorage !== "undefined" && localStorage.getItem("kyporra_admin") === "1") {
        setIsAdmin(true);
        setView("admin");
      }
      // Auto-restore user session
      else if (typeof localStorage !== "undefined" && localStorage.getItem("kyporra_email")) {
        const savedEmail = localStorage.getItem("kyporra_email");
        const savedPass = localStorage.getItem("kyporra_pass") || "";
        const loadedUsers = u || [];
        const savedUser = loadedUsers.find((usr) => usr.email === savedEmail && usr.approved);
        if (savedUser) {
          let passOk = false;
          if (!savedUser.password) passOk = true;
          else if (isHashed(savedUser.password)) {
            const h = await hashString(savedPass);
            passOk = h === savedUser.password;
          } else {
            passOk = savedUser.password === savedPass;
          }
          if (passOk) { setCurrentUser(savedUser); setView("dashboard"); }
        }
      }
    }
  }, []);

  // Initial load
  useEffect(() => { loadData(true); }, []);

  // Auto-refresh when user returns to tab
  useEffect(() => {
    const onVisChange = () => {
      if (document.visibilityState === "visible" && !loading) loadData(false);
    };
    document.addEventListener("visibilitychange", onVisChange);
    return () => document.removeEventListener("visibilitychange", onVisChange);
  }, [loading, loadData]);

  // Periodic background refresh every 30 seconds (only when visible)
  useEffect(() => {
    const interval = setInterval(() => {
      if (document.visibilityState === "visible" && !loading) {
        loadData(false);
      }
    }, 30000);
    return () => clearInterval(interval);
  }, [loading, loadData]);

  const handleRegister = async (newUser) => {
    // Re-read latest users from Firebase to prevent race condition
    const latestUsers = await sGet("wc-users") || users;
    const existing = latestUsers.find((u) => u.email === newUser.email);
    if (existing) {
      setCurrentUser(existing);
      setUsers(latestUsers);
      if (existing.approved) setView("dashboard");
      else setView("pending");
      return;
    }
    const newUsers = [...latestUsers, newUser];
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    setCurrentUser(newUser);
    setView("pending");
  };

  const handleLogin = (user) => {
    setCurrentUser(user);
    setView("dashboard");
  };

  const handleAdminLogin = () => {
    setIsAdmin(true);
    setView("admin");
    if (typeof localStorage !== "undefined") localStorage.setItem("kyporra_admin", "1");
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setIsAdmin(false);
    setView("landing");
    if (typeof localStorage !== "undefined") {
      localStorage.removeItem("kyporra_admin");
      localStorage.removeItem("kyporra_email");
      localStorage.removeItem("kyporra_pass");
    }
  };

  if (loading) {
    return (
      <div style={{ ...baseStyle, minHeight: "100vh", display: "flex", alignItems: "stretch", justifyContent: "stretch", padding: 0 }}>
        <StadiumBackground intensity={1}>
          <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
            <div style={{ textAlign: "center" }}>
              <StadiumTitle size={56} breath="3s" subtitle="WORLD CUP 2026">KYPORRA</StadiumTitle>
              <div style={{ display: "flex", justifyContent: "center", marginTop: 30 }}>
                <MinimalistBall size={42} />
              </div>
              <LoadingRotatingText />
            </div>
          </div>
        </StadiumBackground>
      </div>
    );
  }

  return (
    <div style={baseStyle}>
      {view === "landing" && (
        <LandingView
          onLogin={() => setView("login")}
          onRegister={() => setView("register")}
          onAdmin={() => setView("adminLogin")}
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
          knockoutSetup={knockoutSetup}
        />
      )}
      {view === "login" && (
        <LoginView
          onBack={() => setView("landing")}
          onSuccess={handleLogin}
          users={users}
          onMigrate={async (migratedUser) => {
            const newUsers = users.map((u) => u.id === migratedUser.id ? migratedUser : u);
            setUsers(newUsers);
            await sSet("wc-users", newUsers);
          }}
        />
      )}
      {view === "register" && (
        <RegisterView
          onBack={() => setView("landing")}
          onSuccess={handleRegister}
        />
      )}
      {view === "adminLogin" && (
        <AdminLoginView
          onBack={() => setView("landing")}
          onSuccess={handleAdminLogin}
        />
      )}
      {view === "pending" && (
        <PendingView onBack={() => setView("landing")} user={currentUser} />
      )}
      {view === "dashboard" && currentUser && (
        <UserDashboard
          user={currentUser}
          onLogout={handleLogout}
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
          config={config}
          knockoutSetup={knockoutSetup}
        />
      )}
      {view === "admin" && (
        <AdminDashboardWrapper
          onLogout={handleLogout}
          users={users}
          setUsers={setUsers}
          realResults={realResults}
          setRealResults={setRealResults}
          config={config}
          setConfig={setConfig}
          allPredictions={allPredictions}
          setAllPredictions={setAllPredictions}
          knockoutSetup={knockoutSetup}
          setKnockoutSetup={setKnockoutSetup}
          onRefresh={() => loadData(false)}
        />
      )}
    </div>
  );
}


function Footer() {
  return (
    <div style={{ position: "fixed", bottom: 10, right: 14, fontSize: 9, color: "rgba(255,255,255,0.15)", fontFamily: "'Plus Jakarta Sans', sans-serif", letterSpacing: "0.1em", textTransform: "uppercase" }}>
      powered by <span style={{ color: "rgba(197,160,89,0.35)", fontWeight: 700 }}>David Rey</span>
    </div>
  );
}

function Root() {
  return (<><App /><Footer /></>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
