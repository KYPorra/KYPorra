          <span style={{ fontSize: 11, color: C.muted }}>vs</span>
          <TeamBadge code={awayCode} size="sm" />
        </div>
        {played ? <span style={{ fontSize: 13, fontWeight: 700, color: C.white, fontFamily: "'Oswald', sans-serif" }}>{real.home} - {real.away}</span>
          : dateStr ? <span style={{ fontSize: 9, color: C.muted }}>{formatMatchDate(dateStr)}</span> : null}
      </div>
    );
  };

  const renderPredictions = () => {
    if (!selectedMatch) return null;
    const isKo = selectedMatch.startsWith("ko-");
    const matchKey = isKo ? selectedMatch.slice(3) : selectedMatch;
    const real = isKo ? realResults?.knockout?.[matchKey] : realResults?.groups?.[matchKey];
    const played = real && real.home != null && real.away != null;
    // For KO matches, hide predictions until kickoff
    const koKickoff = isKo && KO_SCHEDULE[matchKey] ? new Date(KO_SCHEDULE[matchKey]) : null;
    const koStarted = koKickoff ? new Date() >= koKickoff : true;
    if (isKo && !koStarted) {
      let homeCode, awayCode;
      const teams = getKnockoutTeam(matchKey, knockoutSetup, realResults?.knockout || {}, realResults?.knockout);
      homeCode = teams?.home; awayCode = teams?.away;
      return (
        <div>
          <Card style={{ marginBottom: 8, textAlign: "center" }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 12 }}>
              <div style={{ textAlign: "right" }}><TeamBadge code={homeCode} /></div>
              <div style={{ fontSize: 14, color: C.muted }}>vs</div>
              <div style={{ textAlign: "left" }}><TeamBadge code={awayCode} /></div>
            </div>
          </Card>
          <Card>
            <div style={{ textAlign: "center", padding: "20px 0" }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>🔒</div>
              <p style={{ color: C.gold, fontSize: 13, fontWeight: 600, margin: "0 0 4px" }}>Predictions hidden until kickoff</p>
              <p style={{ color: C.muted, fontSize: 11, margin: 0 }}>{formatMatchDate(KO_SCHEDULE[matchKey])}</p>
            </div>
          </Card>
        </div>
      );
    }
    let homeCode, awayCode;
    if (isKo) {
      const teams = getKnockoutTeam(matchKey, knockoutSetup, realResults?.knockout || {}, realResults?.knockout);
      homeCode = teams?.home; awayCode = teams?.away;
    } else {
      const parts = matchKey.split("-");
      homeCode = parts[1]; awayCode = parts[2];
    }
    const playerPreds = approved.map((u) => {
      const p = isKo ? allPredictions[u.id]?.knockout?.[matchKey] : allPredictions[u.id]?.groups?.[matchKey];
      const acc = played ? getMatchAccuracy(p, real) : "pending";
      return { ...u, pH: p?.home ?? 0, pA: p?.away ?? 0, acc };
    }).sort((a, b) => {
      const ord = { exact: 0, correct: 1, wrong: 2, pending: 3 };
      return (ord[a.acc] || 3) - (ord[b.acc] || 3) || a.name.localeCompare(b.name);
    });
    const exactN = playerPreds.filter((p) => p.acc === "exact").length;
    const correctN = playerPreds.filter((p) => p.acc === "correct").length;
    const wrongN = playerPreds.filter((p) => p.acc === "wrong").length;
    return (
      <div>
        <Card style={{ marginBottom: 8, textAlign: "center" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 12 }}>
            <div style={{ textAlign: "right" }}><TeamBadge code={homeCode} /></div>
            {played ? <div className="font-display" style={{ fontSize: 28, fontWeight: 700 }}>{real.home} - {real.away}</div>
              : <div style={{ fontSize: 14, color: C.muted }}>vs</div>}
            <div style={{ textAlign: "left" }}><TeamBadge code={awayCode} /></div>
          </div>
          {played && (
            <div style={{ display: "flex", justifyContent: "center", gap: 16, fontSize: 11, marginTop: 8 }}>
              <span style={{ color: ACC_C.exact }}>🎯 {exactN} exact</span>
              <span style={{ color: ACC_C.correct }}>★ {correctN} correct</span>
              <span style={{ color: ACC_C.wrong }}>✕ {wrongN} wrong</span>
            </div>
          )}
        </Card>
        <Card>
          {playerPreds.map((p, i) => (
            <div key={p.id} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "8px 6px",
              borderBottom: i < playerPreds.length - 1 ? "1px solid " + C.border : "none",
              borderLeft: played ? "3px solid " + ACC_C[p.acc] + "50" : "3px solid transparent",
            }}>
              <div style={{ flex: 1, marginLeft: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 600 }}>{p.name} {p.surname}</span>
                <span style={{ fontSize: 10, color: C.muted, marginLeft: 6 }}>{p.team}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span className="font-display" style={{ fontSize: 16, fontWeight: 700, color: played ? ACC_C[p.acc] : C.muted }}>{p.pH} - {p.pA}</span>
                {p.acc === "exact" && <span style={{ fontSize: 10 }}>🎯</span>}
                {p.acc === "correct" && <span style={{ fontSize: 10, color: C.gold }}>★</span>}
              </div>
            </div>
          ))}
        </Card>
      </div>
    );
  };

  const [stageMode, setStageMode] = useState("groups");

  return (
    <div>
      <div style={{ display: "flex", gap: 4, background: "#0a0e1a", borderRadius: 8, padding: 3, marginBottom: 12 }}>
        <button onClick={() => { setStageMode("groups"); setMatchPhase("group-A"); setSelectedMatch(null); }} className="trans" style={{
          flex: 1, padding: "8px 12px",
          background: stageMode === "groups" ? C.card : "transparent",
          color: stageMode === "groups" ? C.gold : C.muted,
          border: stageMode === "groups" ? "1px solid " + C.border : "1px solid transparent",
          borderRadius: 6, fontFamily: "'Oswald', sans-serif", fontSize: 11, fontWeight: 600,
          textTransform: "uppercase", cursor: "pointer", letterSpacing: "0.06em",
        }}>⚽ Grupos</button>
        <button onClick={() => { setStageMode("ko"); setMatchPhase("ko-r32"); setSelectedMatch(null); }} className="trans" style={{
          flex: 1, padding: "8px 12px",
          background: stageMode === "ko" ? C.card : "transparent",
          color: stageMode === "ko" ? C.gold : C.muted,
          border: stageMode === "ko" ? "1px solid " + C.border : "1px solid transparent",
          borderRadius: 6, fontFamily: "'Oswald', sans-serif", fontSize: 11, fontWeight: 600,
          textTransform: "uppercase", cursor: "pointer", letterSpacing: "0.06em",
        }}>🏟️ Knockouts</button>
      </div>
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 12 }}>
        {stageMode === "groups" && Object.keys(GROUPS).map((g) => (
          <button key={g} onClick={() => { setMatchPhase("group-" + g); setSelectedMatch(null); }} className="trans" style={{
            padding: "6px 10px", borderRadius: 6, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "'Oswald', sans-serif",
            background: matchPhase === "group-" + g ? C.card : "transparent",
            color: matchPhase === "group-" + g ? C.gold : C.muted,
            border: matchPhase === "group-" + g ? "1px solid " + C.border : "1px solid transparent",
          }}>{g}</button>
        ))}
        {stageMode === "ko" && ROUNDS.map((r) => (
          <button key={r.key} onClick={() => { setMatchPhase("ko-" + r.key); setSelectedMatch(null); }} className="trans" style={{
            padding: "6px 10px", borderRadius: 6, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "'Oswald', sans-serif",
            background: matchPhase === "ko-" + r.key ? C.card : "transparent",
            color: matchPhase === "ko-" + r.key ? C.gold : C.muted,
            border: matchPhase === "ko-" + r.key ? "1px solid " + C.border : "1px solid transparent",
          }}>{r.label.replace("Round of ", "R")}</button>
        ))}
      </div>
      {matchPhase.startsWith("group-") && (
        <Card style={{ marginBottom: 12 }}>
          <h4 style={{ fontSize: 13, color: C.gold, fontFamily: "'Oswald', sans-serif", margin: "0 0 8px" }}>Group {matchPhase.split("-")[1]}</h4>
          {getGroupMatches(matchPhase.split("-")[1]).map((m) => {
            const g = matchPhase.split("-")[1];
            const key = g + "-" + m.home + "-" + m.away;
            return renderMatchCard(key, m.home, m.away, realResults?.groups?.[key], m.date, false);
          })}
        </Card>
      )}
      {matchPhase.startsWith("ko-") && (() => {
        const r = ROUNDS.find((rd) => rd.key === matchPhase.replace("ko-", ""));
        if (!r) return null;
        return (
          <Card style={{ marginBottom: 12 }}>
            <h4 style={{ fontSize: 13, color: C.gold, fontFamily: "'Oswald', sans-serif", margin: "0 0 8px" }}>{r.label}</h4>
            {Array.from({ length: r.matches }, (_, i) => {
              const matchId = r.key + "-" + (i + 1);
              const teams = getKnockoutTeam(matchId, knockoutSetup, realResults?.knockout || {}, realResults?.knockout);
              if (!teams?.home && !teams?.away) return null;
              return renderMatchCard("ko-" + matchId, teams.home || "?", teams.away || "?", realResults?.knockout?.[matchId], KO_SCHEDULE[matchId], true);
            })}
          </Card>
        );
      })()}
      {renderPredictions()}
    </div>
  );
}

          Audit
          {new Date() < new Date("2026-07-02T23:59:00+02:00") && (
            <span style={{
              position: "absolute", top: 2, right: 4,
              background: "linear-gradient(90deg, #8B7535 0%, #D4AF37 30%, #FFE08A 50%, #D4AF37 70%, #8B7535 100%)",
              backgroundSize: "200% 100%",
              color: "#0A0A0A",
              fontSize: 7, fontWeight: 900, padding: "2px 5px",
              borderRadius: 3, letterSpacing: "0.1em",
              fontFamily: "'Oswald', sans-serif", textTransform: "uppercase",
              border: "1px solid rgba(255,224,138,0.45)",
              textShadow: "0 1px 0 rgba(255,255,255,0.25)",
              animation: "newGoldPulse 1.8s ease-in-out infinite, newGoldShimmer 2.6s linear infinite",

          {(() => {

                          <div style={{ display: "flex", justifyContent: "flex-end" }}><TeamBadge code={m.home} size="sm" /></div>
                          <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 600, color: C.white, textAlign: "center", minWidth: 50 }}>

                return (
                  <div key={pick} style={{

                    border: "1px solid " + (isWinner ? "rgba(52,211,153,0.25)" : i === 0 ? "rgba(197,160,89,0.15)" : C.border),

                  }}>
                    <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: pct + "%", background: isWinner ? "rgba(52,211,153,0.06)" : "rgba(197,160,89,0.04)", borderRadius: 8 }} />
                    <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        {isTeam && <span className={"fi fi-" + (TEAMS[pick]?.flag || "")} style={{ fontSize: 18 }} />}
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: isWinner ? C.green : i === 0 ? C.gold : C.white }}>
                            {isTeam ? (TEAMS[pick]?.name || pick) : pick}
                            {isWinner && <span style={{ marginLeft: 6, fontSize: 10 }}>✅ WINNER</span>}
                          </div>
                          <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{players[pick]?.join(", ")}</div>
                        </div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div className="font-display" style={{ fontSize: 18, fontWeight: 700, color: isWinner ? C.green : C.gold }}>{count}</div>
                        <div style={{ fontSize: 9, color: C.muted }}>{pct}%</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </Card>
          );
        };

        return (
          <div>
            {renderSection("World Cup Champion", "🏆", champCounts, champPlayers, realChamp, true)}
            {renderSection("Top Scorer", "⚡", scorerCounts, scorerPlayers, realScorers, false)}
            {renderSection("Tournament MVP", "🌟", mvpCounts, mvpPlayers, realMvps, false)}
          </div>
        );
      })()}
      {viewMode === "audit" && (
        <AdminPlayerAudit
          users={users}
          allPredictions={allPredictions}
          realResults={realResults}
          knockoutSetup={knockoutSetup}
          isPlayerView={true}
          forcedUserId={currentUserId}
        />
      )}
    </div>
  );
}

function PointsSystem({ realResults }) {
  const P = getPoints(realResults);

    const safePreds = { ...newPreds };

    // Protect group match predictions where results exist
    if (realResults?.groups && savedPreds?.groups) {

      Object.keys(realResults.groups).forEach((matchKey) => {

function AdminAwardsResolution({ users, allPredictions, realResults, setRealResults }) {
  const approved = users.filter((u) => u.approved);

  // Collect all unique predictions for scorer and mvp
  const scorerPreds = {};
  const mvpPreds = {};
  approved.forEach((u) => {
    const g = allPredictions[u.id]?.globals;
    if (g?.topScorer) {
      const key = g.topScorer.trim();
      if (!scorerPreds[key]) scorerPreds[key] = [];
      scorerPreds[key].push(u.name);
    }
    if (g?.mvp) {
      const key = g.mvp.trim();
      if (!mvpPreds[key]) mvpPreds[key] = [];
      mvpPreds[key].push(u.name);
    }
  });

  const markWinners = async (field, names) => {
    const newResults = { ...realResults, [field]: names };
    setRealResults(newResults);
    await sSet("wc-results", newResults);
  };

  const renderSection = (title, emoji, field, preds) => {
    const winners = realResults?.[field] || [];
    return (
      <Card style={{ marginBottom: 12 }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 10px" }}>{emoji} {title}</h3>
        <p style={{ fontSize: 11, color: C.muted, margin: "0 0 8px" }}>
          Mark all correct name variants. Each matched user will receive the points.
        </p>
        {Object.keys(preds).length === 0 ? (
          <p style={{ color: C.muted, fontSize: 12 }}>No predictions yet</p>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {Object.entries(preds).sort((a, b) => b[1].length - a[1].length).map(([name, users_]) => {
              const isWinner = winners.includes(name);
              return (
                <div key={name} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "6px 10px", borderRadius: 6,
                  background: isWinner ? C.green + "15" : "#0D0D0D",
                  border: isWinner ? `1px solid ${C.green}44` : `1px solid ${C.border}`,
                }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600 }}>{name}</span>
                    <span style={{ fontSize: 10, color: C.muted, marginLeft: 8 }}>({users_.length}: {users_.join(", ")})</span>
                  </div>
                  <button
                    onClick={() => {
                      const newWinners = isWinner ? winners.filter((w) => w !== name) : [...winners, name];
                      markWinners(field, newWinners);
                    }}
                    style={{
                      padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
                      background: isWinner ? C.green : "transparent",
                      color: isWinner ? "#fff" : C.muted,
                      border: isWinner ? "none" : `1px solid ${C.border}`,
                    }}
                  >
                    {isWinner ? "✓ Correct" : "Mark"}
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </Card>
    );
  };

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 16px" }}>🏅 Award Resolution</h2>
      <Card style={{ marginBottom: 12, background: "#111111" }}>
        <p style={{ fontSize: 12, color: C.muted, margin: 0 }}>
          Users write names freely for scorer and MVP. Here you see all variants
          and mark which are correct (ej. "Mbappé", "Kylian Mbappé" y "Mbappe" pueden ser todos correctos).
        </p>
      </Card>
      {renderSection("Top Scorer", "⚽", "topScorerWinners", scorerPreds)}
      {renderSection("Tournament MVP", "⭐", "mvpWinners", mvpPreds)}
    </div>
  );
}

function AdminEditUser({ users, allPredictions, setAllPredictions, knockoutSetup, realResults }) {
  const approved = users.filter((u) => u.approved).sort((a, b) => a.name.localeCompare(b.name));
  const [selectedId, setSelectedId] = useState(null);
  const [preds, setPreds] = useState(null);
  const [saving, setSaving] = useState(false);
  const [activeSection, setActiveSection] = useState("groups");

  useEffect(() => {
    if (selectedId) {
      (async () => {
        const p = await sGet("wc-pred-" + selectedId);
        setPreds(p || {});
      })();
    }
  }, [selectedId]);

  const handleSave = async () => {
    if (!selectedId || !preds) return;
    setSaving(true);
    await sSet("wc-pred-" + selectedId, preds);
    setAllPredictions({ ...allPredictions, [selectedId]: preds });
    setSaving(false);
    alert("✅ Predictions saved for user");
  };

  const updateGroupScore = (key, side, val) => {
    const newGroups = { ...preds.groups, [key]: { ...(preds.groups?.[key] || { home: 0, away: 0 }), [side]: val } };
    setPreds({ ...preds, groups: newGroups });
  };

  const updateGlobal = (field, val) => {
    setPreds({ ...preds, globals: { ...(preds.globals || {}), [field]: val } });
  };

  const updateKO = (matchId, field, val) => {
    const ko = { ...preds.knockout };
    if (!ko[matchId]) ko[matchId] = { home: 0, away: 0, advances: null };
    ko[matchId] = { ...ko[matchId], [field]: val };
    setPreds({ ...preds, knockout: ko });
  };

  const user = approved.find((u) => u.id === selectedId);

  return (
    <div>
      <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 700, margin: "0 0 16px", textTransform: "uppercase", letterSpacing: "0.06em" }}>✏️ Edit User Predictions</h2>
      <Card style={{ marginBottom: 12 }}>
        <select value={selectedId || ""} onChange={(e) => { setSelectedId(e.target.value || null); setPreds(null); }}
          style={{ width: "100%", padding: "10px", background: "#0D0D0D", color: C.white, border: "1px solid " + C.border, borderRadius: 6, fontSize: 13 }}>
          <option value="">— Select user —</option>
          {approved.map((u) => <option key={u.id} value={u.id}>{u.name} {u.surname} ({u.team})</option>)}
        </select>
      </Card>

      {selectedId && preds && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <span style={{ fontSize: 13, fontWeight: 600 }}>{user?.name} {user?.surname}</span>
            <GoldButton onClick={handleSave} small disabled={saving}>{saving ? "Saving..." : "💾 Save"}</GoldButton>
          </div>

          <TabBar tabs={[
            { id: "groups", label: "Groups", icon: <Zap size={14} /> },
            { id: "globals", label: "Globals", icon: <Star size={14} /> },
            { id: "knockout", label: "Knockout", icon: <Trophy size={14} /> },
          ]} active={activeSection} onChange={setActiveSection} />

          {activeSection === "groups" && (
            <div>
              {Object.keys(GROUPS).map((g) => {
                const matches = getGroupMatches(g);
                return (
                  <Card key={g} style={{ marginBottom: 8 }}>
                    <h4 className="font-display" style={{ fontSize: 12, color: C.gold, marginBottom: 8 }}>Group {g}</h4>
                    {matches.map((m) => {
                      const key = g + "-" + m.home + "-" + m.away;
                      const p = preds.groups?.[key] || { home: 0, away: 0 };
                      return (
                        <div key={key} style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 6, marginBottom: 4 }}>
                          <div style={{ display: "flex", justifyContent: "flex-end" }}><TeamBadge code={m.home} size="sm" /></div>
                          <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                            <ScoreInput value={p.home ?? 0} onChange={(v) => updateGroupScore(key, "home", v)} />
                            <span style={{ color: C.muted, fontSize: 10 }}>-</span>
                            <ScoreInput value={p.away ?? 0} onChange={(v) => updateGroupScore(key, "away", v)} />
                          </div>
                          <div><TeamBadge code={m.away} size="sm" /></div>
                        </div>
                      );
                    })}
                  </Card>
                );
              })}
            </div>
          )}

          {activeSection === "globals" && (
            <Card>
              <div style={{ marginBottom: 10 }}>
                <label className="font-display" style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 4 }}>Champion</label>
                <select value={preds.globals?.champion || ""} onChange={(e) => updateGlobal("champion", e.target.value)}
                  style={{ width: "100%", padding: 8, background: "#0D0D0D", color: C.white, border: "1px solid " + C.border, borderRadius: 6, fontSize: 12 }}>
                  <option value="">—</option>
                  {ALL_TEAM_CODES.map((c2) => <option key={c2} value={c2}>{TEAMS[c2].name}</option>)}
                </select>
              </div>
              <div style={{ marginBottom: 10 }}>
                <label className="font-display" style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 4 }}>Top Scorer</label>
                <input value={preds.globals?.topScorer || ""} onChange={(e) => updateGlobal("topScorer", e.target.value)}
                  style={{ width: "100%", padding: 8, background: "#0D0D0D", color: C.white, border: "1px solid " + C.border, borderRadius: 6, fontSize: 12, boxSizing: "border-box" }} />
              </div>
              <div>
                <label className="font-display" style={{ fontSize: 11, color: C.muted, display: "block", marginBottom: 4 }}>MVP</label>
                <input value={preds.globals?.mvp || ""} onChange={(e) => updateGlobal("mvp", e.target.value)}
                  style={{ width: "100%", padding: 8, background: "#0D0D0D", color: C.white, border: "1px solid " + C.border, borderRadius: 6, fontSize: 12, boxSizing: "border-box" }} />
              </div>
            </Card>
          )}

          {activeSection === "knockout" && (
            <div>
              {ROUNDS.map((r) => {
                return (
                  <Card key={r.key} style={{ marginBottom: 8 }}>
                    <h4 className="font-display" style={{ fontSize: 12, color: C.gold, marginBottom: 8 }}>{r.label}</h4>
                    {Array.from({ length: r.matches }, (_, i) => {
                      const matchId = r.key + "-" + (i + 1);
                      const teams = getKnockoutTeam(matchId, knockoutSetup, realResults?.knockout || {}, realResults?.knockout);
                      const p = preds.knockout?.[matchId] || { home: 0, away: 0, advances: null };
                      if (!teams.home && !teams.away) return null;
                      return (
                        <div key={matchId} style={{ marginBottom: 6 }}>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 6 }}>
                            <div style={{ display: "flex", justifyContent: "flex-end" }}><TeamBadge code={teams.home} size="sm" /></div>
                            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                              <ScoreInput value={p.home ?? 0} onChange={(v) => updateKO(matchId, "home", v)} />
                              <span style={{ color: C.muted, fontSize: 10 }}>-</span>
                              <ScoreInput value={p.away ?? 0} onChange={(v) => updateKO(matchId, "away", v)} />
                            </div>
                            <div><TeamBadge code={teams.away} size="sm" /></div>
                          </div>
                          {p.home != null && p.away != null && p.home === p.away && teams.home && teams.away && (
                            <div style={{ display: "flex", justifyContent: "center", gap: 6, marginTop: 4, fontSize: 10 }}>
                              <span style={{ color: C.gold }}>Advances:</span>
                              {[teams.home, teams.away].map((t) => (
                                <button key={t} onClick={() => updateKO(matchId, "advances", t)} style={{
                                  padding: "2px 8px", borderRadius: 4, fontSize: 10, cursor: "pointer",
                                  background: p.advances === t ? C.green + "22" : "transparent",
                                  border: p.advances === t ? "1px solid " + C.green : "1px solid " + C.border,
                                  color: p.advances === t ? C.green : C.muted,
                                }}>{TEAMS[t]?.name}</button>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </Card>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN PAYMENTS TRACKER
   ═══════════════════════════════════════════ */

function AdminPayments({ users, config, setConfig }) {
  const approved = users.filter((u) => u.approved);
  const payments = config?.payments || {};
  const pot = config?.pot || { total: 0 };
  const [potInput, setPotInput] = useState(pot.total || 0);
  const [saving, setSaving] = useState(false);

  const togglePayment = async (userId, field, value) => {
    const updated = { ...payments, [userId]: { ...(payments[userId] || { paid: false, method: "" }), [field]: value } };
    const newConfig = { ...config, payments: updated };
    setConfig(newConfig);
    await sSet("wc-config", newConfig);
  };

  const savePot = async () => {
    setSaving(true);
    const newConfig = { ...config, pot: { total: Number(potInput) || 0 } };
    setConfig(newConfig);
    await sSet("wc-config", newConfig);
    setSaving(false);
  };

  const paidCount = approved.filter((u) => payments[u.id]?.paid).length;
  const totalPot = pot.total || 0;

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 16px" }}>💰 Payments</h2>

      <Card style={{ marginBottom: 16 }} glow>
        <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 8px", textTransform: "uppercase" }}>🏆 Prize Pot</h3>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
          <span style={{ fontSize: 12, color: C.muted }}>Total pot (€):</span>
          <input type="number" value={potInput} onChange={(e) => setPotInput(e.target.value)}
            style={{ width: 80, padding: "4px 8px", background: "#0D0D0D", color: C.gold, border: "1px solid " + C.border, borderRadius: 4, fontSize: 14, fontWeight: 700, outline: "none" }} />
          <button onClick={savePot} disabled={saving} style={{
            padding: "4px 10px", background: "rgba(52,211,153,0.15)", color: C.green,
            border: "1px solid rgba(52,211,153,0.3)", borderRadius: 4, fontSize: 11, fontWeight: 600, cursor: "pointer",
          }}>{saving ? "..." : "💾"}</button>
        </div>
        {totalPot > 0 && (
          <div style={{ display: "flex", gap: 12, fontSize: 12 }}>
            <span>🥇 {Math.round(totalPot * 0.75)}€ (75%)</span>
            <span>🥈 {Math.round(totalPot * 0.15)}€ (15%)</span>
            <span>🥉 {Math.round(totalPot * 0.10)}€ (10%)</span>
          </div>
        )}
      </Card>

      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          <span style={{ fontSize: 13, fontWeight: 700 }}>Paid: <span style={{ color: C.green }}>{paidCount}</span> / {approved.length}</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.muted }}>Pending: <span style={{ color: C.red }}>{approved.length - paidCount}</span></span>
        </div>
        {/* Progress bar */}
        <div style={{ height: 6, background: "#1a1a1a", borderRadius: 3, marginBottom: 16, overflow: "hidden" }}>
          <div style={{ height: "100%", width: (paidCount / Math.max(approved.length, 1) * 100) + "%", background: "linear-gradient(90deg, " + C.green + ", " + C.gold + ")", borderRadius: 3, transition: "width 0.3s" }} />
        </div>
        {approved.sort((a, b) => a.name.localeCompare(b.name)).map((u) => {
          const p = payments[u.id] || { paid: false, method: "" };
          return (
            <div key={u.id} style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "6px 0", borderBottom: "1px solid " + C.border, fontSize: 12,
            }}>
              <div style={{ flex: 1 }}>
                <span style={{ fontWeight: 600, color: p.paid ? C.green : C.white }}>{u.name} {u.surname}</span>
                <span style={{ color: C.muted, fontSize: 10, marginLeft: 6 }}>{u.team}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <select value={p.method || ""} onChange={(e) => togglePayment(u.id, "method", e.target.value)}
                  style={{ padding: "2px 4px", background: "#0D0D0D", color: C.muted, border: "1px solid " + C.border, borderRadius: 4, fontSize: 10, outline: "none" }}>
                  <option value="">—</option>
                  <option value="Bizum">Bizum</option>
                  <option value="Cash">Cash</option>
                </select>
                <button onClick={() => togglePayment(u.id, "paid", !p.paid)} style={{
                  padding: "3px 10px", borderRadius: 4, fontSize: 10, fontWeight: 700, cursor: "pointer",
                  background: p.paid ? "rgba(52,211,153,0.15)" : "rgba(248,113,113,0.1)",
                  color: p.paid ? C.green : C.red,
                  border: "1px solid " + (p.paid ? "rgba(52,211,153,0.3)" : "rgba(248,113,113,0.3)"),
                }}>
                  {p.paid ? "✅ Paid" : "❌ No"}
                </button>
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ═══════════════════════════════════════════
   ADMIN PLAYER AUDIT (read-only)
   ───────────────────────────────────────────
   Lets admin pick any approved player and inspect
   exactly which matches/group positions produced
   their group-stage points. Uses the same scoring
   logic as the leaderboard.
   ═══════════════════════════════════════════ */

function AdminPlayerAudit({ users, allPredictions, realResults, knockoutSetup, isPlayerView = false, forcedUserId = null }) {
  const [mode, setMode] = useState("single"); // "single" | "compare"
  const [selectedId, setSelectedId] = useState(forcedUserId || "");
  const [selectedIdB, setSelectedIdB] = useState("");
  const [open, setOpen] = useState({ groupMatches: true, groupPos: true, ko: true, globals: true, adjustments: true });

  // Player view: keep selectedId locked to current user even if users array changes
  useEffect(() => {
    if (isPlayerView && forcedUserId) setSelectedId(forcedUserId);
  }, [isPlayerView, forcedUserId]);

  const playerList = useMemo(() => (users || [])
    .filter((u) => u.approved)
    .sort((a, b) => (a.name || "").localeCompare(b.name || "")), [users]);

  const computeFor = (userId) => {
    if (!userId) return null;
    const u = playerList.find((p) => p.id === userId) || (users || []).find((p) => p.id === userId);
    if (!u) return null;
    const preds = allPredictions?.[userId];
    const groupAudit = auditUserGroupStage(preds, realResults);
    const koAudit = auditUserKnockout(preds, realResults, knockoutSetup);
    const globalsAudit = auditUserGlobals(preds, realResults);
    const { total: fullTotal } = calcUserPoints(preds, realResults);
    const bonus = realResults?.bonusPoints?.[userId] || 0;
    const grand = fullTotal + bonus;
    // Cross-check: groups + KO + globals should equal full calc
    const auditSum = groupAudit.totals.groupStageTotal + koAudit.totals.total + globalsAudit.total;
    const calcMatches = auditSum === fullTotal;
    return { user: u, preds, groupAudit, koAudit, globalsAudit, fullTotal, bonus, grand, calcMatches, auditSum };
  };

  const dataA = useMemo(() => computeFor(selectedId), [selectedId, allPredictions, realResults, knockoutSetup, playerList]);
  const dataB = useMemo(() => computeFor(selectedIdB), [selectedIdB, allPredictions, realResults, knockoutSetup, playerList]);

  // ── Reusable styles ────────────────────────
  const sectionHeader = (label, ptsLabel, isOpen, onToggle) => (
    <button onClick={onToggle} style={{
      width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
      background: "transparent", border: "none", color: C.white, cursor: "pointer", padding: 0,
      fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em",
    }}>
      <span>{isOpen ? "▼" : "▶"} {label}</span>
      <span style={{ fontSize: 11, color: C.gold, fontWeight: 700 }}>{ptsLabel}</span>
    </button>
  );

  const matchRow = (m, idx) => (
    <div key={(m.group || m.matchId) + "-" + idx} style={{
      display: "grid", gridTemplateColumns: "44px 1fr auto", gap: 8, alignItems: "center",
      padding: "7px 8px", borderTop: idx > 0 ? "1px solid #1a1a1a" : "none", fontSize: 12,
    }}>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 10, color: C.muted, letterSpacing: "0.05em" }}>{m.group || m.matchId}</div>
      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
        {m.home && TEAMS[m.home] && <FlagImg iso={TEAMS[m.home]?.flag} size={12} />}
        <span style={{ color: C.white, fontWeight: 600 }}>{m.home || "?"}</span>
        <span style={{ color: C.gold, fontFamily: "'Oswald', sans-serif", fontWeight: 700 }}>{m.realH}-{m.realA}</span>
        <span style={{ color: C.white, fontWeight: 600 }}>{m.away || "?"}</span>
        {m.away && TEAMS[m.away] && <FlagImg iso={TEAMS[m.away]?.flag} size={12} />}
        <span style={{ color: C.muted, fontSize: 10, marginLeft: 4 }}>· you said {m.predH}-{m.predA}</span>
      </div>
      <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, color: C.gold, fontSize: 12 }}>+{m.pts}</div>
    </div>
  );

  const STATUS_STYLE = {
    exact: { color: C.green, bg: "rgba(52,211,153,0.1)", border: "rgba(52,211,153,0.25)", label: "🎯 exact" },
    advance: { color: C.blue, bg: "rgba(96,165,250,0.08)", border: "rgba(96,165,250,0.25)", label: "✓ qualifies" },
    miss: { color: "#F59E0B", bg: "rgba(245,158,11,0.08)", border: "rgba(245,158,11,0.25)", label: "✕ predicted out" },
    noQualify: { color: C.muted, bg: "transparent", border: "#2a2a2a", label: "— didn't qualify" },
    noPts: { color: C.muted, bg: "transparent", border: "#2a2a2a", label: "—" },
  };

  const koStatusStyle = (s) => {
    switch (s) {
      case "exact": return { color: C.green, bg: "rgba(52,211,153,0.12)", border: "rgba(52,211,153,0.3)", label: "🎯 EXACT" };
      case "exactDraw": return { color: C.green, bg: "rgba(52,211,153,0.12)", border: "rgba(52,211,153,0.3)", label: "🎯 EXACT DRAW" };
      case "correct": return { color: C.blue, bg: "rgba(96,165,250,0.1)", border: "rgba(96,165,250,0.3)", label: "✓ WINNER" };
      case "drawCorrect": return { color: C.blue, bg: "rgba(96,165,250,0.1)", border: "rgba(96,165,250,0.3)", label: "✓ DRAW" };
      case "wrong": return { color: C.red, bg: "rgba(248,113,113,0.08)", border: "rgba(248,113,113,0.25)", label: "✕ MISS" };
      case "missing": return { color: C.muted, bg: "transparent", border: "#2a2a2a", label: "— no prediction" };
      default: return { color: C.muted, bg: "transparent", border: "#2a2a2a", label: "⏳ pending" };
    }
  };

  const playerDropdown = (val, setter, label) => (
    <div>
      {label && <label style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", display: "block", marginBottom: 4 }}>{label}</label>}
      <select value={val} onChange={(e) => setter(e.target.value)} style={{
        width: "100%", padding: "10px 12px", background: "#0f0f0f", color: C.white,
        border: "1px solid #2a2a2a", borderRadius: 8, fontSize: 13, fontFamily: "inherit",
      }}>
        <option value="">— Choose a player —</option>
        {playerList.map((u) => (
          <option key={u.id} value={u.id}>{u.name + (u.surname ? " " + u.surname : "")}{u.team ? " · " + u.team : ""}</option>
        ))}
      </select>
    </div>
  );

  // ── Single-player view renderer ────────────
  const renderSingle = (d) => {
    if (!d) return null;
    const ga = d.groupAudit, ko = d.koAudit, gl = d.globalsAudit;
    const groupMatchesPts = ga.totals.exactScorePts + ga.totals.correctResultPts;
    const groupPosPts = ga.totals.groupPositionPts + ga.totals.groupAdvancePts;

    return (
      <>
        {/* HEADER */}
        <Card style={{
          marginBottom: 12,
          background: "radial-gradient(ellipse at top, rgba(197,160,89,0.06) 0%, transparent 60%), linear-gradient(180deg, #141414 0%, #0E0E0E 100%)",
          position: "relative",
          overflow: "hidden",
        }} glow>
          <div style={{
            position: "absolute", top: 0, left: "20%", right: "20%", height: 1,
            background: "linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent)",
          }} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
            <div>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 700, color: C.white, letterSpacing: "0.04em" }}>{d.user.name}{d.user.surname ? " " + d.user.surname : ""}</div>
              {d.user.team && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{d.user.team}</div>}
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 36, fontWeight: 700, color: C.gold, lineHeight: 1, textShadow: "0 0 18px rgba(197,160,89,0.3)" }}>{d.grand}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.15em", marginTop: 4 }}>total pts</div>
            </div>
          </div>

          {/* Cronological breakdown */}
          <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 10, fontSize: 11, display: "flex", flexDirection: "column", gap: 4 }}>
            <div style={{ display: "flex", justifyContent: "space-between", color: C.muted }}>
              <span>① Group matches ({ga.totals.exactScoreCount} exact + {ga.totals.correctResultCount} correct)</span>
              <span style={{ color: C.white, fontWeight: 600 }}>{groupMatchesPts}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", color: C.muted }}>
              <span>② Group positions ({ga.totals.groupPositionCount} exact + {ga.totals.groupAdvanceCount} qualifies)</span>
              <span style={{ color: C.white, fontWeight: 600 }}>{groupPosPts}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", color: C.muted }}>
              <span>③ Knockout matches</span>
              <span style={{ color: C.white, fontWeight: 600 }}>{ko.totals.total}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", color: C.muted }}>
              <span>④ Globals {gl.maxPending > 0 ? "(" + gl.maxPending + " pts pending)" : ""}</span>
              <span style={{ color: C.white, fontWeight: 600 }}>{gl.total}</span>
            </div>
            {d.bonus !== 0 && (
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: C.muted }}>⑤ Manual adjustments</span>
                <span style={{ color: C.gold, fontWeight: 700 }}>{d.bonus > 0 ? "+" : ""}{d.bonus}</span>
              </div>
            )}
            <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 6, borderTop: "1px dashed #2a2a2a", marginTop: 4 }}>
              <span style={{ color: C.white, fontWeight: 700, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.05em", textTransform: "uppercase", fontSize: 11 }}>Grand total</span>
              <span style={{ color: C.gold, fontWeight: 700, fontFamily: "'Oswald', sans-serif", fontSize: 14 }}>{d.grand}</span>
            </div>
          </div>

          {!d.calcMatches && !isPlayerView && (
            <div style={{ marginTop: 10, padding: 8, background: "rgba(248,113,113,0.08)", border: "1px solid rgba(248,113,113,0.25)", borderRadius: 6, fontSize: 11, color: C.red }}>
              ⚠ Audit sum ({d.auditSum}) ≠ leaderboard calc ({d.fullTotal}) — flag this player
            </div>
          )}
        </Card>

        {/* ① GROUP MATCHES */}
        <Card style={{ marginBottom: 12 }}>
          {sectionHeader(
            "① Group matches",
            ga.totals.exactScoreCount + "🎯 + " + ga.totals.correctResultCount + "✓ = " + groupMatchesPts + " pts",
            open.groupMatches,
            () => setOpen({ ...open, groupMatches: !open.groupMatches })
          )}
          {open.groupMatches && (
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 10, color: C.muted, padding: "4px 8px", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                Exact scores · {ga.totals.exactScoreCount} × {ga.points.exactScore} = {ga.totals.exactScorePts} pts
              </div>
              {ga.exactScoreMatches.length === 0
                ? <div style={{ fontSize: 11, color: C.muted, padding: 8 }}>None.</div>
                : ga.exactScoreMatches.map(matchRow)}
              <div style={{ height: 10 }} />
              <div style={{ fontSize: 10, color: C.muted, padding: "4px 8px", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.08em" }}>
                Correct results (not exact) · {ga.totals.correctResultCount} × {ga.points.correctResult} = {ga.totals.correctResultPts} pts
              </div>
              {ga.correctResultMatches.length === 0
                ? <div style={{ fontSize: 11, color: C.muted, padding: 8 }}>None.</div>
                : ga.correctResultMatches.map(matchRow)}
            </div>
          )}
        </Card>

        {/* ② GROUP POSITIONS */}
        <Card style={{ marginBottom: 12 }}>
          {sectionHeader(
            "② Group standings",
            ga.totals.groupPositionCount + "🎯 + " + ga.totals.groupAdvanceCount + "✓ = " + groupPosPts + " pts",
            open.groupPos,
            () => setOpen({ ...open, groupPos: !open.groupPos })
          )}
          {open.groupPos && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ fontSize: 10, color: C.muted, padding: "6px 8px", background: "#0f0f0f", borderRadius: 4, lineHeight: 1.5 }}>
                Best thirds: {ga.bestThirdsList.length ? ga.bestThirdsList.join(", ") : "(not yet confirmed)"}.
                Exact pos = {ga.points.teamExactPosition}/{ga.points.bestThirdExactPos} pts · Qualifies = {ga.points.teamAdvancesGroup} pts.
              </div>
              {Object.keys(GROUPS).map((g) => {
                const gd = ga.groupAudit[g];
                if (!gd || !gd.teamResults) {
                  return (
                    <div key={g} style={{ padding: 10, border: "1px solid #2a2a2a", borderRadius: 6, fontSize: 12, color: C.muted }}>
                      <strong style={{ color: C.white }}>Group {g}</strong> — real order not yet available
                    </div>
                  );
                }
                const groupPts = gd.teamResults.reduce((acc, t) => acc + t.pts, 0);
                return (
                  <div key={g} style={{ padding: 10, border: "1px solid #2a2a2a", borderRadius: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <strong style={{ fontFamily: "'Oswald', sans-serif", color: C.gold, letterSpacing: "0.08em" }}>GROUP {g}</strong>
                      <span style={{ fontSize: 11, color: C.muted }}>subtotal <strong style={{ color: C.gold }}>+{groupPts}</strong></span>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "28px 1fr 1fr auto auto", gap: 6, fontSize: 11, alignItems: "center" }}>
                      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase" }}>Pos</div>
                      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase" }}>{isPlayerView ? "Your pick" : "User pick"}</div>
                      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase" }}>Real</div>
                      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", textAlign: "center" }}>Status</div>
                      <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", textAlign: "right" }}>Pts</div>
                      {(gd.predOrder || []).map((code, predPos) => {
                        const t = gd.teamResults.find((r) => r.code === code);
                        if (!t) return null;
                        const st = STATUS_STYLE[t.status] || STATUS_STYLE.noPts;
                        const rowMuted = (t.status === "noQualify");
                        return (
                          <React.Fragment key={code}>
                            <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, color: rowMuted ? C.muted : C.white }}>{predPos + 1}°</div>
                            <div style={{ display: "flex", alignItems: "center", gap: 5, opacity: rowMuted ? 0.65 : 1 }}>
                              <FlagImg iso={TEAMS[code]?.flag} size={12} />
                              <span style={{ color: C.white, fontWeight: 600 }}>{code}</span>
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 5, opacity: rowMuted ? 0.65 : 1 }}>
                              <span style={{ color: rowMuted ? C.muted : C.white, fontFamily: "'Oswald', sans-serif", fontWeight: 600 }}>{t.realPos + 1}°</span>
                              {t.isBestThird && <span style={{ fontSize: 8, color: C.gold, background: "rgba(197,160,89,0.15)", padding: "1px 4px", borderRadius: 3, letterSpacing: "0.05em" }}>BEST 3RD</span>}
                            </div>
                            <div style={{
                              fontSize: 9, padding: "2px 6px", borderRadius: 3, textAlign: "center",
                              color: st.color, background: st.bg, border: "1px solid " + st.border, letterSpacing: "0.05em",
                            }}>{st.label}</div>
                            <div style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, textAlign: "right", color: t.pts > 0 ? C.gold : C.muted }}>
                              {t.pts > 0 ? "+" + t.pts : "0"}
                            </div>
                          </React.Fragment>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        {/* ③ KO MATCHES */}
        <Card style={{ marginBottom: 12 }}>
          {sectionHeader(
            "③ Knockout matches",
            ko.totals.total + " pts",
            open.ko,
            () => setOpen({ ...open, ko: !open.ko })
          )}
          {open.ko && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ fontSize: 10, color: C.muted, padding: "6px 8px", background: "#0f0f0f", borderRadius: 4, lineHeight: 1.5 }}>
                Exact score = {ga.points.koExactScore || ga.points.exactScore} pts · Correct winner = {ga.points.koCorrectResult || ga.points.correctResult} pts · Exact draw = {ga.points.exactDraw} pts · Correct draw = {ga.points.drawNotExact} pts · Advancer bonus (on draws) = {ga.points.advancer} pt.
              </div>
              {KO_ROUND_ORDER.map((round) => {
                const list = ko.rounds[round] || [];
                const roundPts = list.reduce((a, x) => a + x.ptsScore + x.ptsAdvancer, 0);
                const playedCount = list.filter((x) => x.hasResult).length;
                if (playedCount === 0) {
                  return (
                    <div key={round} style={{ padding: 10, border: "1px solid #2a2a2a", borderRadius: 6, fontSize: 11, color: C.muted, display: "flex", justifyContent: "space-between" }}>
                      <span><strong style={{ color: C.white, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.06em" }}>{KO_ROUND_LABELS[round].toUpperCase()}</strong></span>
                      <span>not played yet</span>
                    </div>
                  );
                }
                return (
                  <div key={round} style={{ padding: 10, border: "1px solid #2a2a2a", borderRadius: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <strong style={{ fontFamily: "'Oswald', sans-serif", color: C.gold, letterSpacing: "0.08em", fontSize: 12 }}>{KO_ROUND_LABELS[round].toUpperCase()}</strong>
                      <span style={{ fontSize: 11, color: C.muted }}>{playedCount}/{list.length} played · <strong style={{ color: C.gold }}>+{roundPts}</strong></span>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {list.map((m, idx) => {
                        if (!m.hasResult) {
                          return (
                            <div key={m.matchId} style={{ padding: "5px 8px", fontSize: 11, color: C.muted, opacity: 0.5, display: "flex", alignItems: "center", gap: 6 }}>
                              <span style={{ fontFamily: "'Oswald', sans-serif", letterSpacing: "0.05em", fontSize: 9 }}>{m.matchId.toUpperCase()}</span>
                              {m.home && <><FlagImg iso={TEAMS[m.home]?.flag} size={10} /><span>{m.home}</span></>}
                              <span>vs</span>
                              {m.away && <><FlagImg iso={TEAMS[m.away]?.flag} size={10} /><span>{m.away}</span></>}
                              <span style={{ marginLeft: "auto", fontSize: 9 }}>pending</span>
                            </div>
                          );
                        }
                        const st = koStatusStyle(m.scoreStatus);
                        const totalPts = m.ptsScore + m.ptsAdvancer;
                        return (
                          <div key={m.matchId} style={{
                            display: "grid", gridTemplateColumns: "auto 1fr auto auto", gap: 8, alignItems: "center",
                            padding: "6px 8px", borderTop: idx > 0 ? "1px solid #1a1a1a" : "none", fontSize: 11,
                          }}>
                            <span style={{ fontFamily: "'Oswald', sans-serif", letterSpacing: "0.05em", fontSize: 9, color: C.muted, minWidth: 36 }}>{m.matchId.toUpperCase()}</span>
                            <div style={{ display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
                              {m.home && TEAMS[m.home] && <FlagImg iso={TEAMS[m.home]?.flag} size={11} />}
                              <span style={{ color: C.white, fontWeight: 600 }}>{m.home || "?"}</span>
                              <span style={{ color: C.gold, fontFamily: "'Oswald', sans-serif", fontWeight: 700 }}>{m.realH}-{m.realA}</span>
                              <span style={{ color: C.white, fontWeight: 600 }}>{m.away || "?"}</span>
                              {m.away && TEAMS[m.away] && <FlagImg iso={TEAMS[m.away]?.flag} size={11} />}
                              <span style={{ color: C.muted, fontSize: 10, marginLeft: 4 }}>· you {m.hasPred ? m.predH + "-" + m.predA : <em style={{ color: "#A78BFA", fontStyle: "normal" }}>0-0 (default)</em>}{m.predAdvances ? " (adv: " + m.predAdvances + ")" : ""}</span>
                            </div>
                            <span style={{
                              fontSize: 9, padding: "2px 6px", borderRadius: 3,
                              color: st.color, background: st.bg, border: "1px solid " + st.border, letterSpacing: "0.05em",
                            }}>{st.label}{m.ptsAdvancer > 0 ? " +ADV" : ""}</span>
                            <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, color: totalPts > 0 ? C.gold : C.muted, minWidth: 28, textAlign: "right" }}>
                              {totalPts > 0 ? "+" + totalPts : "0"}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        {/* ④ GLOBALS */}
        <Card style={{ marginBottom: 12 }}>
          {sectionHeader(
            "④ Globals",
            gl.total + " pts" + (gl.maxPending > 0 ? " · " + gl.maxPending + " pending" : ""),
            open.globals,
            () => setOpen({ ...open, globals: !open.globals })
          )}
          {open.globals && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
              {gl.items.map((it) => {
                const stylePending = { color: C.muted, bg: "transparent", border: "#2a2a2a", label: "⏳ PENDING" };
                const styleCorrect = { color: C.green, bg: "rgba(52,211,153,0.1)", border: "rgba(52,211,153,0.3)", label: "🎯 CORRECT" };
                const styleWrong = { color: C.red, bg: "rgba(248,113,113,0.08)", border: "rgba(248,113,113,0.25)", label: "✕ WRONG" };
                const st = it.status === "correct" ? styleCorrect : it.status === "wrong" ? styleWrong : stylePending;
                return (
                  <div key={it.key} style={{
                    padding: "10px 12px", border: "1px solid #2a2a2a", borderRadius: 6,
                    display: "grid", gridTemplateColumns: "1fr auto auto", gap: 10, alignItems: "center",
                  }}>
                    <div>
                      <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, fontWeight: 600, color: C.white, letterSpacing: "0.05em" }}>{it.label}</div>
                      <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>
                        Predicted: <span style={{ color: C.white }}>{it.pred || "—"}</span>
                        {" · "}
                        Real: <span style={{ color: C.white }}>{it.real || "pending"}</span>
                      </div>
                    </div>
                    <span style={{
                      fontSize: 9, padding: "3px 7px", borderRadius: 3, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.08em", fontWeight: 700,
                      color: st.color, background: st.bg, border: "1px solid " + st.border,
                    }}>{st.label}</span>
                    <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, color: it.pts > 0 ? C.gold : C.muted, minWidth: 40, textAlign: "right" }}>
                      {it.pts > 0 ? "+" + it.pts : "0/" + it.maxPts}
                    </span>
                  </div>
                );
              })}
            </div>
          )}
        </Card>

        {/* ⑤ MANUAL ADJUSTMENTS */}
        {d.bonus !== 0 && (
          <Card style={{ marginBottom: 12 }}>
            {sectionHeader(
              "⑤ Manual adjustments",
              (d.bonus > 0 ? "+" : "") + d.bonus + " pts",
              open.adjustments,
              () => setOpen({ ...open, adjustments: !open.adjustments })
            )}
            {open.adjustments && (
              <div style={{ marginTop: 10, padding: 10, background: "#0f0f0f", borderRadius: 6, fontSize: 12, color: C.muted, display: "flex", justifyContent: "space-between" }}>
                <span>Admin bonus applied from <em>Adjustments</em> tab</span>
                <span style={{ color: C.gold, fontWeight: 700, fontFamily: "'Oswald', sans-serif" }}>{d.bonus > 0 ? "+" : ""}{d.bonus}</span>
              </div>
            )}
          </Card>
        )}
      </>
    );
  };

  // ── Compare view renderer ────────────────
  const compareRow = (label, valA, valB, opts = {}) => {
    const num = (v) => (typeof v === "number" ? v : 0);
    const diff = num(valA) - num(valB);
    const showDiff = opts.showDiff !== false && typeof valA === "number";
    const diffColor = diff > 0 ? C.green : diff < 0 ? C.red : C.muted;
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 64px 56px 64px", gap: 6, alignItems: "center", padding: "6px 4px", borderBottom: "1px solid #1a1a1a", fontSize: 11 }}>
        <span style={{ color: opts.strong ? C.white : C.muted, fontWeight: opts.strong ? 700 : 400 }}>{label}</span>
        <span style={{ color: C.white, fontFamily: "'Oswald', sans-serif", fontWeight: 700, textAlign: "right" }}>{valA ?? "—"}</span>
        <span style={{ color: diffColor, fontSize: 10, textAlign: "center" }}>
          {showDiff ? (diff > 0 ? "▲ +" + diff : diff < 0 ? "▼ " + diff : "=") : ""}
        </span>
        <span style={{ color: C.white, fontFamily: "'Oswald', sans-serif", fontWeight: 700, textAlign: "left" }}>{valB ?? "—"}</span>
      </div>
    );
  };

  const renderCompare = () => {
    if (!dataA || !dataB) {
      return (
        <div style={{ padding: 24, textAlign: "center", color: C.muted, fontSize: 12, border: "1px dashed #2a2a2a", borderRadius: 8 }}>
          Select two players above to start the head-to-head.
        </div>
      );
    }
    const gA = dataA.groupAudit.totals, gB = dataB.groupAudit.totals;
    const kA = dataA.koAudit.totals, kB = dataB.koAudit.totals;
    const glA = dataA.globalsAudit, glB = dataB.globalsAudit;

    const diff = dataA.grand - dataB.grand;
    const aLeads = diff > 0;
    const bLeads = diff < 0;
    const tied = diff === 0;

    const fullName = (u) => u.name + (u.surname ? " " + u.surname : "");
    const firstName = (u) => (u.name || "").split(" ")[0];
    const aFirst = firstName(dataA.user);
    const bFirst = firstName(dataB.user);

    const PhaseCard = ({ label, sublabel, vA, vB }) => {
      const d = vA - vB;
      const aWins = d > 0, bWins = d < 0;
      return (
        <div style={{
          padding: 12,
          background: "linear-gradient(135deg, rgba(20,20,20,0.95) 0%, rgba(14,14,14,0.95) 100%)",
          border: "1px solid " + (aWins || bWins ? "rgba(197,160,89,0.2)" : "#222"),
          borderRadius: 8,
          position: "relative",
          overflow: "hidden",
        }}>
          {(aWins || bWins) && (
            <div style={{
              position: "absolute", top: 0, left: 0, right: 0, height: 1,
              background: "linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent)",
            }} />
          )}
          <div style={{ fontSize: 9, color: C.gold, textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 700, fontFamily: "'Oswald', sans-serif", marginBottom: 1 }}>{label}</div>
          {sublabel && <div style={{ fontSize: 9, color: C.muted, opacity: 0.7, marginBottom: 8 }}>{sublabel}</div>}
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 6 }}>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 22, fontWeight: 700, color: aWins ? C.gold : C.white, lineHeight: 1, textShadow: aWins ? "0 0 12px rgba(197,160,89,0.35)" : "none" }}>{vA}</div>
            <div style={{ fontSize: 9, color: C.muted, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.12em" }}>VS</div>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 22, fontWeight: 700, color: bWins ? C.gold : C.white, lineHeight: 1, textAlign: "right", textShadow: bWins ? "0 0 12px rgba(197,160,89,0.35)" : "none" }}>{vB}</div>
          </div>
          <div style={{
            marginTop: 8, fontSize: 9, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.08em", fontWeight: 600,
            color: d > 0 ? C.green : d < 0 ? C.green : C.muted,
            textAlign: "center", textTransform: "uppercase",
          }}>
            {d > 0 ? "▲ " + aFirst + " +" + d : d < 0 ? "▲ " + bFirst + " +" + Math.abs(d) : "= tied"}
          </div>
        </div>
      );
    };

    const H2hRow = ({ icon, label, vA, vB }) => {
      const d = vA - vB;
      return (
        <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 32px 22px 32px", gap: 8, alignItems: "center", padding: "7px 4px", borderBottom: "1px solid #1a1a1a", fontSize: 11 }}>
          <span style={{ fontSize: 13, textAlign: "center" }}>{icon}</span>
          <span style={{ color: C.white, fontWeight: 500 }}>{label}</span>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 13, color: vA > vB ? C.gold : C.white, textAlign: "right" }}>{vA}</span>
          <span style={{ fontSize: 10, color: d > 0 ? C.green : d < 0 ? C.red : C.muted, fontFamily: "'Oswald', sans-serif", fontWeight: 700, textAlign: "center" }}>
            {d > 0 ? "▲" : d < 0 ? "▼" : "="}
          </span>
          <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 13, color: vB > vA ? C.gold : C.white, textAlign: "right" }}>{vB}</span>
        </div>
      );
    };

    return (
      <div>
        {/* HERO — versus showdown */}
        <Card glow style={{
          background: "radial-gradient(ellipse at center, rgba(197,160,89,0.06) 0%, transparent 70%), linear-gradient(135deg, #141414 0%, #0A0A0A 50%, #141414 100%)",
          padding: 20, marginBottom: 14, position: "relative", overflow: "hidden",
        }}>
          <div style={{
            position: "absolute", top: 0, left: "15%", right: "15%", height: 1,
            background: "linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent)",
          }} />
          <div style={{
            position: "absolute", bottom: 0, left: "15%", right: "15%", height: 1,
            background: "linear-gradient(90deg, transparent, rgba(197,160,89,0.5), transparent)",
          }} />

          <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, alignItems: "center" }}>
            <div style={{ textAlign: "left" }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 700, color: C.white, letterSpacing: "0.06em", textTransform: "uppercase", lineHeight: 1.1 }}>{fullName(dataA.user)}</div>
              {dataA.user.team && <div style={{ fontSize: 10, color: C.muted, marginTop: 3 }}>{dataA.user.team}</div>}
            </div>
            <div style={{
              fontFamily: "'Oswald', sans-serif", fontSize: 11, color: C.gold, fontWeight: 800,
              letterSpacing: "0.25em", padding: "4px 10px",
              border: "1px solid rgba(197,160,89,0.35)", borderRadius: 4,
              background: "rgba(197,160,89,0.08)",
              boxShadow: "0 0 12px rgba(197,160,89,0.15)",
            }}>VS</div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 700, color: C.white, letterSpacing: "0.06em", textTransform: "uppercase", lineHeight: 1.1 }}>{fullName(dataB.user)}</div>
              {dataB.user.team && <div style={{ fontSize: 10, color: C.muted, marginTop: 3 }}>{dataB.user.team}</div>}
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 12, alignItems: "center", marginTop: 18 }}>
            <div style={{ textAlign: "center" }}>
              <div style={{
                fontFamily: "'Oswald', sans-serif", fontSize: 48, fontWeight: 700,
                color: aLeads ? C.gold : C.white, lineHeight: 1,
                textShadow: aLeads ? "0 0 24px rgba(197,160,89,0.45)" : "none",
              }}>{dataA.grand}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.15em", marginTop: 6, fontFamily: "'Oswald', sans-serif" }}>points</div>
            </div>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 22, color: C.muted, fontWeight: 300 }}>—</div>
            <div style={{ textAlign: "center" }}>
              <div style={{
                fontFamily: "'Oswald', sans-serif", fontSize: 48, fontWeight: 700,
                color: bLeads ? C.gold : C.white, lineHeight: 1,
                textShadow: bLeads ? "0 0 24px rgba(197,160,89,0.45)" : "none",
              }}>{dataB.grand}</div>
              <div style={{ fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: "0.15em", marginTop: 6, fontFamily: "'Oswald', sans-serif" }}>points</div>
            </div>
          </div>

          <div style={{ marginTop: 16, textAlign: "center" }}>
            <span style={{
              display: "inline-block", padding: "7px 16px",
              background: tied ? "rgba(115,115,115,0.1)" : "linear-gradient(90deg, rgba(52,211,153,0.08), rgba(52,211,153,0.18), rgba(52,211,153,0.08))",
              border: "1px solid " + (tied ? "rgba(115,115,115,0.25)" : "rgba(52,211,153,0.35)"),
              borderRadius: 6,
              color: tied ? C.muted : C.green,
              fontFamily: "'Oswald', sans-serif", fontSize: 11, fontWeight: 700,
              letterSpacing: "0.12em", textTransform: "uppercase",
              boxShadow: tied ? "none" : "0 0 16px rgba(52,211,153,0.1)",
            }}>
              {tied ? "⚖ All tied" : (aLeads ? "▲ " + aFirst + " leads by " + diff : "▲ " + bFirst + " leads by " + Math.abs(diff))}
            </span>
          </div>
        </Card>

        {/* By phase */}
        <div style={{ fontSize: 10, color: C.gold, textTransform: "uppercase", letterSpacing: "0.18em", textAlign: "center", margin: "18px 0 10px", fontFamily: "'Oswald', sans-serif", fontWeight: 700 }}>— By phase —</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
          <PhaseCard label="① Group matches" sublabel="Score predictions" vA={gA.exactScorePts + gA.correctResultPts} vB={gB.exactScorePts + gB.correctResultPts} />
          <PhaseCard label="② Group standings" sublabel="Final positions" vA={gA.groupPositionPts + gA.groupAdvancePts} vB={gB.groupPositionPts + gB.groupAdvancePts} />
          <PhaseCard label="③ Knockouts" sublabel="Played so far" vA={kA.total} vB={kB.total} />
          <PhaseCard label="④ Globals" sublabel="Champion · Scorer · MVP" vA={glA.total} vB={glB.total} />
        </div>

        {/* Head to head highlights */}
        <Card style={{ marginBottom: 12 }}>
