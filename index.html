function AdminPointsConfig({ realResults, setRealResults }) {
  const P = getPoints(realResults);
  const [localPts, setLocalPts] = useState({ ...P });
  const [ptsSaved, setPtsSaved] = useState(false);
  const updateLocalPts = (key, val) => {
    setLocalPts({ ...localPts, [key]: parseInt(val) || 0 });
    setPtsSaved(false);
  };
  const savePts = async () => {
    const newResults = { ...realResults, customPoints: localPts };
    setRealResults(newResults);
    await sSet("wc-results", newResults);
    setPtsSaved(true);
    setTimeout(() => setPtsSaved(false), 3000);
  };
  const fields = [
    ["_header_groups", "⚽ GROUP STAGE"],
    ["exactScore", "Exact score (e.g. 2-1 = 2-1)"],
    ["correctResult", "Correct winner/draw (wrong score)"],
    ["teamExactPosition", "Exact group position (1st/2nd/best 3rd)"],
    ["teamAdvancesGroup", "Team qualifies (wrong position)"],
    ["_header_ko", "🏟️ KNOCKOUTS"],
    ["koExactScore", "Exact score (non-draw)"],
    ["exactDraw", "Exact draw at 90min (e.g. 1-1 = 1-1)"],
    ["advancer", "Correct advancer (draw → penalties/ET)"],
    ["koCorrectResult", "Correct winner (wrong score)"],
    ["drawNotExact", "Correct draw (wrong score)"],
    ["_header_globals", "🏆 GLOBAL PREDICTIONS"],
    ["champion", "World Cup Champion"],
    ["topScorer", "Top Scorer"],
    ["mvp", "Tournament MVP"],
  ];
  return (
    <div>
      <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 4px", textTransform: "uppercase", letterSpacing: "0.05em" }}>🎯 Points Configuration</h3>
      <p style={{ fontSize: 11, color: C.muted, margin: "0 0 10px" }}>Change point values. Hit Save — scores recalculate instantly for all users.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {fields.map(([key, label]) => {
          if (key.startsWith("_header")) return (
            <div key={key} style={{ padding: "8px 0 2px", marginTop: 6 }}>
              <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 11, fontWeight: 700, color: C.gold, letterSpacing: "0.08em" }}>{label}</span>
            </div>
          );
          return (
            <div key={key} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 8px", background: "#0D0D0D", borderRadius: 6 }}>
              <span style={{ fontSize: 12, color: C.muted }}>{label}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <input type="number" value={localPts[key] ?? 0} onChange={(e) => updateLocalPts(key, e.target.value)}
                  style={{ width: 50, padding: "4px 6px", background: "#1a1a1a", color: C.gold, border: "1px solid " + C.border, borderRadius: 4, fontSize: 13, textAlign: "center", fontWeight: 700 }} />
                <span style={{ fontSize: 11, color: C.muted }}>pts</span>
              </div>
            </div>
          );
        })}
        <button onClick={savePts} style={{
          width: "100%", marginTop: 12, padding: "10px", borderRadius: 6, fontSize: 13, fontWeight: 700, cursor: "pointer",
          fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em",
          background: ptsSaved ? "rgba(52,211,153,0.15)" : "rgba(197,160,89,0.15)",
          color: ptsSaved ? C.green : C.gold,
          border: "1px solid " + (ptsSaved ? "rgba(52,211,153,0.3)" : "rgba(197,160,89,0.3)"),
        }}>
          {ptsSaved ? "✅ Saved!" : "💾 Save Points"}
        </button>
      </div>
    </div>
  );
}

function AdminPanel({ users, setUsers, realResults, setRealResults, config, setConfig, knockoutSetup }) {
  const [adminTab, setAdminTab] = useState("users");
  const [resultGroup, setResultGroup] = useState("A");
  const [editedTeams, setEditedTeams] = useState({});
  const [editedNames, setEditedNames] = useState({});
  const [teamsSaving, setTeamsSaving] = useState(false);

  const pendingUsers = users.filter((u) => !u.approved);
  const approvedUsers = users.filter((u) => u.approved).sort((a, b) => a.name.localeCompare(b.name));

  const hasTeamEdits = Object.keys(editedTeams).length > 0;
  const hasNameEdits = Object.keys(editedNames).length > 0;
  const hasAnyEdits = hasTeamEdits || hasNameEdits;

  const saveUserEdits = async () => {
    setTeamsSaving(true);
    const latest = await sGet("wc-users") || users;
    const newUsers = latest.map((u) => {
      let updated = u;
      if (editedTeams[u.id] !== undefined) updated = { ...updated, team: editedTeams[u.id] };
      if (editedNames[u.id]) {
        if (editedNames[u.id].name !== undefined) updated = { ...updated, name: editedNames[u.id].name };
        if (editedNames[u.id].surname !== undefined) updated = { ...updated, surname: editedNames[u.id].surname };
      }
      return updated;
    });
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    setEditedTeams({});
    setEditedNames({});
    setTeamsSaving(false);
  };

  const approveUser = async (id) => {
    // Re-read latest from Firebase to avoid overwriting new registrations
    const latest = await sGet("wc-users") || users;
    const newUsers = latest.map((u) => (u.id === id ? { ...u, approved: true } : u));
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    // Open mailto for notification
    const user = newUsers.find((u) => u.id === id);
    if (user) {
      const subject = encodeURIComponent("✅ KYPorra 2026 — You're in!");
      const body = encodeURIComponent(`¡Hola ${user.name}!\n\nYour KYPorra 2026 account has been approved. You can now log in and make your predictions.\n\nGood luck! ⚽🏆`);
      window.open(`mailto:${user.email}?subject=${subject}&body=${body}`, "_blank");
    }
  };

  const rejectUser = async (id) => {
    // Re-read latest from Firebase to avoid overwriting new registrations
    const latest = await sGet("wc-users") || users;
    const newUsers = latest.filter((u) => u.id !== id);
    setUsers(newUsers);
    await sSet("wc-users", newUsers);
    // Clean up predictions for deleted user
    try { await sSet("wc-pred-" + id, null); } catch(e) {}
  };

  const updateResult = (key, side, val) => {
    const newResults = { ...realResults };
    if (!newResults.groups) newResults.groups = {};
    if (!newResults.groups[key]) newResults.groups[key] = { home: null, away: null };
    newResults.groups[key] = { ...newResults.groups[key], [side]: val };
    setRealResults(newResults);
  };

  const saveResults = async () => {
    // Calculate group tables from results
    const newResults = { ...realResults };
    if (!newResults.groupTables) newResults.groupTables = {};
    Object.keys(GROUPS).forEach((g) => {
      const teamCodes = GROUPS[g];
      const matches = getGroupMatches(g);
      const withScores = matches.map((m) => {
        const key = `${g}-${m.home}-${m.away}`;
        return { ...m, homeScore: newResults.groups?.[key]?.home ?? null, awayScore: newResults.groups?.[key]?.away ?? null };
      });
      const allDone = withScores.every((m) => m.homeScore != null && m.awayScore != null);
      if (allDone) {
        newResults.groupTables[g] = calcGroupTable(withScores, teamCodes);
      }
    });
    setRealResults(newResults);
    await sSet("wc-results", newResults);
    alert("✅ Results saved");
  };

  const allEmails = approvedUsers.map((u) => u.email).join(",");

  const openMailAll = (subject, body) => {
    const s = encodeURIComponent(subject);
    const b = encodeURIComponent(body);
    window.open(`mailto:${allEmails}?subject=${s}&body=${b}`, "_blank");
  };

  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: "0 0 16px" }}>
        <Shield size={18} style={{ color: C.gold, marginRight: 8 }} />
        Admin Panel
      </h2>

      <div style={{ border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: "12px 10px", background: "rgba(255,255,255,0.015)", marginBottom: 4 }}>
        <p style={{ fontSize: 9, color: C.muted, textAlign: "center", margin: "0 0 8px", letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: "'Oswald', sans-serif", fontWeight: 500 }}>Admin tools</p>
        <TabBar
          tabs={[
            { id: "users", label: `Users (${pendingUsers.length})`, icon: <Users size={14} /> },
            { id: "results", label: "Results", icon: <Zap size={14} /> },
            { id: "comms", label: "Comms", icon: <Mail size={14} /> },
            { id: "settings", label: "Points", icon: <Shield size={14} /> },
          ]}
          active={adminTab}
          onChange={setAdminTab}
        />
      </div>

      {adminTab === "users" && (
        <div>
          {pendingUsers.length > 0 && (
            <Card style={{ marginBottom: 16 }} glow>
              <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 600, margin: "0 0 12px", color: C.gold, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                ⏳ Pending approval ({pendingUsers.length})
              </h3>
              {pendingUsers.map((u) => (
                <div
                  key={u.id}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    padding: "10px 0",
                    borderBottom: `1px solid ${C.border}`,
                  }}
                >
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{u.name} {u.surname}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{u.team} · {u.email}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button
                      onClick={() => approveUser(u.id)}
                      style={{ background: C.green, color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
                    >
                      <Check size={12} /> Approve
                    </button>
                    <button
                      onClick={() => rejectUser(u.id)}
                      style={{ background: C.red, color: "#fff", border: "none", borderRadius: 6, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}
                    >
                      <X size={12} /> Reject
                    </button>
                  </div>
                </div>
              ))}
            </Card>
          )}

          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: 0, textTransform: "uppercase", letterSpacing: "0.05em" }}>
                ✅ Approved ({approvedUsers.length})
              </h3>
              {hasAnyEdits && (
                <button onClick={saveUserEdits} disabled={teamsSaving} style={{
                  padding: "4px 12px", background: "rgba(52,211,153,0.15)", color: C.green,
                  border: "1px solid rgba(52,211,153,0.3)", borderRadius: 6, fontSize: 11,
                  fontWeight: 700, cursor: "pointer",
                }}>
                  {teamsSaving ? "Saving..." : `💾 Save Changes`}
                </button>
              )}
            </div>
            {approvedUsers.map((u) => {
              const nameVal = editedNames[u.id]?.name !== undefined ? editedNames[u.id].name : u.name;
              const surnameVal = editedNames[u.id]?.surname !== undefined ? editedNames[u.id].surname : u.surname;
              const nameEdited = editedNames[u.id]?.name !== undefined || editedNames[u.id]?.surname !== undefined;
              const teamEdited = editedTeams[u.id] !== undefined;
              const editedStyle = { background: "#1a1a0a", border: "1px solid " + C.gold };
              const normalStyle = { background: "#0D0D0D", border: "1px solid " + C.border };
              const inputBase = { borderRadius: 4, color: C.white, fontSize: 11, padding: "2px 6px", outline: "none" };

              const updateName = (field, val) => {
                const orig = field === "name" ? u.name : u.surname;
                const current = { ...(editedNames[u.id] || {}) };
                if (val === orig) { delete current[field]; } else { current[field] = val; }
                const copy = { ...editedNames };
                if (Object.keys(current).length === 0) delete copy[u.id]; else copy[u.id] = current;
                setEditedNames(copy);
              };

              return (
                <div key={u.id} style={{ padding: "8px 0", borderBottom: `1px solid ${C.border}`, fontSize: 13 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", gap: 4, alignItems: "center", flexWrap: "wrap", flex: 1 }}>
                      <input value={nameVal} onChange={(e) => updateName("name", e.target.value)}
                        style={{ ...inputBase, ...(nameEdited ? editedStyle : normalStyle), width: 90 }} />
                      <input value={surnameVal} onChange={(e) => updateName("surname", e.target.value)}
                        style={{ ...inputBase, ...(nameEdited ? editedStyle : normalStyle), width: 110 }} />
                      <input
                        value={editedTeams[u.id] !== undefined ? editedTeams[u.id] : u.team}
                        onChange={(e) => {
                          const val = e.target.value;
                          if (val === u.team) { const c = { ...editedTeams }; delete c[u.id]; setEditedTeams(c); }
                          else setEditedTeams({ ...editedTeams, [u.id]: val });
                        }}
                        style={{ ...inputBase, ...(teamEdited ? editedStyle : normalStyle), width: 130, color: C.muted }}
                      />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                  <button
                    onClick={async () => {
                      const tmp = generateTempPassword();
                      const hashed = await hashString(tmp);
                      // Re-read latest from Firebase to avoid overwriting new registrations
                      const latest = await sGet("wc-users") || users;
                      const newUsers = latest.map((x) => x.id === u.id ? { ...x, password: hashed } : x);
                      setUsers(newUsers);
                      await sSet("wc-users", newUsers);
                      const el = document.getElementById("tmp-pw-" + u.id);
                      if (el) { el.textContent = tmp; el.style.display = "block"; el.style.userSelect = "all"; el.style.webkitUserSelect = "all"; }
                    }}
                    title="Reset password"
                    style={{ padding: "3px 8px", background: "rgba(96,165,250,0.1)", border: "1px solid rgba(96,165,250,0.2)", borderRadius: 4, color: C.blue, fontSize: 10, cursor: "pointer", fontWeight: 600 }}
                  >
                    Reset PW
                  </button>
                  <span id={"tmp-pw-" + u.id} style={{ display: "none", fontSize: 10, color: C.green, fontFamily: "monospace", padding: "2px 6px", background: "#0D0D0D", borderRadius: 4, cursor: "text", userSelect: "all", WebkitUserSelect: "all" }} onClick={(e) => { const range = document.createRange(); range.selectNodeContents(e.target); const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }} />
                  <button
                    onClick={() => { if (confirm("Delete " + u.name + " " + u.surname + "?")) rejectUser(u.id); }}
                    style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 12, opacity: 0.6 }}
                  >
                    <X size={14} />
                  </button>
                    </div>
                  </div>
                  <div style={{ fontSize: 10, color: C.muted, opacity: 0.5, marginTop: 2, paddingLeft: 2 }}>{u.email}</div>
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {adminTab === "results" && (
        <div>
          {/* API Import Button */}
          <Card style={{ marginBottom: 16, background: "#111111" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, margin: "0 0 2px" }}>📡 Import today's results</p>
                <p style={{ fontSize: 11, color: C.muted, margin: 0 }}>Fetch finished matches from API</p>
              </div>
              <button
                onClick={async () => {
                  const apiKey = typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_api_key") : null;
                  if (!apiKey) {
                    alert("⚠️ Introduce tu API key en la pestaña Config primero.");
                    return;
                  }
                  try {
                    const resp = await fetch("https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED", {
                      headers: { "X-Auth-Token": apiKey }
                    });
                    if (!resp.ok) throw new Error("API " + resp.status);
                    const data = await resp.json();
                    const matches = data.matches || [];
                    if (matches.length === 0) {
                      alert("No finished matches yet.");
                      return;
                    }
                    const newResults = { ...realResults };
                    if (!newResults.groups) newResults.groups = {};
                    if (!newResults.knockout) newResults.knockout = {};
                    let importedGroups = 0;
                    let importedKO = 0;
                    const tlaMap = {};
                    Object.values(TEAMS).forEach((t) => { tlaMap[t.code] = t.code; });

                    // Stage name mapping from API to our round keys
                    const stageMap = {
                      "LAST_32": "r32", "ROUND_OF_32": "r32",
                      "LAST_16": "r16", "ROUND_OF_16": "r16",
                      "QUARTER_FINALS": "qf", "QUARTER_FINAL": "qf",
                      "SEMI_FINALS": "sf", "SEMI_FINAL": "sf",
                      "THIRD_PLACE": "third",
                      "FINAL": "final",
                    };

                    matches.forEach((m) => {
                      if (!m.score?.fullTime || m.score.fullTime.home == null) return;
                      const homeCode = tlaMap[m.homeTeam?.tla];
                      const awayCode = tlaMap[m.awayTeam?.tla];
                      if (!homeCode || !awayCode) return;

                      const stage = m.stage || "";

                      // GROUP STAGE
                      if (stage === "GROUP_STAGE") {
                        const groupEntry = Object.entries(GROUPS).find(([g, teams]) =>
                          teams.includes(homeCode) && teams.includes(awayCode)
                        );
                        if (!groupEntry) return;
                        const key = groupEntry[0] + "-" + homeCode + "-" + awayCode;
                        const keyAlt = groupEntry[0] + "-" + awayCode + "-" + homeCode;
                        if (newResults.groups[key]?.home != null) return;
                        if (GROUPS[groupEntry[0]].indexOf(homeCode) < GROUPS[groupEntry[0]].indexOf(awayCode)) {
                          newResults.groups[key] = { home: m.score.fullTime.home, away: m.score.fullTime.away };
                        } else {
                          newResults.groups[keyAlt] = { home: m.score.fullTime.away, away: m.score.fullTime.home };
                        }
                        importedGroups++;
                        return;
                      }

                      // KNOCKOUT STAGES
                      const roundKey = stageMap[stage];
                      if (!roundKey) return;
                      const roundInfo = ROUNDS.find((r) => r.key === roundKey);
                      if (!roundInfo) return;

                      // Find the matching slot by checking team assignments
                      let matched = false;
                      for (let i = 1; i <= roundInfo.matches; i++) {
                        const matchId = roundKey + "-" + i;
                        if (newResults.knockout[matchId]?.advances) continue; // already filled
                        const teams = getKnockoutTeam(matchId, knockoutSetup, newResults.knockout);
                        if (!teams.home || !teams.away) continue;
                        if ((teams.home === homeCode && teams.away === awayCode) ||
                            (teams.home === awayCode && teams.away === homeCode)) {
                          const isFlipped = teams.home === awayCode;
                          const hs = isFlipped ? m.score.fullTime.away : m.score.fullTime.home;
                          const as_ = isFlipped ? m.score.fullTime.home : m.score.fullTime.away;
                          // Determine who advances (winner, or penalties winner)
                          let advances = null;
                          if (hs > as_) advances = teams.home;
                          else if (as_ > hs) advances = teams.away;
                          else {
                            // Draw at 90min — check penalties/extra time
                            const pen = m.score?.penalties;
                            const et = m.score?.extraTime;
                            if (pen?.home != null) {
                              const penHome = isFlipped ? pen.away : pen.home;
                              const penAway = isFlipped ? pen.home : pen.away;
                              advances = penHome > penAway ? teams.home : teams.away;
                            } else if (et?.home != null) {
                              const etHome = isFlipped ? et.away : et.home;
                              const etAway = isFlipped ? et.home : et.away;
                              if (etHome > etAway) advances = teams.home;
                              else if (etAway > etHome) advances = teams.away;
                            }
                          }
                          newResults.knockout[matchId] = { home: hs, away: as_, advances };
                          importedKO++;
                          matched = true;
                          break;
                        }
                      }
                    });

                    // Recalculate group tables
                    if (!newResults.groupTables) newResults.groupTables = {};
                    Object.keys(GROUPS).forEach((g) => {
                      const teamCodes = GROUPS[g];
                      const gMatches = getGroupMatches(g);
                      const withScores = gMatches.map((gm) => {
                        const key = g + "-" + gm.home + "-" + gm.away;
                        return { ...gm, homeScore: newResults.groups?.[key]?.home ?? null, awayScore: newResults.groups?.[key]?.away ?? null };
                      });
                      const allDone = withScores.every((gm) => gm.homeScore != null && gm.awayScore != null);
                      if (allDone) newResults.groupTables[g] = calcGroupTable(withScores, teamCodes);
                    });

                    setRealResults(newResults);
                    alert("✅ Imported: " + importedGroups + " group + " + importedKO + " knockout. Review and Save.");
                  } catch (e) {
                    alert("⚠️ Error: " + e.message + ". You can enter results manually.");
                  }
                }}
                style={{
                  padding: "8px 16px", background: "rgba(59,130,246,0.15)", color: C.blue,
                  border: `1px solid ${C.blue}33`, borderRadius: 8, fontSize: 12,
                  fontWeight: 700, cursor: "pointer",
                }}
              >
                🔄 Import
              </button>
            </div>
          </Card>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {Object.keys(GROUPS).map((g) => (
              <button
                key={g}
                onClick={() => setResultGroup(g)}
                style={{
                  padding: "6px 12px",
                  background: resultGroup === g ? C.gold : "transparent",
                  color: resultGroup === g ? "#0a0e1a" : C.muted,
                  border: `1px solid ${resultGroup === g ? C.gold : C.border}`,
                  borderRadius: 6,
                  fontSize: 13,
                  fontWeight: 700,
                  cursor: "pointer",
                }}
              >
                Group {g}
              </button>
            ))}
          </div>

          <Card>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 600, margin: "0 0 12px", color: C.gold, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              Real results · Group {resultGroup}
            </h3>
            {getGroupMatches(resultGroup).map((m) => {
              const key = `${resultGroup}-${m.home}-${m.away}`;
              const res = realResults?.groups?.[key] || { home: null, away: null };
              return (
                <div
                  key={key}
                  style={{
                    padding: "8px 0",
                    borderBottom: `1px solid ${C.border}`,
                  }}
                >
                  {m.date && <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 10, color: C.gold, marginBottom: 4, textAlign: "center", opacity: 0.6, letterSpacing: "0.08em", textTransform: "uppercase" }}>{formatMatchDate(m.date)}</div>}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8 }}>
                  <div style={{ display: "flex", justifyContent: "flex-end" }}>
                    <TeamBadge code={m.home} size="sm" />
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    <ScoreInput value={res.home} onChange={(v) => updateResult(key, "home", v)} />
                    <span style={{ color: C.muted, fontWeight: 700, fontSize: 12 }}>-</span>
                    <ScoreInput value={res.away} onChange={(v) => updateResult(key, "away", v)} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "flex-start" }}>
                    <TeamBadge code={m.away} size="sm" />
                  </div>
                  </div>
                </div>
              );
            })}
            <GoldButton onClick={saveResults} style={{ width: "100%", marginTop: 16 }}>
              💾 Save resultados
            </GoldButton>
          </Card>
        </div>
      )}

      {adminTab === "comms" && (
        <div>
          <Card>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: "0.05em" }}>📋 Participant Emails ({approvedUsers.length})</h3>
            <p style={{ fontSize: 11, color: C.muted, margin: "0 0 10px" }}>
              Copy all emails and paste into Outlook's "To:" field.
            </p>
            <div style={{ background: "#0D0D0D", padding: 10, borderRadius: 6, fontSize: 11, color: C.muted, wordBreak: "break-all", marginBottom: 10 }}>
              {allEmails || "No approved users"}
            </div>
            {allEmails && (
              <button
                onClick={() => {
                  const el = document.createElement("textarea");
                  el.value = allEmails;
                  document.body.appendChild(el);
                  el.select();
                  document.execCommand("copy");
                  document.body.removeChild(el);
                  alert("✅ " + approvedUsers.length + " emails copied!");
                }}
                style={{
                  width: "100%", padding: "10px", background: "rgba(59,130,246,0.15)", color: C.blue,
                  border: "1px solid rgba(59,130,246,0.2)", borderRadius: 8, fontSize: 13,
                  fontWeight: 700, cursor: "pointer",
                }}
              >
                📋 Copy all emails
              </button>
            )}
          </Card>
        </div>
      )}

      {adminTab === "settings" && (
        <div>
          <Card style={{ marginBottom: 16 }}>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 12px", textTransform: "uppercase", letterSpacing: "0.05em" }}>⏰ Prediction Windows</h3>
            {DEADLINES_INFO.map((d) => {
              const closed = isLocked(d.key);
              return (
                <div key={d.key} style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "8px 0", borderBottom: "1px solid " + C.border,
                }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{d.label}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>{formatDeadline(d.date)}</div>
                  </div>
                  <span style={{
                    fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20,
                    background: closed ? C.red + "22" : C.green + "22",
                    color: closed ? C.red : C.green,
                  }}>
                    {closed ? "LOCKED" : "OPEN"}
                  </span>
                </div>
              );
            })}
          </Card>
          <Card style={{ marginBottom: 16 }}>
            <AdminPointsConfig realResults={realResults} setRealResults={setRealResults} />
          </Card>
          <Card style={{ marginBottom: 16 }}>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 12px", textTransform: "uppercase", letterSpacing: "0.05em" }}>⚙️ General</h3>
            <div style={{ fontSize: 12, color: C.muted }}>
              <p>Approved participants: <strong style={{ color: C.white }}>{approvedUsers.length}</strong></p>
              <p>Pending participants: <strong style={{ color: C.gold }}>{pendingUsers.length}</strong></p>
            </div>
          </Card>
          <Card>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 14, fontWeight: 600, margin: "0 0 12px", textTransform: "uppercase", letterSpacing: "0.05em" }}>📡 Results API</h3>
            <p style={{ fontSize: 11, color: C.muted, margin: "0 0 8px" }}>
              Your football-data.org API key. Stored only in your browser.
            </p>
            <input
              type="password"
              placeholder="Paste your API key here"
              defaultValue={typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_api_key") || "" : ""}
              onChange={(e) => { if (typeof localStorage !== "undefined") localStorage.setItem("kyporra_api_key", e.target.value.trim()); }}
              style={{
                width: "100%", padding: "8px 12px",
                background: "#0D0D0D", color: C.white,
                border: `1px solid ${C.border}`, borderRadius: 8,
                fontSize: 13, boxSizing: "border-box",
              }}
            />
            <p style={{ fontSize: 10, color: C.muted, margin: "6px 0 0" }}>
              Free at football-data.org/client/register
            </p>
          </Card>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════
   KNOCKOUT PREDICTIONS
   ═══════════════════════════════════════════ */

const ROUNDS = [
  { key: "r32", label: "Round of 32", matches: 16, deadline: "r32" },
  { key: "r16", label: "Round of 16", matches: 8, deadline: "r16" },
  { key: "qf", label: "Quarter-finals", matches: 4, deadline: "qf" },
  { key: "sf", label: "Semi-finals", matches: 2, deadline: "sf" },
  { key: "third", label: "3rd Place", matches: 1, deadline: "finals" },
  { key: "final", label: "Final", matches: 1, deadline: "finals" },
];

// Which deadline window does each round belong to
const ROUND_WINDOW = { r32: "r32", r16: "r16", qf: "qf", sf: "sf", third: "finals", final: "finals" };

function getAdvancer(matchId, koPreds, realKo) {
  // If the round of this match is in a locked window AND we have real results, use real
  const round = matchId.split("-")[0];
  const window = ROUND_WINDOW[round];
  if (realKo && isLocked(window) && realKo[matchId]?.advances) {
    return realKo[matchId].advances;
  }
  const pred = koPreds?.[matchId];
  return pred?.advances || null;
}

function getKnockoutTeam(matchId, knockoutSetup, koPreds, realKo) {
  const round = matchId.split("-")[0];
  const idx = parseInt(matchId.split("-")[1]) - 1;
  const slot = knockoutSetup?.[round]?.[idx];
  const hOver = slot ? slot.home : undefined;
  const aOver = slot ? slot.away : undefined;

  // R32: always from admin setup
  if (round === "r32") {
    return { home: hOver || null, away: aOver || null };
  }

  // R16+: compute auto, then layer per-side overrides on top.
  // An override is "defined" (including "" = explicit empty) -> respect it.
  // An override is `undefined` -> fall to auto.
  let autoHome = null, autoAway = null;
  if (matchId === "final-1") {
    autoHome = getAdvancer("sf-1", koPreds, realKo);
    autoAway = getAdvancer("sf-2", koPreds, realKo);
  } else if (matchId === "third-1") {
    const sf1Teams = getKnockoutTeam("sf-1", knockoutSetup, koPreds, realKo);
    const sf1Adv = getAdvancer("sf-1", koPreds, realKo);
    autoHome = sf1Adv ? (sf1Adv === sf1Teams.home ? sf1Teams.away : sf1Teams.home) : null;
    const sf2Teams = getKnockoutTeam("sf-2", knockoutSetup, koPreds, realKo);
    const sf2Adv = getAdvancer("sf-2", koPreds, realKo);
    autoAway = sf2Adv ? (sf2Adv === sf2Teams.home ? sf2Teams.away : sf2Teams.home) : null;
  } else {
    const roundMap = { "r16": "r32", "qf": "r16", "sf": "qf" };
    const prevRound = roundMap[round];
    if (prevRound) {
      autoHome = getAdvancer(prevRound + "-" + (idx * 2 + 1), koPreds, realKo);
      autoAway = getAdvancer(prevRound + "-" + (idx * 2 + 2), koPreds, realKo);
    }
  }

  return {
    home: hOver !== undefined ? (hOver || null) : autoHome,
    away: aOver !== undefined ? (aOver || null) : autoAway,
  };
}

function KnockoutPredictions({ predictions, onSave, knockoutSetup, realResults }) {
  const realKo = realResults?.knockout || {};
  const [koPreds, setKoPreds] = useState(() => {
    const stored = predictions?.knockout || {};
    const filled = { ...stored };
    // Pre-fill knockout matches with 0-0 where both teams are known
    const ROUNDS_KEYS = ["r32", "r16", "qf", "sf", "final"];
    ROUNDS_KEYS.forEach((rk) => {
      const count = rk === "r32" ? 16 : rk === "r16" ? 8 : rk === "qf" ? 4 : rk === "sf" ? 2 : 1;
      for (let i = 1; i <= count; i++) {
        const matchId = rk + "-" + i;
        if (!filled[matchId]) {
          const teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo);
          if (teams?.home && teams?.away) {
            filled[matchId] = { home: 0, away: 0, advances: null };
          }
        } else {
          filled[matchId] = { home: filled[matchId].home ?? 0, away: filled[matchId].away ?? 0, advances: filled[matchId].advances || null };
        }
      }
    });
    return filled;
  });
  const [activeRound, setActiveRound] = useState(() => getLiveKoRound(realResults?.knockout || {}));
  const [saving, setSaving] = useState(false);

  // Sync when new teams appear in knockoutSetup or new predictions arrive
  useEffect(() => {
    setKoPreds((prev) => {
      const filled = { ...prev };
      const ROUNDS_KEYS = ["r32", "r16", "qf", "sf", "final"];
      let changed = false;
      ROUNDS_KEYS.forEach((rk) => {
        const count = rk === "r32" ? 16 : rk === "r16" ? 8 : rk === "qf" ? 4 : rk === "sf" ? 2 : 1;
        for (let i = 1; i <= count; i++) {
          const matchId = rk + "-" + i;
          if (!filled[matchId]) {
            const teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo);
            if (teams?.home && teams?.away) {
              filled[matchId] = { home: 0, away: 0, advances: null };
              changed = true;
            }
          }
        }
      });
      return changed ? filled : prev;
    });
  }, [knockoutSetup, realResults]);

  const updateMatch = (matchId, field, val) => {
    const koKickoff = KO_SCHEDULE[matchId] ? new Date(KO_SCHEDULE[matchId]) : null;
    const koLocked = koKickoff ? new Date() >= new Date(koKickoff.getTime() - 60000) : false;
    if (koLocked) return;
    const current = koPreds[matchId] || { home: 0, away: 0, advances: null };
    const updated = { ...current, [field]: val };
    if (field === "home" || field === "away") {
      const h = field === "home" ? val : (updated.home ?? 0);
      const a = field === "away" ? val : (updated.away ?? 0);
      const teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo);
      if (h > a) {
        updated.advances = teams.home;
      } else if (a > h) {
        updated.advances = teams.away;
      } else {
        // Draw: always reset advances to force user to pick
        updated.advances = null;
      }
    }
    const newPreds = { ...koPreds, [matchId]: updated };
    setKoPreds(newPreds);
  };

  const handleSave = async () => {
    setSaving(true);
    await onSave({ ...predictions, knockout: koPreds });
    setSaving(false);
  };

  const hasR32Setup = knockoutSetup?.r32?.length > 0 && knockoutSetup.r32.some((m) => m.home);
  if (!hasR32Setup) {
    return (
      <Card style={{ textAlign: "center", padding: 30 }}>
        <span style={{ fontSize: 40 }}>🏟️</span>
        <h3 style={{ fontSize: 16, fontWeight: 700, margin: "12px 0 6px" }}>Knockouts</h3>
        <p style={{ color: C.muted, fontSize: 13 }}>Brackets will be available once the group stage ends and the admin sets up the matchups.</p>
        {!isLocked("groups") && (<p style={{ color: C.gold, fontSize: 12, marginTop: 8 }}>⏰ First complete your group stage predictions</p>)}
      </Card>
    );
  }

  const round = ROUNDS.find((r) => r.key === activeRound);
  const deadlineKey = round?.deadline;
  const locked = isLocked(deadlineKey);

  return (
    <div>
      <KoStoryCover realKo={realResults?.knockout || {}} knockoutSetup={knockoutSetup} compact />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", textTransform: "uppercase", letterSpacing: "0.06em", margin: 0 }}>🏟️ Knockouts</h2>
        <GoldButton onClick={handleSave} small disabled={saving}>{saving ? "Saving..." : "💾 Save"}</GoldButton>
      </div>
      <div style={{ background: "rgba(212,165,57,0.08)", border: "1px solid rgba(212,165,57,0.2)", borderRadius: 8, padding: "8px 14px", marginBottom: 12, fontSize: 12 }}>
        <span style={{ color: C.gold, fontWeight: 700 }}>⏰ Lock:</span>
        <span style={{ color: C.muted, marginLeft: 6 }}>Each match locks 1 min before kickoff. Edit any time before that.</span>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
        {ROUNDS.map((r) => {
          const filled = Array.from({ length: r.matches }, (_, i) => koPreds[r.key + "-" + (i + 1)]?.advances).filter(Boolean).length;
          return (<button key={r.key} onClick={() => setActiveRound(r.key)} style={{
            padding: "6px 10px", background: activeRound === r.key ? C.gold : "transparent",
            color: activeRound === r.key ? "#0a0e1a" : filled === r.matches ? C.green : C.muted,
            border: "1px solid " + (activeRound === r.key ? C.gold : filled === r.matches ? C.green + "44" : C.border),
            borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>{filled === r.matches && activeRound !== r.key ? "✓ " : ""}{r.label}</button>);
        })}
      </div>
      <Card>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
          <h3 style={{ fontSize: 15, fontWeight: 700, margin: 0, color: C.gold }}>{round.label}</h3>
          <Badge>Exact {getPoints(realResults).exactScore} / Draw {getPoints(realResults).exactDraw} pts</Badge>
          {locked && <Badge color={C.red}>LOCKED</Badge>}
        </div>
        <p style={{ fontSize: 11, color: C.muted, margin: "0 0 12px" }}>Enter the 90-min result. If it's a draw, pick who advances (ET/penalties) for a bonus point.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {Array.from({ length: round.matches }, (_, i) => {
            const matchId = round.key + "-" + (i + 1);
            const teams = getKnockoutTeam(matchId, knockoutSetup, realKo, realKo);
            const pred = koPreds[matchId] || { home: 0, away: 0, advances: null };
            const bothTeams = teams.home && teams.away;
            const isDraw = pred.home != null && pred.away != null && pred.home === pred.away;
            const koKickoff = KO_SCHEDULE[matchId] ? new Date(KO_SCHEDULE[matchId]) : null;
            const koLocked = koKickoff ? new Date() >= new Date(koKickoff.getTime() - 60000) : locked;
            const real = realKo[matchId];
            const acc = getMatchAccuracy(pred, real);
            return (
              <div key={matchId} style={{ padding: "10px 14px", borderRadius: 8, background: ACC_BG[acc], border: "1px solid " + (acc !== "pending" ? ACC_BD[acc] : C.border), opacity: bothTeams ? 1 : 0.4 }}>
                {KO_SCHEDULE[matchId] && <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 10, color: acc !== "pending" ? ACC_C[acc] : koLocked ? C.muted : C.gold, marginBottom: 6, textAlign: "center", opacity: acc === "pending" ? 0.6 : 0.85, letterSpacing: "0.08em", textTransform: "uppercase" }}>{formatMatchDate(KO_SCHEDULE[matchId])}{acc === "exact" ? " ✓ EXACT" : acc === "correct" ? " ★ RESULT" : acc === "wrong" ? " ✕ MISS" : koLocked ? " 🔒" : " ✏️"}</div>}
                <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8 }}>
                  <div style={{ display: "flex", justifyContent: "flex-end" }}><TeamBadge code={teams.home} size="sm" /></div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    <ScoreInput value={pred.home ?? 0} onChange={(v) => bothTeams && updateMatch(matchId, "home", v)} disabled={!bothTeams || koLocked} scoreColor={acc !== "pending" ? ACC_C[acc] : null} />
                    <span style={{ color: acc !== "pending" ? ACC_C[acc] : C.muted, fontWeight: 700, fontSize: 12 }}>-</span>
                    <ScoreInput value={pred.away ?? 0} onChange={(v) => bothTeams && updateMatch(matchId, "away", v)} disabled={!bothTeams || koLocked} scoreColor={acc !== "pending" ? ACC_C[acc] : null} />
                  </div>
                  <div style={{ display: "flex", justifyContent: "flex-start" }}><TeamBadge code={teams.away} size="sm" /></div>
                </div>
                {isDraw && bothTeams && (
                  <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 8, paddingTop: 8, borderTop: "1px solid " + C.border }}>
                    <span style={{ fontSize: 11, color: C.gold, alignSelf: "center" }}>Who advances?</span>
                    {[teams.home, teams.away].map((t) => {
                      const isUserPick = pred.advances === t;
                      const hasReal = !!(real && real.advances);
                      const isCorrectAnswer = real?.advances === t;
                      // Determine colors based on prediction vs reality
                      let bg, border, color;
                      if (isUserPick && hasReal && isCorrectAnswer) {
                        // User picked correctly
                        bg = C.green + "22"; border = "2px solid " + C.green; color = C.green;
                      } else if (isUserPick && hasReal && !isCorrectAnswer) {
                        // User picked WRONG
                        bg = C.red + "22"; border = "2px solid " + C.red; color = C.red;
                      } else if (isUserPick && !hasReal) {
                        // User's pick, no real yet
                        bg = C.green + "22"; border = "2px solid " + C.green; color = C.green;
                      } else if (!isUserPick && hasReal && isCorrectAnswer) {
                        // User didn't pick this, but it was the correct one — show as hint
                        bg = "transparent"; border = "2px dashed " + C.green + "88"; color = C.green;
                      } else {
                        // Default: not picked, not correct
                        bg = "transparent"; border = "1px solid " + C.border; color = C.muted;
                      }
                      return (
                        <button key={t} onClick={() => !koLocked && updateMatch(matchId, "advances", t)} disabled={koLocked} style={{
                          padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: koLocked ? "default" : "pointer",
                          background: bg, border: border, color: color, fontWeight: 600,
                        }}><TeamBadge code={t} size="sm" /></button>
                      );
                    })}
                  </div>
                )}
                {pred.advances && !isDraw && (
                  <div style={{ textAlign: "center", fontSize: 10, color: C.muted, marginTop: 4, opacity: 0.7 }}>Predicted advance: {TEAMS[pred.advances]?.name}</div>
                )}
                {real && real.home != null && real.away != null && (
                  <div style={{ textAlign: "center", fontSize: 10, color: C.muted, marginTop: 4, opacity: 0.7 }}>Real: {real.home} - {real.away}{real.advances ? " → " + TEAMS[real.advances]?.name : ""}</div>
                )}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

function TeamPicker({ value, onChange, label }) {
  const [search, setSearch] = useState("");
  const [open, setOpen] = useState(false);
  const team = value ? TEAMS[value] : null;
  const filtered = search
    ? ALL_TEAM_CODES.filter((c) => TEAMS[c].name.toLowerCase().includes(search.toLowerCase()) || c.toLowerCase().includes(search.toLowerCase()))
    : ALL_TEAM_CODES;

  return (
    <div style={{ position: "relative" }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          width: "100%", padding: "6px 8px", background: "#0D0D0D", color: team ? C.white : C.muted,

      {open && (
        <div style={{
          position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50,

          maxHeight: 200, overflowY: "auto", marginTop: 2,

          <input
            autoFocus
            placeholder="Search team..."

            style={{
              width: "100%", padding: "8px", background: "#0D0D0D", color: C.white,
              border: "none", borderBottom: "1px solid " + C.border, fontSize: 12,
              outline: "none", boxSizing: "border-box",
            }}
          />
          <button onClick={() => { onChange(""); setOpen(false); setSearch(""); }}

                color: C.white, border: "none", fontSize: 12, cursor: "pointer", textAlign: "left",
                display: "flex", alignItems: "center", gap: 6,
              }}>
              <TeamBadge code={c} size="sm" />
            </button>
          ))}

      )}

  );
}

function AdminKnockoutSetup({ knockoutSetup, setKnockoutSetup, realResults, setRealResults }) {
  const [setup, setSetup] = useState(knockoutSetup || { r32: Array.from({ length: 16 }, () => ({ home: "", away: "" })) });
  const [saving, setSaving] = useState(false);
  const [activeTab, setActiveTab] = useState("brackets");
  const [bracketRound, setBracketRound] = useState("r32");
  const [koResultRound, setKoResultRound] = useState("r32");

  const updateMatch = (idx, side, val) => {
    setSetup((s) => {
      const newR32 = [...(s.r32 || [])];
      if (!newR32[idx]) newR32[idx] = { home: "", away: "" };
      newR32[idx] = { ...newR32[idx], [side]: val };
      return { ...s, r32: newR32 };
    });
  };

  const updateMatchAny = (round, idx, side, val) => {
    setSetup((s) => {
      const arr = [...(s[round] || Array.from({ length: ROUNDS.find((r) => r.key === round)?.matches || 0 }, () => ({ home: "", away: "" })))];
      if (!arr[idx]) arr[idx] = { home: "", away: "" };
      arr[idx] = { ...arr[idx], [side]: val };
      return { ...s, [round]: arr };
    });
  };

  // Clears both sides of a slot in a single state update.
  // Sets both to "" (explicit empty) so the slot shows blank — does not fall back to auto-team.
  const clearMatch = (round, idx) => {
    setSetup((s) => {
      const arr = [...(s[round] || Array.from({ length: ROUNDS.find((r) => r.key === round)?.matches || 0 }, () => ({ home: "", away: "" })))];
      if (!arr[idx]) arr[idx] = { home: "", away: "" };
      arr[idx] = { ...arr[idx], home: "", away: "" };
      return { ...s, [round]: arr };
    });
  };

  // Resets a slot back to auto-calc (removes overrides for both sides).
  const resetSlotToAuto = (round, idx) => {
    setSetup((s) => {
      const arr = [...(s[round] || Array.from({ length: ROUNDS.find((r) => r.key === round)?.matches || 0 }, () => ({ home: "", away: "" })))];
      if (!arr[idx]) arr[idx] = {};
      const { home, away, ...rest } = arr[idx];
      arr[idx] = rest;
      return { ...s, [round]: arr };
    });
  };

  const handleSave = async () => {
    setSaving(true);
    setKnockoutSetup(setup);
    await sSet("wc-knockout", setup);
    setSaving(false);
    alert("✅ Brackets guardados");
  };

  // Knockout real results
  const koResults = realResults?.knockout || {};

  const getKoMatchTeams = (matchId) => {
    return getKnockoutTeam(matchId, setup, koResults, koResults);
  };

  const updateKoResult = (matchId, field, val) => {
    const current = koResults[matchId] || { home: 0, away: 0, advances: null };
    const updated = { ...current, [field]: val };
    if (field === "home" || field === "away") {
      const h = field === "home" ? val : (updated.home ?? 0);
      const a = field === "away" ? val : (updated.away ?? 0);
      const teams = getKoMatchTeams(matchId);
      if (h > a) updated.advances = teams.home;
      else if (a > h) updated.advances = teams.away;
      else if (updated.advances !== teams.home && updated.advances !== teams.away) updated.advances = null;
    }
    const newKo = { ...koResults, [matchId]: updated };
    setRealResults({ ...realResults, knockout: newKo });
  };

  const saveKoResults = async () => {
    await sSet("wc-results", realResults);
    alert("✅ Knockout results saved");
  };

  const [standingsEdit, setStandingsEdit] = useState(realResults?.groupStandings?.groups || {});
  const [bestThirds, setBestThirds] = useState(realResults?.groupStandings?.bestThirds || []);
  const [standingsConfirmed, setStandingsConfirmed] = useState(realResults?.groupStandings?.confirmed || false);

  // Calculate group tables from real results
  const calcGroupStandings = () => {
    const allStandings = {};
    Object.keys(GROUPS).forEach((g) => {
      if (standingsEdit[g]) {
        allStandings[g] = standingsEdit[g];
      } else {
        const teamCodes = GROUPS[g];
        const matches = getGroupMatches(g);
        const realMatches = matches.map((m) => {
          const key = g + "-" + m.home + "-" + m.away;
          const r = realResults?.groups?.[key];
          return { ...m, homeScore: r?.home ?? null, awayScore: r?.away ?? null };
        });
        const hasAllResults = realMatches.every((m) => m.homeScore !== null && m.awayScore !== null);
        if (hasAllResults) {
          allStandings[g] = calcGroupTable(realMatches, teamCodes).map((t) => t.code);
        }
      }
    });
    return allStandings;
  };

  const allGroupStandings = calcGroupStandings();

  const moveTeam = (group, fromIdx, toIdx) => {
    const arr = [...(allGroupStandings[group] || [])];
    if (toIdx < 0 || toIdx >= arr.length) return;
    const [moved] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, moved);
    setStandingsEdit({ ...standingsEdit, [group]: arr });
  };

  const toggleBestThird = (code) => {
    if (bestThirds.includes(code)) setBestThirds(bestThirds.filter((c) => c !== code));
    else if (bestThirds.length < 8) setBestThirds([...bestThirds, code]);
  };

  const saveStandings = async () => {
    const gs = { confirmed: true, groups: allGroupStandings, bestThirds };
    const newResults = { ...realResults, groupStandings: gs };
    setRealResults(newResults);
    setStandingsConfirmed(true);
    await sSet("wc-results", newResults);
    alert("✅ Group standings confirmed");
  };

  // Load confirmed standings into R32 brackets
  const loadFifaCalendar = () => {
    if (!confirm("This will overwrite R32 slots with the actual FIFA calendar matchups. Continue?")) return;
    const r32 = [
      { home: "RSA", away: "CAN" },   // r32-1: 28/6 21:00 — Sudáfrica vs Canadá
      { home: "BRA", away: "JPN" },   // r32-2: 29/6 19:00 — Brasil vs Japón
      { home: "GER", away: "PAR" },   // r32-3: 29/6 22:30 — Alemania vs Paraguay
      { home: "NED", away: "MAR" },   // r32-4: 30/6 03:00 — Países Bajos vs Marruecos
      { home: "CIV", away: "NOR" },   // r32-5: 30/6 19:00 — Costa de Marfil vs Noruega
      { home: "FRA", away: "SWE" },   // r32-6: 30/6 23:00 — Francia vs Suecia
      { home: "MEX", away: "ECU" },   // r32-7: 01/7 03:00 — México vs Ecuador
      { home: "ENG", away: "COD" },   // r32-8: 01/7 18:00 — Inglaterra vs RD Congo
      { home: "BEL", away: "SEN" },   // r32-9: 01/7 22:00 — Bélgica vs Senegal
      { home: "USA", away: "BIH" },   // r32-10: 02/7 02:00 — USA vs Bosnia
      { home: "ESP", away: "AUT" },   // r32-11: 02/7 21:00 — España vs Austria
      { home: "POR", away: "CRO" },   // r32-12: 03/7 01:00 — Portugal vs Croacia
      { home: "SUI", away: "ALG" },   // r32-13: 03/7 05:00 — Suiza vs Argelia
      { home: "AUS", away: "EGY" },   // r32-14: 03/7 20:00 — Australia vs Egipto
      { home: "ARG", away: "CPV" },   // r32-15: 04/7 00:00 — Argentina vs Cabo Verde
      { home: "COL", away: "GHA" },   // r32-16: 04/7 03:30 — Colombia vs Ghana
    ];
    setSetup({ ...setup, r32 });
    alert("✅ R32 calendar loaded. Don't forget to press 💾 Save Brackets.");

  const loadToR32 = () => {
    if (!standingsConfirmed && !realResults?.groupStandings?.confirmed) {
      alert("Confirm standings first!");
      return;
    }
    const gs = realResults?.groupStandings?.groups || allGroupStandings;
    const newSetup = { ...setup };
    const r32 = Array.from({ length: 16 }, () => ({ home: "", away: "" }));
    // FIFA 2026 R32 match mapping (matches 73-88)
    // Slot 0 (M73): 2A vs 2B
    r32[0] = { home: gs.A?.[1] || "", away: gs.B?.[1] || "" };
    // Slot 1 (M74): 1E vs Best3rd(A/B/C/D/F)
    r32[1] = { home: gs.E?.[0] || "", away: "" };
    // Slot 2 (M75): 1F vs 2C
    r32[2] = { home: gs.F?.[0] || "", away: gs.C?.[1] || "" };
    // Slot 3 (M76): 1C vs 2F
    r32[3] = { home: gs.C?.[0] || "", away: gs.F?.[1] || "" };
    // Slot 4 (M77): 1I vs Best3rd(C/D/F/G/H)
    r32[4] = { home: gs.I?.[0] || "", away: "" };
    // Slot 5 (M78): 2E vs 2I
    r32[5] = { home: gs.E?.[1] || "", away: gs.I?.[1] || "" };
    // Slot 6 (M79): 1A vs Best3rd(C/E/F/H/I)
    r32[6] = { home: gs.A?.[0] || "", away: "" };
    // Slot 7 (M80): 1L vs Best3rd(E/H/I/J/K)
    r32[7] = { home: gs.L?.[0] || "", away: "" };
    // Slot 8 (M81): 1D vs Best3rd(B/E/F/I/J)
    r32[8] = { home: gs.D?.[0] || "", away: "" };
    // Slot 9 (M82): 1G vs Best3rd(A/E/H/I/J)
    r32[9] = { home: gs.G?.[0] || "", away: "" };
    // Slot 10 (M83): 2K vs 2L
    r32[10] = { home: gs.K?.[1] || "", away: gs.L?.[1] || "" };
    // Slot 11 (M84): 1H vs 2J
    r32[11] = { home: gs.H?.[0] || "", away: gs.J?.[1] || "" };
    // Slot 12 (M85): 1B vs Best3rd(E/F/G/I/J)
    r32[12] = { home: gs.B?.[0] || "", away: "" };
    // Slot 13 (M86): 1J vs 2H
    r32[13] = { home: gs.J?.[0] || "", away: gs.H?.[1] || "" };
    // Slot 14 (M87): 1K vs Best3rd(D/E/I/J/L)
    r32[14] = { home: gs.K?.[0] || "", away: "" };
    // Slot 15 (M88): 2D vs 2G
    r32[15] = { home: gs.D?.[1] || "", away: gs.G?.[1] || "" };
    newSetup.r32 = r32;
    setSetup(newSetup);
    alert("✅ 1st & 2nd loaded to R32. Assign best 3rds manually in the Brackets tab (away slots left empty).");
  };

  const roundInfo = ROUNDS.find((r) => r.key === koResultRound);

  return (
    <div>
      <div style={{ border: "1px solid rgba(197,160,89,0.12)", borderRadius: 10, padding: "12px 10px", background: "rgba(197,160,89,0.02)" }}>
        <p style={{ fontSize: 9, color: C.gold, textAlign: "center", margin: "0 0 8px", letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: "'Oswald', sans-serif", fontWeight: 500 }}>Knockout workflow</p>
        <TabBar
          tabs={[
            { id: "standings", label: "1. Standings", icon: <Star size={14} /> },
            { id: "brackets", label: "2. Brackets", icon: <Zap size={14} /> },
            { id: "results", label: "3. Results", icon: <Trophy size={14} /> },
          ]}
          active={activeTab}
          onChange={setActiveTab}
        />
      </div>

      {activeTab === "standings" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "12px 0" }}>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: C.gold, margin: 0 }}>📊 Group Final Standings</h3>
            <div style={{ display: "flex", gap: 6 }}>
              <GoldButton onClick={saveStandings} small>💾 Confirm Standings</GoldButton>
              <button onClick={loadToR32} style={{ padding: "4px 10px", background: "rgba(59,130,246,0.15)", color: C.blue, border: "1px solid rgba(59,130,246,0.3)", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>🏟️ Load to R32</button>
              <button onClick={loadFifaCalendar} style={{ padding: "4px 10px", background: "rgba(197,160,89,0.15)", color: C.gold, border: "1px solid rgba(197,160,89,0.3)", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>📅 Load Calendar</button>
            </div>
          </div>
          {standingsConfirmed && <p style={{ fontSize: 11, color: C.green, margin: "0 0 12px" }}>✅ Standings confirmed. Changes will require re-confirmation.</p>}

          {/* Group tables with reorder */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
            {Object.keys(GROUPS).map((g) => {
              const standings = allGroupStandings[g];
              if (!standings) return (
                <Card key={g} style={{ opacity: 0.5 }}>
                  <h4 style={{ fontSize: 12, color: C.gold, margin: "0 0 4px" }}>Group {g}</h4>
                  <p style={{ fontSize: 10, color: C.muted, margin: 0 }}>Not all results entered</p>
                </Card>
              );
              // Calc full table for display
              const teamCodes = GROUPS[g];
              const matches = getGroupMatches(g);
              const realMatches = matches.map((m) => {
                const key = g + "-" + m.home + "-" + m.away;
                const r = realResults?.groups?.[key];
                return { ...m, homeScore: r?.home ?? null, awayScore: r?.away ?? null };
              });
              const tableData = calcGroupTable(realMatches, teamCodes);
              // Reorder tableData to match standings order
              const orderedTable = standings.map((code) => tableData.find((t) => t.code === code) || { code, pts: 0, gd: 0, gf: 0 });

              return (
                <Card key={g}>
                  <h4 style={{ fontSize: 12, color: C.gold, margin: "0 0 6px" }}>Group {g}</h4>
                  <div style={{ display: "grid", gridTemplateColumns: "20px 24px 1fr 28px 22px 22px 30px", gap: 2, fontSize: 10, color: C.muted }}>
                    <span></span><span></span><span style={{ fontWeight: 700 }}>Team</span><span>Pts</span><span>GD</span><span>GF</span><span></span>
                  </div>
                  {orderedTable.map((t, idx) => {
                    const isQualified = idx < 2;
                    const isThird = idx === 2;
                    const isBest3 = isThird && bestThirds.includes(t.code);
                    return (
                      <div key={t.code} style={{
                        display: "grid", gridTemplateColumns: "20px 24px 1fr 28px 22px 22px 30px", gap: 2, alignItems: "center",
                        padding: "4px 0", fontSize: 11, borderBottom: "1px solid " + C.border,
                        background: isQualified ? "rgba(52,211,153,0.06)" : isBest3 ? "rgba(59,130,246,0.06)" : "transparent",
                        borderLeft: isQualified ? "2px solid " + C.green : isBest3 ? "2px solid " + C.blue : "2px solid transparent",
                      }}>
                        <span style={{ color: isQualified ? C.green : isThird ? C.blue : C.muted, fontWeight: 700, textAlign: "center" }}>{idx + 1}</span>
                        <span className={"fi fi-" + (TEAMS[t.code]?.flag || "")} style={{ fontSize: 14 }} />
                        <span style={{ fontWeight: 600, color: C.white }}>{TEAMS[t.code]?.name || t.code}</span>
                        <span style={{ fontWeight: 700 }}>{t.pts}</span>
                        <span>{t.gd > 0 ? "+" + t.gd : t.gd}</span>
                        <span>{t.gf}</span>
                        <div style={{ display: "flex", gap: 1 }}>
                          <button onClick={() => moveTeam(g, idx, idx - 1)} disabled={idx === 0} style={{ background: "none", border: "none", color: idx > 0 ? C.gold : "#333", cursor: idx > 0 ? "pointer" : "default", fontSize: 10, padding: "2px" }}>▲</button>
                          <button onClick={() => moveTeam(g, idx, idx + 1)} disabled={idx >= 3} style={{ background: "none", border: "none", color: idx < 3 ? C.gold : "#333", cursor: idx < 3 ? "pointer" : "default", fontSize: 10, padding: "2px" }}>▼</button>
                        </div>
                      </div>
                    );
                  })}
                </Card>
              );
            })}
          </div>

          {/* Best 3rd selection */}
          <Card glow>
            <h3 style={{ fontSize: 14, fontWeight: 700, color: C.blue, margin: "0 0 4px" }}>🎯 Best 3rd Place Teams ({bestThirds.length}/8)</h3>
            <p style={{ fontSize: 10, color: C.muted, margin: "0 0 10px" }}>Select the 8 third-place teams that qualify. Auto-ranked by Pts → GD → GF → Wins.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
              {Object.keys(GROUPS).map((g) => {
                const standings = allGroupStandings[g];
                if (!standings || !standings[2]) return null;
                const code = standings[2];
                const teamCodes = GROUPS[g];
                const matches = getGroupMatches(g);
                const realMatches = matches.map((m) => {
                  const key = g + "-" + m.home + "-" + m.away;
                  const r = realResults?.groups?.[key];
                  return { ...m, homeScore: r?.home ?? null, awayScore: r?.away ?? null };
                });
                const table = calcGroupTable(realMatches, teamCodes);
                const teamStats = table.find((t) => t.code === code) || {};
                const isSelected = bestThirds.includes(code);
                return (
                  <div key={g} onClick={() => toggleBestThird(code)} style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 6, cursor: "pointer",
                    background: isSelected ? "rgba(59,130,246,0.12)" : "#111", border: "1px solid " + (isSelected ? "rgba(59,130,246,0.3)" : C.border),
                  }}>
                    <span style={{ fontSize: 14, fontWeight: 700, color: isSelected ? C.blue : C.muted }}>{isSelected ? "☑" : "☐"}</span>
                    <span className={"fi fi-" + (TEAMS[code]?.flag || "")} style={{ fontSize: 16 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: C.white }}>{TEAMS[code]?.name} <span style={{ color: C.muted }}>(Gr.{g})</span></div>
                      <div style={{ fontSize: 9, color: C.muted }}>{teamStats.pts}pts · {teamStats.gd > 0 ? "+" : ""}{teamStats.gd}GD · {teamStats.gf}GF</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {activeTab === "brackets" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div />
            <GoldButton onClick={handleSave} small disabled={saving}>
              {saving ? "Saving..." : "💾 Save cruces"}
            </GoldButton>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
            {ROUNDS.map((r) => (
              <button key={r.key} onClick={() => setBracketRound(r.key)} style={{
                padding: "6px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
                background: bracketRound === r.key ? C.gold : "transparent",
                color: bracketRound === r.key ? "#0a0e1a" : C.muted,
                border: "1px solid " + (bracketRound === r.key ? C.gold : C.border),
              }}>
                {r.label}
              </button>
            ))}
          </div>
          <Card>
            <h3 style={{ fontSize: 14, fontWeight: 700, margin: "0 0 6px", color: C.gold }}>
              🏟️ Brackets · {ROUNDS.find((r) => r.key === bracketRound)?.label}
            </h3>
            {bracketRound === "r32" ? (
              <p style={{ fontSize: 11, color: C.muted, margin: "0 0 12px" }}>
                Set up the 16 R32 matches. Search by name or code.
              </p>
            ) : (
              <p style={{ fontSize: 11, color: C.muted, margin: "0 0 12px" }}>
                Auto-generated from results. Use selectors to fix if needed.
              </p>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {Array.from({ length: ROUNDS.find((r) => r.key === bracketRound)?.matches || 0 }, (_, i) => {
                const matchId = bracketRound + "-" + (i + 1);
                // For r32: from setup. For others: auto from results but overridable per-side.
                const autoTeams = bracketRound !== "r32" ? getKnockoutTeam(matchId, {}, realResults?.knockout || {}, realResults?.knockout) : null;
                const overrideObj = setup[bracketRound]?.[i];
                const hasOverrideHome = overrideObj && overrideObj.home !== undefined;
                const hasOverrideAway = overrideObj && overrideObj.away !== undefined;
                const homeVal = hasOverrideHome ? overrideObj.home : (autoTeams?.home || "");
                const awayVal = hasOverrideAway ? overrideObj.away : (autoTeams?.away || "");
                const anyOverride = hasOverrideHome || hasOverrideAway;
                return (
                  <div key={i} style={{
                    padding: "10px 14px", background: "#0D0D0D", borderRadius: 8,
                    border: "1px solid " + (homeVal && awayVal ? C.green + "33" : C.border),
                  }}>
                    {KO_SCHEDULE[matchId] && <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 10, color: C.gold, marginBottom: 6, textAlign: "center", opacity: 0.6, letterSpacing: "0.08em", textTransform: "uppercase" }}>{formatMatchDate(KO_SCHEDULE[matchId])}</div>}
                    <div style={{ display: "grid", gridTemplateColumns: "20px 1fr 30px 1fr auto", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 10, color: C.muted }}>{i + 1}</span>
                    <TeamPicker value={homeVal} onChange={(v) => updateMatchAny(bracketRound, i, "home", v)} />
                    <span style={{ color: C.muted, fontSize: 11, textAlign: "center" }}>vs</span>
                    <TeamPicker value={awayVal} onChange={(v) => updateMatchAny(bracketRound, i, "away", v)} />
                    <div style={{ display: "flex", gap: 2 }}>
                      {bracketRound !== "r32" && anyOverride && (
                        <button
                          onClick={() => resetSlotToAuto(bracketRound, i)}
                          title="Reset to auto-calculated teams"
                          style={{ background: "none", border: "1px solid " + C.border, color: C.gold, cursor: "pointer", fontSize: 10, padding: "2px 6px", borderRadius: 4, opacity: 0.75 }}
                        >↻</button>
                      )}
                      <button
                        onClick={() => clearMatch(bracketRound, i)}
                        title="Clear both slots (explicit empty)"
                        style={{ background: "none", border: "1px solid " + C.border, color: C.red, cursor: "pointer", fontSize: 10, padding: "2px 6px", borderRadius: 4, opacity: 0.75 }}
                      >✕</button>
                    </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {activeTab === "results" && (
        <div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {ROUNDS.map((r) => (
              <button key={r.key} onClick={() => setKoResultRound(r.key)} style={{
                padding: "6px 10px", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: "pointer",
                background: koResultRound === r.key ? C.gold : "transparent",
                color: koResultRound === r.key ? "#0a0e1a" : C.muted,
                border: "1px solid " + (koResultRound === r.key ? C.gold : C.border),
              }}>
                {r.label}
              </button>
            ))}
          </div>
          {/* API Import for knockout */}
          <Card style={{ marginBottom: 12, background: "#111111" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <p style={{ fontSize: 13, fontWeight: 700, margin: "0 0 2px" }}>📡 Import from API</p>
                <p style={{ fontSize: 11, color: C.muted, margin: 0 }}>Fetch knockout results</p>
              </div>
              <button
                onClick={async () => {
                  const apiKey = typeof localStorage !== "undefined" ? localStorage.getItem("kyporra_api_key") : null;
                  if (!apiKey) { alert("⚠️ Enter your API key in Admin > Config first."); return; }
                  try {
                    const resp = await fetch("https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED", {
                      headers: { "X-Auth-Token": apiKey }
                    });
                    if (!resp.ok) throw new Error("API " + resp.status);
                    const data = await resp.json();
                    const apiMatches = data.matches || [];
                    const stageMap = {
                      "LAST_32":"r32","ROUND_OF_32":"r32","LAST_16":"r16","ROUND_OF_16":"r16",
                      "QUARTER_FINALS":"qf","QUARTER_FINAL":"qf","SEMI_FINALS":"sf","SEMI_FINAL":"sf",
                      "THIRD_PLACE":"third","FINAL":"final",
                    };
                    const tlaMap = {};
                    Object.values(TEAMS).forEach((t) => { tlaMap[t.code] = t.code; });
                    const newKo = { ...koResults };
                    let imp = 0;
                    apiMatches.forEach((am) => {
                      if (!am.score?.fullTime || am.score.fullTime.home == null) return;
                      const rk = stageMap[am.stage || ""];
                      if (!rk) return;
                      const hc = tlaMap[am.homeTeam?.tla], ac = tlaMap[am.awayTeam?.tla];
                      if (!hc || !ac) return;
                      const ri = ROUNDS.find((r) => r.key === rk);
                      if (!ri) return;
                      for (let i = 1; i <= ri.matches; i++) {
                        const mid = rk + "-" + i;
                        if (newKo[mid]?.advances) continue;
                        const t = getKnockoutTeam(mid, setup, newKo, newKo);
                        if (!t.home || !t.away) continue;
                        if ((t.home===hc&&t.away===ac)||(t.home===ac&&t.away===hc)) {
                          const fl = t.home===ac;
                          const hs = fl?am.score.fullTime.away:am.score.fullTime.home;
                          const as2 = fl?am.score.fullTime.home:am.score.fullTime.away;
                          let adv = null;
                          if (hs>as2) adv=t.home; else if (as2>hs) adv=t.away;
                          else { const p=am.score?.penalties,e=am.score?.extraTime;
                            if(p?.home!=null){const ph=fl?p.away:p.home,pa=fl?p.home:p.away;adv=ph>pa?t.home:t.away;}
                            else if(e?.home!=null){const eh=fl?e.away:e.home,ea=fl?e.home:e.away;if(eh>ea)adv=t.home;else if(ea>eh)adv=t.away;}
                          }
                          newKo[mid]={home:hs,away:as2,advances:adv}; imp++; break;
                        }
                      }
                    });
                    setRealResults({...realResults, knockout:newKo});
                    alert("✅ "+imp+" matches imported. Review and Save.");
                  } catch(e) { alert("⚠️ Error: "+e.message+". Enter results manually."); }
                }}
                style={{
                  padding: "8px 16px", background: "rgba(59,130,246,0.15)", color: C.blue,
                  border: "1px solid rgba(59,130,246,0.2)", borderRadius: 8, fontSize: 12,
                  fontWeight: 700, cursor: "pointer",
                }}
              >
                🔄 Import
              </button>
            </div>
          </Card>
          <Card>
            <h3 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 600, margin: "0 0 12px", color: C.gold, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              Real results · {roundInfo?.label}
            </h3>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {Array.from({ length: roundInfo?.matches || 0 }, (_, i) => {
                const matchId = koResultRound + "-" + (i + 1);
                const teams = getKoMatchTeams(matchId);
                const res = koResults[matchId] || { home: null, away: null, advances: null };
                const bothTeams = teams.home && teams.away;
                const isDraw = res.home != null && res.away != null && res.home === res.away;
                return (
                  <div key={matchId} style={{
                    padding: "10px 14px", background: "#0D0D0D", borderRadius: 8,
                    border: "1px solid " + (res.advances ? C.green + "44" : C.border),
                    opacity: bothTeams ? 1 : 0.4,
                  }}>
                    {KO_SCHEDULE[matchId] && <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 10, color: C.gold, marginBottom: 6, textAlign: "center", opacity: 0.6, letterSpacing: "0.08em", textTransform: "uppercase" }}>{formatMatchDate(KO_SCHEDULE[matchId])}</div>}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", alignItems: "center", gap: 8 }}>
                      <div style={{ display: "flex", justifyContent: "flex-end" }}>
                        {teams.home ? <TeamBadge code={teams.home} size="sm" /> : <span style={{ color: C.muted, fontSize: 11 }}>—</span>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <ScoreInput value={res.home} onChange={(v) => bothTeams && updateKoResult(matchId, "home", v)} disabled={!bothTeams} />
                        <span style={{ color: C.muted, fontWeight: 700, fontSize: 12 }}>-</span>
                        <ScoreInput value={res.away} onChange={(v) => bothTeams && updateKoResult(matchId, "away", v)} disabled={!bothTeams} />
                      </div>
                      <div style={{ display: "flex", justifyContent: "flex-start" }}>
                        {teams.away ? <TeamBadge code={teams.away} size="sm" /> : <span style={{ color: C.muted, fontSize: 11 }}>—</span>}
                      </div>
                    </div>
                    {isDraw && bothTeams && (
                      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginTop: 8, paddingTop: 8, borderTop: "1px solid " + C.border }}>
                        <span style={{ fontSize: 11, color: C.gold }}>Who advances?</span>
                        {[teams.home, teams.away].map((t) => (
                          <button key={t} onClick={() => updateKoResult(matchId, "advances", t)} style={{
                            padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: "pointer",
                            background: res.advances === t ? C.green + "22" : "transparent",
                            border: res.advances === t ? "2px solid " + C.green : "1px solid " + C.border,
                            color: res.advances === t ? C.green : C.muted, fontWeight: 600,
                          }}><TeamBadge code={t} size="sm" /></button>
                        ))}
                      </div>
                    )}
                    {(res.home != null || res.away != null || res.advances) && (
                      <div style={{ textAlign: "center", marginTop: 6 }}>
                        <button onClick={() => {
                          const newKo = { ...koResults };
                          delete newKo[matchId];
                          setRealResults({ ...realResults, knockout: newKo });
                        }} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 10, opacity: 0.5 }}>
                          ✕ Clear result
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            <GoldButton onClick={saveKoResults} style={{ width: "100%", marginTop: 16 }}>
              💾 Save resultados
            </GoldButton>
          </Card>
        </div>
      )}
    </div>
  );
}

function MatchView({ approved, allPredictions, realResults, knockoutSetup }) {
